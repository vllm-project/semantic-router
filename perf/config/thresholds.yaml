# Performance regression thresholds for `make perf-compare` / `perf-check`.
#
# Each entry maps a benchmark-name regexp to the maximum tolerated ns/op
# regression (percent slower than baseline) before the comparison flags it.
# The FIRST matching pattern wins, so order entries most-specific first.
# Patterns are Go regular expressions matched against the full benchmark name
# (with the trailing -GOMAXPROCS suffix already stripped). Any benchmark that
# matches no pattern uses `default`.

component_benchmarks:
  default:
    max_regression_percent: 10

  benchmarks:
    # Classification (CGO-bound BERT / embedding paths): noisier, looser bound.
    - name: classification
      pattern: "^BenchmarkClassify"
      max_regression_percent: 15

    # Decision engine (pure Go, cheap + deterministic): tight bound.
    - name: decision_engine
      pattern: "^Benchmark(EvaluateDecisions|PrioritySelection|Rule)"
      max_regression_percent: 5

    # Cache lookup paths.
    - name: cache
      pattern: "^BenchmarkCache"
      max_regression_percent: 10

    # ExtProc request/response hot path.
    - name: extproc
      pattern: "^Benchmark(Process|Header|Full|Different|Concurrent)"
      max_regression_percent: 15

    # Looper family (ReMoM/Fusion/Flow/Base) micro-benchmarks. These are noisy
    # run-to-run (~10% swing on idle hardware), so the bound is generous: it
    # catches structural regressions (an accidental O(n^2), a per-call
    # allocation blowup), not measurement jitter.
    - name: looper
      pattern: "^Benchmark(ReMoM|Fusion|Flow|Base)"
      max_regression_percent: 25

e2e_tests:
  throughput:
    min_sustained_qps: 500
    min_success_rate: 0.99
    max_regression_percent: 15

  latency:
    max_p95_ms: 100
    max_p99_ms: 150
    max_regression_percent: 20

  resource:
    max_regression_percent: 25

resource_limits:
  max_memory_mb: 2048
  max_goroutines: 10000
  max_cpu_percent: 80
