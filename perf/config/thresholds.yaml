# Performance regression thresholds for `make perf-compare` / `perf-check`.
#
# The gate BLOCKS on hardware-independent metrics — allocations per op
# (max_allocs_regression_percent) and bytes per op (max_bytes_regression_percent).
# These are determined by the code path, not the CPU, so they compare cleanly
# across machines and CI runners. ns/op is ADVISORY: max_ns_regression_percent is
# reported (and shown in the PR comment) but never fails the gate, because
# absolute time depends on the runner's hardware. See perf/README.md.
#
# Each entry maps a benchmark-name regexp to its thresholds. The FIRST matching
# pattern wins, so order entries most-specific first. Patterns are Go regular
# expressions matched against the full benchmark name (with the trailing
# -GOMAXPROCS suffix stripped). Any benchmark matching no pattern uses `default`.
# A metric an entry omits inherits `default` (omitting means "use the default",
# never "0% / zero tolerance").

component_benchmarks:
  default:
    max_allocs_regression_percent: 10
    max_bytes_regression_percent: 10
    max_ns_regression_percent: 30

  benchmarks:
    # Classification (CGO-bound BERT / embedding paths).
    - name: classification
      pattern: "^BenchmarkClassify"
      max_allocs_regression_percent: 10
      max_bytes_regression_percent: 10
      max_ns_regression_percent: 30

    # Decision engine (pure Go, cheap + deterministic): tight allocation bound.
    - name: decision_engine
      pattern: "^Benchmark(EvaluateDecisions|PrioritySelection|Rule)"
      max_allocs_regression_percent: 5
      max_bytes_regression_percent: 5
      max_ns_regression_percent: 20

    # Cache lookup paths.
    - name: cache
      pattern: "^BenchmarkCache"
      max_allocs_regression_percent: 10
      max_bytes_regression_percent: 10
      max_ns_regression_percent: 30

    # ExtProc request/response hot path.
    - name: extproc
      pattern: "^Benchmark(Process|Header|Full|Different|Concurrent)"
      max_allocs_regression_percent: 5
      max_bytes_regression_percent: 10
      max_ns_regression_percent: 25

    # Looper family (ReMoM/Fusion/Flow/Base) micro-benchmarks. Some allocate a
    # data-dependent amount, so the allocation bound is a little looser here; it
    # still catches structural regressions (an accidental O(n^2), a per-call
    # allocation blowup).
    - name: looper
      pattern: "^Benchmark(ReMoM|Fusion|Flow|Base)"
      max_allocs_regression_percent: 10
      max_bytes_regression_percent: 15
      max_ns_regression_percent: 40

e2e_tests:
  throughput:
    min_sustained_qps: 500
    min_success_rate: 0.99
    max_regression_percent: 15

  latency:
    max_p95_ms: 100
    max_p99_ms: 150
    max_regression_percent: 20

  resource:
    max_regression_percent: 25

resource_limits:
  max_memory_mb: 2048
  max_goroutines: 10000
  max_cpu_percent: 80
