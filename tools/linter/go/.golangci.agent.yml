version: "2"

run:
  timeout: "5m"

linters:
  # Only run the explicit complexity/size linters below. Without this, golangci-lint v2
  # also enables the default preset (errcheck, govet, staticcheck, ...), which flags
  # hundreds of issues on any large PR diff and defeats the changed-files gate.
  default: none
  enable:
    - cyclop
    - funlen
    - gocognit
    - interfacebloat
    - nestif
  settings:
    cyclop:
      max-complexity: 12
    funlen:
      lines: 100
      statements: 40
    gocognit:
      min-complexity: 20
    interfacebloat:
      max: 5
    nestif:
      min-complexity: 4
  exclusions:
    rules:
      # long-prompt / extproc panic-recovery PR: skip agent complexity linters only on these touched paths.
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
          - interfacebloat
        path: (^|/)candle-binding/semantic-router_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
          - interfacebloat
        path: (^|/)src/semantic-router/pkg/extproc/(processor_core\.go|processor_core_panic_test\.go|processor_res_memory\.go|router_selection\.go)$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)handlers/openclaw_(provision|rooms|teams|test|websocket|workers)\.go$
      - linters:
          - cyclop
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/config/canonical_config\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)api/v1alpha1/(sample_validation|semanticrouter_types|semanticrouter_webhook)_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)controllers/helpers_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/apiserver/server_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/extproc/(req_filter_rag_external|req_filter_rag_hybrid|req_filter_rag_mcp|req_filter_rag_milvus|req_filter_modality|req_filter_rag_openai|router_replay_aggregate|server)\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
          - staticcheck
        path: (^|/)src/semantic-router/pkg/extproc/extproc_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
          - errcheck
        path: (^|/)src/semantic-router/pkg/cache/cache_test\.go$
      - linters:
          - interfacebloat
        path: (^|/)src/semantic-router/pkg/cache/cache_interface\.go$
      - linters:
          - interfacebloat
        path: (^|/)src/semantic-router/pkg/responsestore/interface\.go$
      - linters:
          - cyclop
          - staticcheck
        path: (^|/)src/semantic-router/pkg/config/canonical_loader_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/dsl/(decompiler|parser)\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
          - errcheck
        path: (^|/)src/semantic-router/pkg/dsl/dsl_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/modelselection/selector_test\.go$

      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/dsl/category_kb_(dsl|e2e)_test\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/dsl/privacy_recipe_roundtrip_test\.go$
      - linters:
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/classification/category_kb_classifier_test\.go$
      - linters:
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/decision/engine_category_kb_test\.go$
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/modelselection/benchmark_runner\.go$
      - linters:
          - cyclop
          - errcheck
        path: (^|/)src/semantic-router/pkg/classification/vllm_client\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/cache/inmemory_cache\.go$
      - linters:
          - funlen
        path: (^|/)src/semantic-router/pkg/cache/hybrid_cache\.go$
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/classification/(hallucination_detector|keyword_classifier|mcp_classifier|unified_classifier)\.go$
      - linters:
          - cyclop
        path: (^|/)src/semantic-router/pkg/extproc/processor_res_cache\.go$
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/looper/(base|client|confidence|ratings|rl_driven)\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/memory/milvus_store\.go$
      - linters:
          - errcheck
          - nestif
        path: (^|/)src/semantic-router/pkg/responsestore/redis_store\.go$
      - linters:
          - cyclop
          - funlen
          - gocognit
          - nestif
        path: (^|/)src/semantic-router/pkg/selection/(elo|factory|gmtrouter|hybrid|ml_adapter|rl_driven|storage)\.go$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
