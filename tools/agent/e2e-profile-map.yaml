version: 2

default_local_profiles:
  - kubernetes

full_ci_profiles:
  - kubernetes
  - dashboard

full_ci_triggers:
  - src/semantic-router/**
  - src/vllm-sr/**
  - src/vllm-sr/Dockerfile*
  - tools/make/**
  - tools/agent/*.yaml
  - tools/agent/scripts/**
  - tools/make/agent.mk
  - .github/workflows/**
  - e2e/pkg/**
  - e2e/cmd/**
  - e2e/testcases/**
  - e2e/go.mod
  - e2e/go.sum
  - e2e/config/**

profile_rules:
  kubernetes:
    owner: e2e
    coverage_role: baseline-router-contract
    selection_mode: default-local,full-ci
    summary: Baseline router contract for general routing, safety, cache, and decision behavior.
    paths:
      - e2e/profiles/ai-gateway/**
      - deploy/kubernetes/ai-gateway/**
  dashboard:
    owner: e2e
    coverage_role: dashboard-api-contract
    selection_mode: full-ci
    summary: Dashboard API surface — health, status, config read (JSON/YAML), deploy preview, config versions, and input validation.
    paths:
      - e2e/profiles/dashboard/**
      - e2e/testcases/dashboard_*.go
      - deploy/kubernetes/observability/dashboard/**

manual_profile_rules:
  aibrix:
    owner: e2e
    coverage_role: aibrix-control-plane-and-gateway
    selection_mode: manual-only
    summary: AIBrix-specific gateway and control-plane health plus a minimal router smoke path, kept outside the steady-state shared-suite PR path.
    paths:
      - e2e/profiles/aibrix/**
      - deploy/kubernetes/aibrix/**
  routing-strategies:
    owner: e2e
    coverage_role: routing-strategy-contracts
    selection_mode: manual-only
    summary: Keyword, entropy, and fallback routing strategy behavior, retained as a manual debug path after the shared docker|k8s baseline reduction.
    paths:
      - e2e/profiles/routing-strategies/**
      - deploy/kubernetes/routing-strategies/**
  dynamic-config:
    owner: e2e
    coverage_role: dynamic-crd-routing-contracts
    selection_mode: manual-only
    summary: CRD-driven routing semantics and embedding-signal behavior, retained as manual-only feature coverage.
    paths:
      - e2e/profiles/dynamic-config/**
  llm-d:
    owner: e2e
    coverage_role: llm-d-inference-gateway-health
    selection_mode: manual-only
    summary: LLM-D inference-gateway health with a minimal router smoke path, kept outside the default shared-suite PR contract.
    paths:
      - e2e/profiles/llm-d/**
      - deploy/kubernetes/llmd-base/**
  istio:
    owner: e2e
    coverage_role: istio-service-mesh-contracts
    selection_mode: manual-only
    summary: Istio sidecar, traffic, mTLS, and tracing behavior through the router, retained for explicit mesh debugging only.
    paths:
      - e2e/profiles/istio/**
      - deploy/kubernetes/istio/**
  production-stack:
    owner: e2e
    coverage_role: production-ha-load-observability
    selection_mode: manual-only
    summary: HA, load-balancing, failover, and performance checks for the production stack, no longer part of the steady-state PR topology.
    paths:
      - e2e/profiles/production-stack/**
      - deploy/kubernetes/ai-gateway/aigw-resources/base-model.yaml
      - deploy/kubernetes/ai-gateway/aigw-resources/gwapi-resources.yaml
  ml-model-selection:
    owner: e2e
    coverage_role: ml-model-selection-contracts
    selection_mode: manual-only
    summary: ML-based model-selection behavior across trained selector backends, retained as feature-specific manual coverage.
    paths:
      - e2e/profiles/ml-model-selection/**
      - src/semantic-router/pkg/modelselection/**
      - src/training/model_selection/ml_model_selection/**
      - ml-binding/**
  multi-endpoint:
    owner: e2e
    coverage_role: environment-policy-routing
    selection_mode: manual-only
    summary: Environment-specific routing and safety policy enforcement across multiple backends, retained as an explicit manual path.
    paths:
      - e2e/profiles/multi-endpoint/**
      - e2e/config/config.multi-endpoint.yaml
      - scripts/multi-endpoint/**
  authz-rbac:
    owner: e2e
    coverage_role: authz-and-rate-limit-contracts
    selection_mode: manual-only
    summary: Authz-driven routing and per-user rate-limiting behavior, retained outside the steady-state shared-suite PR matrix.
    paths:
      - e2e/profiles/authz-rbac/**
      - e2e/config/config.authz-rbac.yaml
      - e2e/config/authz-profile-*.yaml
      - src/semantic-router/pkg/classification/authz*.go
      - src/semantic-router/pkg/authz/**
  streaming:
    owner: e2e
    coverage_role: streaming-request-and-cache
    selection_mode: manual-only
    summary: Streamed request-body routing and streaming cache round-trip behavior, kept as manual-only feature coverage.
    paths:
      - e2e/profiles/streaming/**
      - deploy/kubernetes/streaming/**
      - src/semantic-router/pkg/extproc/processor_req_body_streamed*.go
  response-api:
    owner: e2e
    coverage_role: responses-api-memory
    selection_mode: manual-only
    summary: Memory-backed Responses API coverage, kept out of the standard CI profile matrix until the profile is re-enabled.
    paths:
      - e2e/profiles/response-api/**
      - deploy/kubernetes/response-api/gwapi-resources.yaml
      - deploy/kubernetes/response-api/mock-vllm.yaml
  response-api-redis:
    owner: e2e
    coverage_role: responses-api-redis-ttl
    selection_mode: manual-only
    summary: Responses API coverage for Redis-backed persistence and TTL expiry when debugging that backend directly.
    paths:
      - e2e/profiles/response-api-redis/**
      - deploy/kubernetes/response-api/redis.yaml
  response-api-redis-cluster:
    owner: e2e
    coverage_role: responses-api-redis-cluster-ttl
    selection_mode: manual-only
    summary: Responses API coverage for Redis Cluster-backed persistence and TTL expiry when debugging that backend directly.
    paths:
      - e2e/profiles/response-api-redis-cluster/**
      - deploy/kubernetes/response-api/redis-cluster.yaml
  router-replay:
    owner: e2e
    coverage_role: router-replay-restart-recovery
    selection_mode: manual-only
    summary: Router Replay restart-recovery coverage with Postgres backend, validating that replay records survive pod restarts.
    paths:
      - e2e/profiles/router-replay/**
      - deploy/kubernetes/router-replay/**
      - src/semantic-router/pkg/routerreplay/**
      - src/semantic-router/pkg/extproc/router_replay_setup.go
  dynamo:
    owner: e2e
    coverage_role: dynamo-gpu-and-batching
    selection_mode: manual-only
    summary: NVIDIA Dynamo deployment, batching, and GPU-health checks that require a manual execution path.
    paths:
      - e2e/profiles/dynamo/**
  rag-hybrid-search:
    owner: e2e
    coverage_role: rag-hybrid-search
    selection_mode: manual-only
    summary: Llama Stack-backed RAG vector-store and hybrid-search behavior that runs outside the standard CI profile matrix.
    paths:
      - e2e/profiles/rag-hybrid-search/**

workflow_suite_rules:
  docker-shared-integration:
    owner: vllm-sr-cli
    kind: workflow-integration
    trigger_contract: pull_request_paths
    summary: Default docker-backed shared-suite regression for the `kubernetes` and `dashboard` contracts through `vllm-sr`.
    workflow: .github/workflows/integration-test-vllm-sr-cli.yml
    local_command: make vllm-sr-test-integration VLLM_SR_TEST_TARGET=docker
    paths:
      - src/semantic-router/**
      - src/vllm-sr/**
      - dashboard/backend/**
      - e2e/profiles/ai-gateway/**
      - deploy/kubernetes/ai-gateway/**
      - e2e/profiles/dashboard/**
      - e2e/testcases/dashboard_*.go
      - deploy/kubernetes/observability/dashboard/**
      - e2e/testing/llm-katan/**
      - tools/make/docker.mk
      - tools/agent/e2e-profile-map.yaml
      - tools/agent/repo-manifest.yaml
      - tools/agent/scripts/**
      - .github/workflows/ci-changes.yml
      - .github/workflows/integration-test-k8s.yml
      - e2e/testing/vllm-sr-cli/**
      - .github/workflows/integration-test-vllm-sr-cli.yml
  k8s-shared-integration:
    owner: vllm-sr-cli
    kind: workflow-integration
    trigger_contract: pull_request_paths
    summary: Default Kind-backed shared-suite regression for the `kubernetes` and `dashboard` contracts through `vllm-sr --target k8s`.
    workflow: .github/workflows/integration-test-k8s.yml
    local_command: make vllm-sr-test-integration VLLM_SR_TEST_TARGET=k8s
    paths:
      - src/semantic-router/**
      - src/vllm-sr/**
      - dashboard/backend/**
      - e2e/profiles/ai-gateway/**
      - deploy/kubernetes/ai-gateway/**
      - e2e/profiles/dashboard/**
      - e2e/testcases/dashboard_*.go
      - deploy/kubernetes/observability/dashboard/**
      - e2e/testing/llm-katan/**
      - deploy/helm/semantic-router/**
      - tools/make/docker.mk
      - tools/agent/e2e-profile-map.yaml
      - tools/agent/repo-manifest.yaml
      - tools/agent/scripts/**
      - .github/workflows/ci-changes.yml
      - .github/workflows/integration-test-vllm-sr-cli.yml
      - e2e/testing/vllm-sr-cli/**
      - .github/workflows/integration-test-k8s.yml
  memory-integration:
    owner: router-core
    kind: workflow-integration
    trigger_contract: manual_or_scheduled
    summary: Memory extraction, Milvus persistence, and injection behavior through the served router stack; retained as a manual/nightly exception outside the steady-state shared-suite PR path.
    workflow: .github/workflows/integration-test-memory.yml
    local_command: make memory-test-integration
    paths:
      - src/semantic-router/pkg/memory/**
      - src/semantic-router/pkg/extproc/*memory*
      - src/semantic-router/pkg/responseapi/**
      - src/vllm-sr/**
      - src/vllm-sr/Dockerfile*
      - tools/make/docker.mk
      - tools/make/milvus.mk
      - e2e/testing/09-memory-features-test.py
      - e2e/testing/run_memory_integration.sh
      - e2e/testing/llm-katan/**
      - e2e/config/config.memory*.yaml
      - .github/workflows/integration-test-memory.yml
