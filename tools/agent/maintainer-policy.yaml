version: 1

default_output_dir: .agent-harness/maintainer
default_issue_limit: 100
default_pr_limit: 50

labels:
  help_wanted: help wanted
  issue_defaults:
    feature: enhancement
    bug: bug
  lifecycle:
    needs_triage: needs-triage
    needs_info: needs-info
    backlog: backlog
    milestone_candidate: milestone-candidate
    release_blocker: release-blocker
    stale: stale
  pr_state:
    needs_review: needs-review
    needs_rebase: needs-rebase
    blocked: blocked
    close_candidate: close-candidate

release_tracks:
  contracts:
    label: track/contracts
    description: API, config, deployment, and control-plane contracts.
  ops:
    label: track/ops
    description: Release channels, upgrades, rollback, and production operations.
  performance:
    label: track/performance
    description: Native/runtime parity and performance validation.
  research-to-product:
    label: track/research-to-product
    description: Research work that directly improves product behavior.
  hardening:
    label: track/hardening
    description: Dashboard, eval, RAG, memory, protocol, and product hardening.
  security:
    label: track/security
    description: Security, RBAC, observability, and E2E closure.

staleness:
  issue_stale_days: 90
  pr_close_candidate_days: 30
  pr_needs_attention_days: 7

public_artifact_policy:
  forbidden_phrases:
    - local workspace
    - local verification server
    - remote verification server
    - generated by
    - AI-assisted
    - Codex
  forbidden_patterns:
    - '/Users/'
    - 'ssh://'
    - '@[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+'
