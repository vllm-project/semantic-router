  - path: docs/agent/tech-debt/td-006-structural-rule-exceptions.md
    steward: agent-contract
    freshness: update when the TD006 debt record changes materially
  - path: docs/agent/tech-debt/td-016-fleet-sim-shared-ruff-contract-gap.md
    steward: fleet-sim
    freshness: update when the TD016 debt record changes materially
  - path: docs/agent/tech-debt/td-017-fleet-sim-structure-gate-migration-gap.md
    steward: fleet-sim
    freshness: update when the TD017 debt record changes materially
  - path: docs/agent/tech-debt/td-020-classification-subsystem-boundary-collapse.md
    steward: router-core
    freshness: update when the TD020 debt record changes materially
  - path: docs/agent/tech-debt/td-027-fleet-sim-optimizer-and-public-surface-boundary-collapse.md
    steward: fleet-sim
    freshness: update when the TD027 debt record changes materially
  - path: docs/agent/tech-debt/td-042-ffi-embedding-structure-debt.md
    steward: candle-binding
    freshness: update when the TD042 debt record changes materially
  - path: docs/agent/tech-debt/td-043-semantic-router-go-cyclop-debt.md
