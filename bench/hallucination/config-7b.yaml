version: v0.3

listeners: []

providers:
  defaults:
    default_model: Qwen/Qwen2.5-14B-Instruct-AWQ
    default_reasoning_effort: medium
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: Qwen/Qwen2.5-14B-Instruct-AWQ
      provider_model_id: Qwen/Qwen2.5-14B-Instruct-AWQ
      api_format: openai
      backend_refs:
        - name: vllm-general
          endpoint: 127.0.0.1:8083
          protocol: http
          type: chat
          weight: 1

routing:
  modelCards:
    - name: Qwen/Qwen2.5-14B-Instruct-AWQ
      reasoning_family_ref: qwen3
      description: Benchmark target model for hallucination mitigation evaluation.
      capabilities: [chat, reasoning]
      modality: ar
  signals:
    domains:
      - name: general
        description: General questions.
        mmlu_categories: [other]
      - name: math
        description: Mathematics and quantitative reasoning.
        mmlu_categories: [math]
      - name: science
        description: Science questions.
        mmlu_categories: [physics, chemistry, biology]
    fact_check:
      - name: needs_fact_check
        description: Query contains factual claims that should be verified against context.
      - name: no_fact_check_needed
        description: Query is creative, code-related, or opinion-based and does not need factual verification.
  decisions:
    - name: math_decision
      description: Mathematics and quantitative reasoning.
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: domain
            name: math
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: true
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false
    - name: science_decision
      description: Science questions.
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: domain
            name: science
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: true
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false
    - name: general_decision
      description: General questions.
      priority: 50
      rules:
        operator: AND
        conditions:
          - type: domain
            name: general
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: false
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false

global:
  router:
    strategy: priority
  services:
    api:
      batch_classification:
        metrics:
          enabled: true
          detailed_goroutine_tracking: true
          high_resolution_timing: false
          sample_rate: 1.0
  stores:
    semantic_cache:
      enabled: false
  model_catalog:
    embeddings:
      bert:
        model_id: models/mom-embedding-light
        threshold: 0.6
        use_cpu: true
    modules:
      prompt_guard:
        enabled: true
        use_modernbert: true
        model_id: models/mom-jailbreak-classifier
        threshold: 0.7
        use_cpu: true
        jailbreak_mapping_path: models/mom-jailbreak-classifier/jailbreak_type_mapping.json
        model_ref: prompt_guard
      classifier:
        domain:
          model_id: models/mom-domain-classifier
          use_modernbert: true
          threshold: 0.6
          use_cpu: true
          category_mapping_path: models/mom-domain-classifier/category_mapping.json
          fallback_category: general
          model_ref: domain_classifier
        pii:
          model_id: models/pii_classifier_modernbert-base_presidio_token_model
          threshold: 0.7
          use_cpu: true
          pii_mapping_path: models/mom-pii-classifier/pii_type_mapping.json
          model_ref: pii_classifier
      hallucination_mitigation:
        enabled: true
        on_hallucination_detected: warn
        fact_check:
          model_id: models/mom-halugate-sentinel
          threshold: 0.6
          use_cpu: true
          model_ref: fact_check_classifier
        detector:
          model_id: models/mom-halugate-detector
          threshold: 0.5
          use_cpu: true
          min_span_length: 1
          min_span_confidence: 0.3
          context_window_size: 50
          enable_nli_filtering: true
          nli_entailment_threshold: 0.5
          model_ref: hallucination_detector
        explainer:
          model_id: models/mom-halugate-explainer
          threshold: 0.7
          use_cpu: true
          model_ref: hallucination_explainer
