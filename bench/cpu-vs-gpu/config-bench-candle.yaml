          - statistical modeling
          - predictive analytics
          - data visualization
        aggregation_method: mean
        model: auto
      - name: programming
        threshold: 0.72
        candidates:
          - write code
          - implement function
          - create class
          - code snippet
          - programming task
        aggregation_method: max
        model: auto
    domains:
