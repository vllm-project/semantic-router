                - 0.005
                - 0.01
                - 0.025
                - 0.05
                - 0.1
                - 0.25
                - 0.5
                - 1
                - 2.5
                - 5
                - 10
                - 30
              size_buckets:
                - 1
                - 2
                - 5
                - 10
                - 20
                - 50
                - 100
                - 200
      stores:
        semantic_cache:
          enabled: true
          backend_type: memory
          similarity_threshold: 0.8
          max_entries: 1000
          ttl_seconds: 3600
          eviction_policy: fifo
          use_hnsw: true
          hnsw_m: 16
          hnsw_ef_construction: 200
          embedding_model: mmbert
      integrations:
        tools:
          enabled: false
          top_k: 3
          similarity_threshold: 0.2
          tools_db_path: config/tools_db.json
          fallback_to_empty: true
