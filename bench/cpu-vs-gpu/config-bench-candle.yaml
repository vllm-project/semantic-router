version: v0.3
listeners: []
providers:
  defaults:
    default_model: Qwen/Qwen2.5-14B-Instruct-AWQ
    default_reasoning_effort: medium
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: Qwen/Qwen2.5-14B-Instruct-AWQ
      reasoning_family: qwen3
      provider_model_id: Qwen/Qwen2.5-14B-Instruct-AWQ
      api_format: openai
      backend_refs:
        - name: vllm-general
          endpoint: 127.0.0.1:8083
          protocol: http
          type: chat
          weight: 1
routing:
  modelCards:
    - name: Qwen/Qwen2.5-14B-Instruct-AWQ
      description: Benchmark target model for hallucination mitigation evaluation.
      capabilities: [chat, reasoning]
      modality: ar
  signals:
    domains:
      - name: general
        description: General questions.
        mmlu_categories: [other]
      - name: math
        description: Mathematics and quantitative reasoning.
        mmlu_categories: [math]
      - name: science
        description: Science questions.
        mmlu_categories: [physics, chemistry, biology]
    fact_check:
      - name: needs_fact_check
        description: Query contains factual claims that should be verified against context.
      - name: no_fact_check_needed
        description: Query is creative, code-related, or opinion-based and does not need factual verification.
  decisions:
    - name: math_decision
      description: Mathematics and quantitative reasoning.
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: domain
            name: math
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: true
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false
    - name: science_decision
      description: Science questions.
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: domain
            name: science
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: true
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false
    - name: general_decision
      description: General questions.
      priority: 50
      rules:
        operator: AND
        conditions:
          - type: domain
            name: general
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct-AWQ
          use_reasoning: false
      plugins:
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
        - type: hallucination
          configuration:
            enabled: true
            use_nli: true
            hallucination_action: header
            unverified_factual_action: header
            include_hallucination_details: false
global:
  router:
    strategy: priority
  services:
    api:
      batch_classification:
        metrics:
          enabled: true
          detailed_goroutine_tracking: true
          high_resolution_timing: false
          sample_rate: 1.0
  stores:
    semantic_cache:
      enabled: false
      embedding_model: mmbert
    memory:
      embedding_model: mmbert
    vector_store:
      embedding_model: mmbert
