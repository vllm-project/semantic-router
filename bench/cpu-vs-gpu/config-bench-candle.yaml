          - type: authz
            name: admin
      modelRefs:
        - model: qwen14b-admin
          use_reasoning: true
    - name: premium_to_admin_tier
      description: Premium → admin tier (:8100)
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: authz
            name: premium_user
      modelRefs:
        - model: qwen14b-admin
          use_reasoning: false
