version: v0.3
listeners: []
providers:
  defaults:
    default_model: qwen3
    reasoning_families:
      deepseek:
        type: chat_template_kwargs
        parameter: thinking
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
      gpt-oss:
        type: reasoning_effort
        parameter: reasoning_effort
      gpt:
        type: reasoning_effort
        parameter: reasoning_effort
    default_reasoning_effort: high
  models:
    - name: qwen3
      reasoning_family: qwen3
      backend_refs:
        - name: endpoint1
          endpoint: 172.28.0.20:8002
          weight: 1
routing:
  decisions:
    - name: urgent_request_decision
      description: Urgent and time-sensitive requests
      priority: 150
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: urgent_request
      modelRefs:
        - model: qwen3
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a highly responsive assistant specialized in handling urgent requests. Prioritize speed and efficiency while maintaining accuracy.
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
    - name: sensitive_data_decision
      description: Requests involving sensitive personal data
      priority: 150
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: sensitive_data
      modelRefs:
        - model: qwen3
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a security-conscious assistant specialized in handling sensitive data. Exercise extreme caution with personal information.
        - type: jailbreak
          configuration:
            enabled: true
            threshold: 0.6
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []
    - name: exclude_spam_decision
      description: Potential spam or suspicious requests
      priority: 150
