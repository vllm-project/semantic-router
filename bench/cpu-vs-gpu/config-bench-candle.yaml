version: v0.3

listeners: []

providers:
  defaults:
    default_model: auto
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: auto
      provider_model_id: auto
      api_format: openai
      backend_refs:
        - name: local_vllm
          endpoint: 127.0.0.1:8091
          protocol: http
          type: chat
          weight: 1

routing:
  modelCards:
    - name: auto
      reasoning_family_ref: qwen3
      description: Benchmark target model for Candle CPU signal extraction latency comparisons.
      capabilities: [chat]
      modality: ar
  signals:
    domains:
      - name: other
        description: General fallback traffic.
        mmlu_categories: [other]
      - name: math
        description: Mathematics questions.
        mmlu_categories: [math]
      - name: biology
        description: Biology questions.
        mmlu_categories: [biology]
      - name: engineering
        description: Engineering and systems questions.
        mmlu_categories: [engineering]
      - name: "computer science"
        description: Computer science questions.
        mmlu_categories: ["computer science"]
  decisions:
    - name: default
      description: Benchmark route that keeps signal extraction active for any supported domain.
      priority: 100
      rules:
        operator: OR
        conditions:
          - type: domain
            name: other
          - type: domain
            name: math
          - type: domain
            name: biology
          - type: domain
            name: engineering
          - type: domain
            name: "computer science"
      modelRefs:
        - model: auto
          use_reasoning: false
          weight: 100

global:
  router:
    streamed_body:
      enabled: true
  services:
    response_api:
      enabled: false
    router_replay:
      store_backend: memory
      ttl_seconds: 86400
      async_writes: true
  stores:
    semantic_cache:
      enabled: false
  model_catalog:
    modules:
      prompt_compression:
        enabled: PROMPT_COMPRESSION_PLACEHOLDER
        max_tokens: PROMPT_COMPRESSION_MAX_TOKENS_PLACEHOLDER
      prompt_guard:
        enabled: true
        use_mmbert_32k: true
        model_id: models/mmbert32k-jailbreak-detector-merged
        threshold: 0.7
        use_cpu: true
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
        model_ref: prompt_guard
      classifier:
        domain:
          model_id: models/mmbert32k-intent-classifier-merged
          category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
          fallback_category: other
          use_mmbert_32k: true
          use_cpu: true
          threshold: 0.5
          model_ref: domain_classifier
        pii:
          model_id: models/mmbert32k-pii-detector-merged
          pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
          use_mmbert_32k: true
          use_cpu: true
          threshold: 0.7
          model_ref: pii_classifier
      hallucination_mitigation:
        enabled: false
      feedback_detector:
        enabled: false
