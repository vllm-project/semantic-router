          - kind: Group
            name: platform-admins
        role: admin
      - name: premium-binding
        subjects:
          - kind: Group
            name: premium-tier
        role: premium_user
      - name: free-binding
        subjects:
          - kind: Group
            name: free-tier
        role: free_user
