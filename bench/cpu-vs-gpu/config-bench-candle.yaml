            pii_types_allowed: []
  signals:
    keywords:
      - name: code_keywords
        operator: OR
        method: bm25
        keywords:
          - code
          - function
          - implement
          - debug
          - algorithm
          - compile
          - syntax
          - variable
          - loop
          - refactor
        bm25_threshold: 0.1
        case_sensitive: false
      - name: urgent_request
        operator: OR
        method: ngram
        keywords:
          - urgent
          - immediate
          - asap
          - emergency
        ngram_threshold: 0.4
        ngram_arity: 3
        case_sensitive: false
      - name: sensitive_data
        operator: AND
        keywords:
          - SSN
          - social security number
          - credit card
        case_sensitive: false
      - name: exclude_spam
        operator: NOR
        keywords:
          - buy now
          - free money
        case_sensitive: false
      - name: regex_pattern_match
        operator: OR
        keywords:
          - user\.name@domain\.com
          - C:\Program Files\\
        case_sensitive: false
    embeddings:
      - name: ai
        threshold: 0.75
        candidates:
          - artificial intelligence
          - machine learning
          - deep learning
          - neural networks
          - AI algorithms
        aggregation_method: max
        model: auto
      - name: data_science
        threshold: 0.7
        candidates:
