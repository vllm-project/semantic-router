    - name: code_to_dev
      description: Route code/tech queries to Dev (internal developer env)
      priority: 100
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: code_keywords
      modelRefs:
        - model: qwen14b-dev
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a senior software engineer. Provide clear, production-quality code with best practices.
        - type: jailbreak
          configuration:
            enabled: true
            threshold: 0.5
        - type: pii
          configuration:
            enabled: true
            threshold: 0.6
            pii_types_allowed:
              - GPE
              - ORGANIZATION
              - DATE_TIME
    - name: general_to_prod
      description: Route general/user queries to Prod (strict safety)
      priority: 50
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: general_keywords
      modelRefs:
        - model: qwen14b-prod
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a helpful assistant operating under strict data protection policies. Never store, log, or repeat any personal information shared by the user. If a user shares personal data, remind them to avoid sharing sensitive details.
        - type: jailbreak
          configuration:
            enabled: true
            threshold: 0.9
        - type: pii
          configuration:
            enabled: true
            threshold: 0.9
