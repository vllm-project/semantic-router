apiVersion: v1
kind: ConfigMap
metadata:
  name: semantic-router-kserve-config
  labels:
    app: semantic-router
    component: config
data:
  config.yaml: |
    version: v0.3
    listeners: []
    providers:
      defaults:
        default_model: '{{MODEL_NAME_B}}'
        reasoning_families:
          deepseek:
            type: chat_template_kwargs
            parameter: thinking
          qwen3:
            type: chat_template_kwargs
            parameter: enable_thinking
          gpt-oss:
            type: reasoning_effort
            parameter: reasoning_effort
          gpt:
            type: reasoning_effort
            parameter: reasoning_effort
        default_reasoning_effort: high
      models:
        - name: '{{MODEL_NAME_A}}'
          reasoning_family: qwen3
          backend_refs:
            - name: model-a-endpoint
              endpoint: '{{PREDICTOR_SERVICE_IP_A}}:8000'
              weight: 1
        - name: '{{MODEL_NAME_B}}'
          reasoning_family: qwen3
          backend_refs:
            - name: model-b-endpoint
              endpoint: '{{PREDICTOR_SERVICE_IP_B}}:8000'
              weight: 1
    routing:
      decisions:
        - name: business_decision
          description: Business and management related queries
          priority: 100
          rules:
            operator: AND
            conditions:
              - type: domain
                name: business
          modelRefs:
            - model: '{{MODEL_NAME_B}}'
              use_reasoning: false
          plugins:
            - type: system_prompt
              configuration:
                system_prompt: You are a senior business consultant and strategic advisor.
            - type: pii
              configuration:
                enabled: true
                pii_types_allowed: []
        - name: math_decision
          description: Mathematics and quantitative reasoning
          priority: 100
          rules:
            operator: AND
            conditions:
              - type: domain
                name: math
          modelRefs:
            - model: '{{MODEL_NAME_A}}'
              use_reasoning: true
          plugins:
            - type: system_prompt
              configuration:
                system_prompt: You are a mathematics expert.
            - type: pii
              configuration:
                enabled: true
                pii_types_allowed: []
        - name: general_decision
          description: General knowledge and miscellaneous topics
          priority: 50
          rules:
            operator: AND
            conditions:
              - type: domain
                name: other
          modelRefs:
            - model: '{{MODEL_NAME_B}}'
              use_reasoning: false
          plugins:
            - type: system_prompt
              configuration:
                system_prompt: You are a helpful assistant.
            - type: semantic-cache
              configuration:
                enabled: true
                similarity_threshold: 0.75
            - type: pii
              configuration:
                enabled: true
                pii_types_allowed: []
      signals:
        domains:
          - name: business
            description: Business and management related queries
            mmlu_categories:
              - business
          - name: law
            description: Legal questions and law-related topics
            mmlu_categories:
              - law
          - name: psychology
            description: Psychology and mental health topics
            mmlu_categories:
              - psychology
          - name: biology
            description: Biology and life sciences questions
            mmlu_categories:
              - biology
          - name: chemistry
            description: Chemistry and chemical sciences questions
            mmlu_categories:
              - chemistry
          - name: history
            description: Historical questions and cultural topics
            mmlu_categories:
              - history
          - name: other
            description: General knowledge and miscellaneous topics
            mmlu_categories:
              - other
          - name: health
            description: Health and medical information queries
            mmlu_categories:
              - health
          - name: economics
            description: Economics and financial topics
            mmlu_categories:
              - economics
          - name: math
            description: Mathematics and quantitative reasoning
            mmlu_categories:
              - math
          - name: physics
            description: Physics and physical sciences
            mmlu_categories:
              - physics
          - name: computer science
            description: Computer science and programming
            mmlu_categories:
              - computer science
          - name: philosophy
            description: Philosophy and ethical questions
            mmlu_categories:
              - philosophy
          - name: engineering
            description: Engineering and technical problem-solving
            mmlu_categories:
              - engineering
      modelCards:
        - name: '{{MODEL_NAME_A}}'
        - name: '{{MODEL_NAME_B}}'
    global:
      router:
        strategy: priority
      services:
        api:
          batch_classification:
            max_batch_size: 100
            concurrency_threshold: 5
            max_concurrency: 8
            metrics:
              enabled: true
              detailed_goroutine_tracking: true
              high_resolution_timing: false
              sample_rate: 1.0
              duration_buckets:
                - 0.001
                - 0.005
                - 0.01
                - 0.025
                - 0.05
                - 0.1
                - 0.25
                - 0.5
                - 1
                - 2.5
                - 5
                - 10
                - 30
              size_buckets:
                - 1
                - 2
                - 5
                - 10
                - 20
                - 50
                - 100
                - 200
      stores:
        semantic_cache:
          enabled: true
          backend_type: memory
          similarity_threshold: 0.8
          max_entries: 1000
          ttl_seconds: 3600
          eviction_policy: fifo
          use_hnsw: true
          hnsw_m: 16
          hnsw_ef_construction: 200
          embedding_model: mmbert
      integrations:
        tools:
          enabled: false
          top_k: 3
          similarity_threshold: 0.2
          tools_db_path: config/tools_db.json
          fallback_to_empty: true
---
