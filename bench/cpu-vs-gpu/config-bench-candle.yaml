      backend_refs:
        - name: vllm-14b-prod
          endpoint: 127.0.0.1:8200
          weight: 1
          type: vllm
routing:
  decisions:
    - name: code_to_dev
      description: Route code/tech queries to Dev (internal developer env)
      priority: 100
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: code_keywords
      modelRefs:
        - model: qwen14b-dev
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a senior software engineer. Provide clear, production-quality code with best practices.
        - type: jailbreak
          configuration:
            enabled: true
            threshold: 0.5
        - type: pii
          configuration:
            enabled: true
            threshold: 0.6
            pii_types_allowed:
              - GPE
              - ORGANIZATION
              - DATE_TIME
    - name: general_to_prod
      description: Route general/user queries to Prod (strict safety)
      priority: 50
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: general_keywords
      modelRefs:
        - model: qwen14b-prod
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a helpful assistant operating under strict data protection policies. Never store, log, or repeat any personal information shared by the user. If a user shares personal data, remind them to avoid sharing sensitive details.
        - type: jailbreak
          configuration:
            enabled: true
            threshold: 0.9
        - type: pii
          configuration:
            enabled: true
            threshold: 0.9
            pii_types_allowed: []
  signals:
    keywords:
      - name: code_keywords
        operator: OR
        keywords:
          - code
          - function
          - implement
          - debug
          - refactor
          - python
          - golang
          - javascript
          - algorithm
          - class
          - API
          - bug
          - compile
      - name: general_keywords
        operator: OR
        keywords:
          - hello
          - what is
          - explain
          - tell me
          - how does
          - history
          - science
          - who
          - where
          - when
    domains:
      - name: code
        description: Programming, debugging, and software engineering tasks
      - name: general
        description: General knowledge, conversation, and miscellaneous topics
  modelCards:
    - name: qwen14b-dev
      param_size: 14b
      description: Qwen2.5 14B — Dev environment (internal)
      capabilities:
        - chat
        - code
        - reasoning
        - math
      quality_score: 0.85
    - name: qwen14b-prod
      param_size: 14b
      description: Qwen2.5 14B — Prod environment (user-facing)
      capabilities:
        - chat
        - code
        - reasoning
        - math
      quality_score: 0.85
global:
  router:
    strategy: priority
    clear_route_cache: true
  services: {}
  stores:
    semantic_cache:
      enabled: false
      embedding_model: mmbert
    memory:
      embedding_model: mmbert
    vector_store:
      embedding_model: mmbert
  integrations: {}
