defaults:
  api_url: http://127.0.0.1:8899/v1
  api_key: EMPTY
  eval_type: openai_api
  eval_batch_size: 24
  generation_config:
    temperature: 0
    max_tokens: 32768
    batch_size: 24
    timeout: 1800
    retries: 2
    retry_interval: 15

models:
  auto: vllm-sr/auto
  glm52_native: z-ai/glm-5.2

model_labels:
  auto: VSR 1.0
  glm52_native: GLM 5.2

benchmarks:
  - id: live_code_bench
    public_name: LiveCodeBench
    dataset: live_code_bench
    metric: acc
    tier: core
    default_run: true
    smoke_limit: 32
    formal_limit: 175
    eval_batch_size: 24
    generation_config:
      batch_size: 24
      max_tokens: 32768
    dataset_args:
      subset_list:
        - v6
      extra_params:
        start_date: "2025-01-01"
        end_date: "2025-04-30"
        debug: false
        review_timeout: 30
    smoke_dataset_args:
      extra_params:
        start_date: "2025-01-01"
        end_date: "2025-04-30"
        debug: false
        review_timeout: 30
    formal_generation_config:
      retries: 5
      batch_size: 24
      timeout: 1800
    sandbox:
      enabled: true
    notes: GLM 5.2 direct-vs-router LiveCodeBench Jan-Apr 2025 comparison.
