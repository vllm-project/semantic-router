# Semantic Router Configuration for Dashboard E2E Profile
# Minimal config — dashboard tests exercise the dashboard API, not routing logic.
config:
  model_config:
    "base-model":
      reasoning_family: "qwen3"
      loras:
        - name: "general-expert"
          description: "General-purpose adapter"

  categories:
    - name: other
      description: "General knowledge and miscellaneous topics"

  decisions:
    - name: "other_decision"
      description: "Default decision for all requests"
      priority: 1
      rules:
        operator: "OR"
        conditions:
          - type: "domain"
            name: "other"
      modelRefs:
        - model: base-model
          lora_name: general-expert
          use_reasoning: false

  strategy: "priority"
  default_model: general-expert

  bert_model:
    model_id: models/mom-embedding-light
    threshold: 0.6
    use_cpu: true

  classifier:
    category_model:
      model_id: "models/mom-domain-classifier"
      use_modernbert: true
      threshold: 0.6
      use_cpu: true
      category_mapping_path: "models/mom-domain-classifier/category_mapping.json"
    pii_model:
      model_id: "models/mom-pii-classifier"
      use_modernbert: false
      threshold: 0.9
      use_cpu: true
      pii_mapping_path: "models/mom-pii-classifier/pii_type_mapping.json"

  prompt_guard:
    enabled: false

  semantic_cache:
    enabled: false
