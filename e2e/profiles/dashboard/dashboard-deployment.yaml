apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-router-dashboard
  labels:
    app: semantic-router-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-router-dashboard
  template:
    metadata:
      labels:
        app: semantic-router-dashboard
    spec:
      securityContext:
        fsGroup: 65532
      containers:
        - name: dashboard
          image: ghcr.io/vllm-project/semantic-router/dashboard:latest
          imagePullPolicy: IfNotPresent
          # The image ENTRYPOINT is /app/entrypoint.sh which calls:
          #   exec su-exec nonroot:nonroot "$@"
          # So args must begin with the binary path; flags-only args would
          # make su-exec treat the first flag as a username and exit(1).
          args:
            [
              "/app/dashboard-backend",
              "-port=8700",
              "-static=/app/frontend",
              "-config=/app/config/config.yaml",
            ]
          env:
            - name: TARGET_GRAFANA_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_GRAFANA_URL
            - name: TARGET_PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_PROMETHEUS_URL
            - name: TARGET_ROUTER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_ROUTER_API_URL
            - name: TARGET_ROUTER_METRICS_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_ROUTER_METRICS_URL
            - name: TARGET_OPENWEBUI_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_OPENWEBUI_URL
                  optional: true
            - name: TARGET_CHATUI_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_CHATUI_URL
                  optional: true
            - name: ROUTER_CONFIG_PATH
              value: /app/config/config.yaml
            # ML pipeline disabled in E2E — ml-training-service image is not
            # available in CI and the pipeline is not part of the dashboard contract.
            - name: ML_PIPELINE_ENABLED
              value: "false"
            # Keep auth enabled in E2E. The dashboard fails closed when the auth
            # store cannot be initialized, so the tests use this bootstrap admin
            # and a writable temporary SQLite store.
            - name: DASHBOARD_AUTH_DB_PATH
              value: /tmp/vllm-sr-dashboard/auth.db
            - name: DASHBOARD_WORKFLOW_DB_PATH
              value: /tmp/vllm-sr-dashboard/workflow.sqlite
            - name: EVALUATION_DB_PATH
              value: /tmp/vllm-sr-dashboard/evaluations.db
            - name: DASHBOARD_JWT_SECRET
              value: dashboard-e2e-jwt-secret
            - name: DASHBOARD_ADMIN_EMAIL
              value: e2e-dashboard-admin@example.com
            - name: DASHBOARD_ADMIN_PASSWORD
              value: dashboard-e2e-password
            - name: DASHBOARD_ADMIN_NAME
              value: Dashboard E2E Admin
          ports:
            - name: http
              containerPort: 8700
          volumeMounts:
            - name: router-config
              mountPath: /app/config
              readOnly: true
            - name: dashboard-data
              mountPath: /tmp/vllm-sr-dashboard
      volumes:
        - name: router-config
          configMap:
            name: semantic-router-config
        - name: dashboard-data
          emptyDir: {}
