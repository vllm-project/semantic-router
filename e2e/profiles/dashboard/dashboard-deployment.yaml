apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-router-dashboard
  labels:
    app: semantic-router-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-router-dashboard
  template:
    metadata:
      labels:
        app: semantic-router-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/vllm-project/semantic-router/dashboard:latest
          imagePullPolicy: IfNotPresent
          # The image ENTRYPOINT is /app/entrypoint.sh which calls:
          #   exec su-exec nonroot:nonroot "$@"
          # So args must begin with the binary path; flags-only args would
          # make su-exec treat the first flag as a username and exit(1).
          args:
            [
              "/app/dashboard-backend",
              "-port=8700",
              "-static=/app/frontend",
              "-config=/app/config/config.yaml",
            ]
          env:
            - name: TARGET_GRAFANA_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_GRAFANA_URL
            - name: TARGET_PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_PROMETHEUS_URL
            - name: TARGET_ROUTER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_ROUTER_API_URL
            - name: TARGET_ROUTER_METRICS_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_ROUTER_METRICS_URL
            - name: TARGET_OPENWEBUI_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_OPENWEBUI_URL
                  optional: true
            - name: TARGET_CHATUI_URL
              valueFrom:
                configMapKeyRef:
                  name: semantic-router-dashboard-config
                  key: TARGET_CHATUI_URL
                  optional: true
            - name: ROUTER_CONFIG_PATH
              value: /app/config/config.yaml
            # ML pipeline disabled in E2E — ml-training-service image is not
            # available in CI and the pipeline is not part of the dashboard contract.
            - name: ML_PIPELINE_ENABLED
              value: "false"
            # Auth runs for real in E2E. The auth store is initialized in a
            # writable emptyDir so #1993's fail-closed guard (503 on protected
            # routes when authSvc == nil) is exercised, not bypassed. A bootstrap
            # admin is provisioned at startup and the dashboard testcases log in
            # via /api/auth/login and attach the bearer token to every request.
            - name: DASHBOARD_AUTH_DB_PATH
              value: /var/lib/dashboard/auth.db
            - name: DASHBOARD_JWT_SECRET
              value: e2e-dashboard-jwt-secret
            - name: DASHBOARD_ADMIN_EMAIL
              value: admin@e2e.local
            - name: DASHBOARD_ADMIN_PASSWORD
              value: e2e-admin-password
            - name: DASHBOARD_ADMIN_NAME
              value: E2E Admin
          ports:
            - name: http
              containerPort: 8700
          volumeMounts:
            - name: router-config
              mountPath: /app/config
              readOnly: true
            - name: dashboard-auth-data
              mountPath: /var/lib/dashboard
      volumes:
        - name: router-config
          configMap:
            name: semantic-router-config
        - name: dashboard-auth-data
          emptyDir: {}
