# Forward-Auth Backend Resources
# Two vLLM simulator deployments used by the forward-authorization testcase:
#   - forward-be: reached by the forward_authorization_header model (forward-model)
#   - static-be:  reached by the static-key model (static-model)
# Both use the llm-d inference simulator (same image used by multi-endpoint).

# ── Forward-Auth Backend ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forward-be
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forward-be
  template:
    metadata:
      labels:
        app: forward-be
        role: forward-auth
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.5.0
        imagePullPolicy: IfNotPresent
        args:
        - --model
        - Qwen/Qwen2.5-14B-Instruct
        - --port
        - '8000'
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: forward-be
  namespace: default
  labels:
    app: forward-be
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: forward-be
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: forward-be
  namespace: default
spec:
  schema:
    name: OpenAI
  backendRef:
    name: forward-be
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: forward-be
  namespace: default
spec:
  endpoints:
  - fqdn:
      hostname: forward-be.default.svc.cluster.local
      port: 8000

