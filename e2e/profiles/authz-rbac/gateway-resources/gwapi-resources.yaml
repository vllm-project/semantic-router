apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: semantic-router
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: semantic-router
  namespace: default
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources: {}
  logging:
    level:
      default: debug
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: semantic-router
  namespace: default
spec:
  gatewayClassName: semantic-router
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: semantic-router
---
# Buffer limit for AI workloads
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: semantic-router
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: semantic-router
  connection:
    bufferLimit: 50Mi
---
# AIGatewayRoute — routes RBAC-resolved model selections to backends.
# Envoy AI Gateway extracts the request model into the x-ai-eg-model header.
# Each model maps to its own backend tier.
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: semantic-router
  namespace: default
spec:
  parentRefs:
  - name: semantic-router
    kind: Gateway
    group: gateway.networking.k8s.io
  rules:
  # 14B tier — admin and premium complex/code requests
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: "Qwen/Qwen2.5-14B-Instruct"
    backendRefs:
    - name: vllm-14b
    timeouts:
      request: 60s
      backendRequest: 60s
  # 7B tier — premium simple and free tier requests
  - matches:
    - headers:
      - type: Exact
        name: x-ai-eg-model
        value: "Qwen/Qwen2.5-7B-Instruct"
    backendRefs:
    - name: vllm-7b
    timeouts:
      request: 60s
      backendRequest: 60s
  # Default fallback — unmatched requests go to 7B
  - backendRefs:
    - name: vllm-7b
    timeouts:
      request: 60s
      backendRequest: 60s
---
# EnvoyPatchPolicy to add JWT authn + ExtProc filters for semantic-router.
# Also strips any client-supplied identity headers before jwt_authn runs.
# SECURITY: The router trusts x-jwt-sub and x-jwt-groups only after Envoy
# validates the bearer token and copies claims into those headers.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: ai-gateway-prepost-extproc-patch-policy
  namespace: default
spec:
  jsonPatches:
  # Add header removal filter BEFORE jwt_authn/ext_proc to strip client-supplied identity headers.
  # This prevents spoofing of both legacy x-authz-* headers and the active x-jwt-* headers.
  - name: default/semantic-router/http
    operation:
      op: add
      path: /default_filter_chain/filters/0/typed_config/http_filters/0
      value:
        name: envoy.filters.http.lua
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            function envoy_on_request(request_handle)
              -- Remove client-supplied identity headers to prevent spoofing.
              -- jwt_authn repopulates x-jwt-* from verified bearer-token claims.
              request_handle:headers():remove("x-authz-user-id")
              request_handle:headers():remove("x-authz-user-groups")
              request_handle:headers():remove("x-jwt-sub")
              request_handle:headers():remove("x-jwt-groups")
            end
    type: type.googleapis.com/envoy.config.listener.v3.Listener
  # Add JWT authn filter so authz routing uses verified bearer-token claims.
  - name: default/semantic-router/http
    operation:
      op: add
      path: /default_filter_chain/filters/0/typed_config/http_filters/1
      value:
        name: envoy.filters.http.jwt_authn
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
          providers:
            authz_rbac:
              issuer: semantic-router-e2e
              audiences:
              - semantic-router
              localJwks:
                inlineString: '{"keys":[{"kty":"oct","k":"c2VtYW50aWMtcm91dGVyLWF1dGh6LXJiYWMtaHMyNTYtc2VjcmV0","alg":"HS256","kid":"authz-rbac-e2e"}]}'
              fromHeaders:
              - name: Authorization
                valuePrefix: "Bearer "
              claimToHeaders:
              - headerName: x-jwt-sub
                claimName: sub
              - headerName: x-jwt-groups
                claimName: groups
          rules:
          - match:
              prefix: /
            requires:
              requiresAny:
                requirements:
                - providerName: authz_rbac
                - allowMissing: {}
    type: type.googleapis.com/envoy.config.listener.v3.Listener
  # Add ExtProc filter for semantic-router after jwt_authn populates x-jwt-* headers.
  - name: default/semantic-router/http
    operation:
      op: add
      path: /default_filter_chain/filters/0/typed_config/http_filters/2
      value:
        name: semantic-router-extproc
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
          allow_mode_override: true
          grpcService:
            envoyGrpc:
              authority: semantic-router.vllm-semantic-router-system:50051
              clusterName: semantic-router
            timeout: 60s
          message_timeout: 60s
          processing_mode:
            request_body_mode: BUFFERED
            request_header_mode: SEND
            request_trailer_mode: SKIP
            response_body_mode: BUFFERED
            response_header_mode: SEND
            response_trailer_mode: SKIP
    type: type.googleapis.com/envoy.config.listener.v3.Listener
  - name: semantic-router
    operation:
      op: add
      path: ''
      value:
        connect_timeout: 60s
        http2_protocol_options: {}
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: semantic-router
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: semantic-router.vllm-semantic-router-system.svc.cluster.local
                    port_value: 50051
        name: semantic-router
        type: STRICT_DNS
    type: type.googleapis.com/envoy.config.cluster.v3.Cluster
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: semantic-router
  type: JSONPatch
