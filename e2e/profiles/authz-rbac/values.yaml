replicaCount: 1
image:
  repository: ghcr.io/vllm-project/semantic-router/extproc
  pullPolicy: Never
  tag: e2e-test
service:
  type: ClusterIP
  port: 8080
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: Qwen/Qwen2.5-7B-Instruct
    models:
      - name: Qwen/Qwen2.5-14B-Instruct
        external_model_ids:
          vllm: Qwen/Qwen2.5-14B-Instruct
        backend_refs:
          - name: vllm-14b
            endpoint: vllm-14b.default.svc.cluster.local:8000
            weight: 1
            type: vllm
      - name: Qwen/Qwen2.5-7B-Instruct
        external_model_ids:
          vllm: Qwen/Qwen2.5-7B-Instruct
        backend_refs:
          - name: vllm-7b
            endpoint: vllm-7b.default.svc.cluster.local:8000
            weight: 1
            type: vllm
  routing:
    decisions:
      - name: admin_unrestricted
        description: Admin users get 14B with reasoning
        priority: 300
        rules:
          operator: AND
          conditions:
            - type: authz
              name: admin
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: premium_complex
        description: Premium users + complex queries get 14B
        priority: 250
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: complex_analysis
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
      - name: premium_code
        description: Premium users + code requests get 14B
        priority: 240
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: code_request
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: false
      - name: premium_default
        description: Premium users simple queries get 7B
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: free_default
        description: Free users get 7B
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: authz
              name: free_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
    signals:
      keywords:
        - name: complex_analysis
          operator: OR
          keywords:
            - analyze
            - reasoning
            - think step by step
            - explain why
            - compare
            - evaluate
        - name: code_request
          operator: OR
          keywords:
            - write code
            - implement
            - function
            - algorithm
            - debug
            - refactor
      domains:
        - name: code
          description: Programming, debugging, and software engineering tasks
        - name: general
          description: General knowledge, conversation, and miscellaneous topics
      role_bindings:
        - name: admin-binding
          description: Platform admins — full model access
          subjects:
            - kind: Group
              name: platform-admins
          role: admin
        - name: premium-binding
          description: Premium tier users
          subjects:
            - kind: Group
              name: premium-tier
          role: premium_user
        - name: free-binding
          description: Free tier users
          subjects:
            - kind: Group
              name: free-tier
          role: free_user
    modelCards:
      - name: Qwen/Qwen2.5-14B-Instruct
        param_size: 14b
        description: Qwen2.5 14B — high-capability model
        capabilities:
          - chat
          - code
          - reasoning
          - math
        quality_score: 0.9
      - name: Qwen/Qwen2.5-7B-Instruct
        param_size: 7b
        description: Qwen2.5 7B — efficient model
        capabilities:
          - chat
          - code
        quality_score: 0.7
  global:
    model_catalog:
      kbs: []
    router:
      clear_route_cache: true
      strategy: priority
    services:
      authz:
        fail_open: true
      ratelimit:
        fail_open: false
        providers:
          - type: local-limiter
            rules:
              - name: free-rpm
                match:
                  group: free-tier
                requests_per_unit: 3
                unit: minute
              - name: premium-rpm
                match:
                  group: premium-tier
                requests_per_unit: 10
                unit: minute
              - name: admin-rpm
                match:
                  group: platform-admins
                requests_per_unit: 500
                unit: minute
      observability:
        metrics:
          enabled: true
        tracing:
          enabled: false
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: true
            high_resolution_timing: false
            sample_rate: 1.0
            duration_buckets:
              - 0.001
              - 0.005
              - 0.01
              - 0.025
              - 0.05
              - 0.1
              - 0.25
              - 0.5
              - 1
              - 2.5
              - 5
              - 10
              - 30
            size_buckets:
              - 1
              - 2
              - 5
              - 10
              - 20
              - 50
              - 100
              - 200
    stores:
      semantic_cache:
        enabled: false
        embedding_model: mmbert
      memory:
        embedding_model: mmbert
      vector_store:
        embedding_model: mmbert
    integrations: {}
resources:
  limits:
    cpu: 2000m
    memory: 8Gi
  requests:
    cpu: 500m
    memory: 2Gi
