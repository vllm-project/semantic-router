config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: general-expert
      reasoning_families:
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
    models:
    - name: base-model
      reasoning_family: qwen3
      backend_refs:
      - name: local-vllm
        endpoint: vllm-llama3-8b-instruct.default.svc.cluster.local:8000
        weight: 1
  routing:
    decisions:
    - name: other_decision
      description: General knowledge and miscellaneous topics
      priority: 1
      rules:
        operator: OR
        conditions:
        - type: domain
          name: other
      modelRefs:
      - model: base-model
        lora_name: general-expert
        use_reasoning: false
    signals:
      domains:
      - name: other
        description: General knowledge and miscellaneous topics
    modelCards:
    - name: base-model
      loras:
      - name: general-expert
        description: General-purpose adapter
    - name: general-expert
  global:
    model_catalog:
      embeddings:
        bert:
          model_id: models/mom-embedding-light
          threshold: 0.6
          use_cpu: true
        semantic:
          mmbert_model_path: models/mom-embedding-ultra
          use_cpu: true
      modules:
        classifier:
          domain:
            model_id: models/mom-domain-classifier
            use_modernbert: true
            threshold: 0.6
            use_cpu: true
            category_mapping_path: models/mom-domain-classifier/category_mapping.json
            model_ref: domain_classifier
          pii:
            model_id: models/mom-pii-classifier
            use_modernbert: false
            threshold: 0.9
            use_cpu: true
            pii_mapping_path: models/mom-pii-classifier/pii_type_mapping.json
            model_ref: pii_classifier
        hallucination_mitigation: {}
        prompt_guard:
          enabled: false
    router:
      strategy: priority
    services: {}
    stores:
      vector_store:
        enabled: true
        backend_type: llama_stack
        file_storage_dir: /tmp/vsr-data
        max_file_size_mb: 50
        embedding_model: mmbert
        embedding_dimension: 384
        ingestion_workers: 2
        supported_formats:
        - .txt
        - .md
        llama_stack:
          endpoint: http://llama-stack.llama-stack-system.svc.cluster.local:8321
          embedding_model: sentence-transformers/all-MiniLM-L6-v2
          request_timeout_seconds: 120
          search_type: hybrid
      semantic_cache:
        enabled: false
    integrations: {}
