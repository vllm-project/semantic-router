env:
- name: EMBEDDING_MODEL_OVERRIDE
  value: qwen3
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
  routing:
    signals: {}
  global:
    model_catalog:
      embeddings:
        bert:
          model_id: models/mom-embedding-light
          threshold: 0.6
          use_cpu: true
        semantic:
          qwen3_model_path: models/mom-embedding-pro
          gemma_model_path: models/mom-embedding-flash
          use_cpu: true
          embedding_config:
            preload_embeddings: true
            model_type: qwen3
            target_dimension: 768
            enable_soft_matching: true
            min_score_threshold: 0.5
      modules:
        classifier:
          domain:
            model_id: models/mom-domain-classifier
            use_modernbert: false
            threshold: 0.6
            use_cpu: true
            category_mapping_path: models/mom-domain-classifier/category_mapping.json
            model_ref: domain_classifier
          pii:
            model_id: models/mom-pii-classifier
            use_modernbert: false
            threshold: 0.9
            use_cpu: true
            pii_mapping_path: models/mom-pii-classifier/pii_type_mapping.json
            model_ref: pii_classifier
        hallucination_mitigation: {}
        prompt_guard:
          enabled: true
          use_modernbert: false
          model_id: models/mom-jailbreak-classifier
          threshold: 0.7
          use_cpu: true
          jailbreak_mapping_path: models/mom-jailbreak-classifier/jailbreak_type_mapping.json
          model_ref: prompt_guard
    router:
      config_source: kubernetes
    services:
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: true
            high_resolution_timing: false
            sample_rate: 1.0
            duration_buckets:
            - 0.001
            - 0.005
            - 0.01
            - 0.025
            - 0.05
            - 0.1
            - 0.25
            - 0.5
            - 1
            - 2.5
            - 5
            - 10
            - 30
            size_buckets:
            - 1
            - 2
            - 5
            - 10
            - 20
            - 50
            - 100
            - 200
    stores:
      semantic_cache:
        enabled: true
        backend_type: memory
        similarity_threshold: 0.8
        max_entries: 1000
        ttl_seconds: 3600
        eviction_policy: fifo
        use_hnsw: true
        hnsw_m: 16
        hnsw_ef_construction: 200
        embedding_model: bert
    integrations:
      tools:
        enabled: true
        top_k: 3
        similarity_threshold: 0.2
        tools_db_path: config/tools_db.json
        fallback_to_empty: true
resources:
  limits:
    memory: 10Gi
    cpu: '2'
  requests:
    memory: 6Gi
    cpu: '1'
  observability:
    tracing:
      enabled: false
      provider: opentelemetry
      exporter:
        type: otlp
        endpoint: jaeger:4317
        insecure: true
      sampling:
        type: always_on
        rate: 1.0
      resource:
        service_name: vllm-semantic-router
        service_version: v0.1.0
        deployment_environment: development
