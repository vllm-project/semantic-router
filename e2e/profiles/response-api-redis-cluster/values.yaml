replicaCount: 1
image:
  repository: ghcr.io/vllm-project/semantic-router/extproc
  tag: latest
  pullPolicy: Never
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: openai/gpt-oss-20b
    models:
    - name: openai/gpt-oss-20b
      backend_refs:
      - name: test-endpoint
        endpoint: mock-vllm.default.svc.cluster.local:8000
        weight: 1
  routing:
    decisions:
    - name: default_decision
      description: Default catch-all decision
      priority: 1
      rules:
        operator: OR
        conditions:
        - type: domain
          name: other
      modelRefs:
      - model: openai/gpt-oss-20b
        use_reasoning: false
    signals:
      domains:
      - name: other
        description: General knowledge and miscellaneous topics
        mmlu_categories:
        - other
    modelCards:
    - name: openai/gpt-oss-20b
  global:
    model_catalog:
      embeddings: {}
      modules:
        classifier:
          domain:
            model_id: ''
            threshold: 0.6
            use_cpu: true
            use_modernbert: false
            category_mapping_path: ''
            model_ref: domain_classifier
          pii:
            model_id: ''
            threshold: 1.0
            use_cpu: true
            pii_mapping_path: ''
            model_ref: pii_classifier
        hallucination_mitigation: {}
    router:
      strategy: priority
    services:
      response_api:
        enabled: true
        store_backend: redis
        ttl_seconds: 10
        max_responses: 1000
        redis:
          cluster_mode: true
          cluster_addresses:
          - redis-cluster-0.redis-cluster.default.svc.cluster.local:6379
          - redis-cluster-1.redis-cluster.default.svc.cluster.local:6379
          - redis-cluster-2.redis-cluster.default.svc.cluster.local:6379
          key_prefix: 'sr:'
          pool_size: 10
          min_idle_conns: 2
          max_retries: 3
          dial_timeout: 5
          read_timeout: 3
          write_timeout: 3
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: false
            high_resolution_timing: false
            sample_rate: 1.0
      observability:
        tracing:
          enabled: false
    stores: {}
    integrations: {}
resources:
  limits:
    cpu: '2'
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi
