config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: openai/gpt-oss-20b
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
    models:
      - name: openai/gpt-oss-20b
        backend_refs:
          - name: mock-vllm
            endpoint: mock-vllm.default.svc.cluster.local:8000
            weight: 1
  routing:
    decisions:
      - name: math_decision
        description: Mathematics and quantitative reasoning
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: domain
              name: math
        modelRefs:
          - model: openai/gpt-oss-20b
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a mathematics expert. Provide step-by-step solutions with clear explanations. Show your work and verify calculations.
      - name: science_decision
        description: Science and natural sciences
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: domain
              name: science
        modelRefs:
          - model: openai/gpt-oss-20b
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a science expert. Explain scientific concepts clearly and accurately. Use examples and analogies when helpful.
      - name: technology_decision
        description: Technology and computer science
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: domain
              name: technology
        modelRefs:
          - model: openai/gpt-oss-20b
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a technology and programming expert. Provide practical solutions with code examples when appropriate.
      - name: history_decision
        description: History and cultural topics
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: domain
              name: history
        modelRefs:
          - model: openai/gpt-oss-20b
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a history expert. Provide accurate historical information with context and relevant details.
      - name: general_decision
        description: General knowledge and miscellaneous topics
        priority: 50
        rules:
          operator: AND
          conditions:
            - type: domain
              name: general
        modelRefs:
          - model: openai/gpt-oss-20b
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a helpful and knowledgeable assistant. Provide accurate, helpful responses across a wide range of topics.
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.75
    signals:
      domains:
        - name: math
          description: Mathematics and quantitative reasoning
          mmlu_categories:
            - math
        - name: science
          description: Science and natural sciences
          mmlu_categories:
            - physics
            - chemistry
            - biology
        - name: technology
          description: Technology and computer science
          mmlu_categories:
            - "computer science"
        - name: history
          description: History and cultural topics
          mmlu_categories:
            - history
        - name: general
          description: General knowledge and miscellaneous topics
          mmlu_categories:
            - other
    modelCards:
      - name: openai/gpt-oss-20b
  global:
    router:
      strategy: priority
    services:
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: true
            high_resolution_timing: false
            sample_rate: 1.0
            duration_buckets:
              - 0.001
              - 0.005
              - 0.01
              - 0.025
              - 0.05
              - 0.1
              - 0.25
              - 0.5
              - 1
              - 2.5
              - 5
              - 10
              - 30
            size_buckets:
              - 1
              - 2
              - 5
              - 10
              - 20
              - 50
              - 100
              - 200
      observability:
        tracing:
          enabled: true
          provider: opentelemetry
          exporter:
            type: otlp
            endpoint: jaeger:4317
            insecure: true
          sampling:
            type: always_on
            rate: 1.0
          resource:
            service_name: vllm-semantic-router
            service_version: v0.1.0
            deployment_environment: development
    stores:
      semantic_cache:
        enabled: true
        backend_type: memory
        similarity_threshold: 0.8
        max_entries: 1000
        ttl_seconds: 3600
        eviction_policy: fifo
        embedding_model: mmbert
      memory:
        embedding_model: mmbert
      vector_store:
        embedding_model: mmbert
    integrations:
      tools:
        enabled: true
        top_k: 3
        similarity_threshold: 0.2
        tools_db_path: config/tools_db.json
        fallback_to_empty: true
