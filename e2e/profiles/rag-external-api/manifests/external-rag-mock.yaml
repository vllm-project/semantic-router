apiVersion: v1
kind: ConfigMap
metadata:
  name: external-rag-mock
  namespace: default
data:
  server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    last_request = b"{}"

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/last-request":
                self.send_error(404)
                return
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(last_request)

        def do_POST(self):
            global last_request
            if self.path != "/query":
                self.send_error(404)
                return
            length = int(self.headers.get("Content-Length", "0"))
            last_request = self.rfile.read(length)
            request = json.loads(last_request)
            body = b'{"content":"external-rag-e2e-context"}'
            if "__EXTERNAL_RAG_E2E_OVERSIZE__" in request.get("query", ""):
                body += b" "
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, _format, *_args):
            return

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-rag-mock
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-rag-mock
  template:
    metadata:
      labels:
        app: external-rag-mock
    spec:
      containers:
        - name: server
          image: python:3.12-alpine
          command: ["python", "/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /last-request
              port: http
            periodSeconds: 2
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: external-rag-mock
---
apiVersion: v1
kind: Service
metadata:
  name: external-rag-mock
  namespace: default
spec:
  selector:
    app: external-rag-mock
  ports:
    - name: http
      port: 8080
      targetPort: http
