version: v0.3

providers:
  defaults:
    default_model: "Qwen/Qwen2.5-14B-Instruct"
  models:
    - name: "Qwen/Qwen2.5-14B-Instruct"
      backend_refs:
        - name: vllm-ar
          endpoint: 127.0.0.1:8000
          weight: 1
    - name: "Qwen/Qwen-Image"
      backend_refs:
        - name: vllm-omni
          endpoint: 127.0.0.1:8001
          weight: 1

routing:
  modelCards:
    - name: "Qwen/Qwen2.5-14B-Instruct"
      modality: ar
    - name: "Qwen/Qwen-Image"
      modality: diffusion
      capabilities: [image_generation]

  signals:
    domains:
      - name: text_generation
        description: Text generation and general queries.
        mmlu_categories: [other]
    modality:
      - name: AR
        description: Text-only response via autoregressive LLM.
      - name: DIFFUSION
        description: Image generation via diffusion model.
      - name: BOTH
        description: Hybrid response requiring both text and image.

  decisions:
    - name: image_generation
      description: Route image generation requests to the diffusion model.
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: modality
            name: DIFFUSION
      modelRefs:
        - model: "Qwen/Qwen-Image"
          use_reasoning: false
      plugins:
        - type: image_gen
          configuration:
            enabled: true
            backend: vllm_omni
            backend_config:
              base_url: "http://localhost:8001"
              model: "Qwen/Qwen-Image"
              num_inference_steps: 4
              cfg_scale: 0.0
            default_width: 1024
            default_height: 1024
            timeout_seconds: 120

    - name: text_and_image
      description: Route hybrid text+image requests to both models in parallel.
      priority: 190
      rules:
        operator: AND
        conditions:
          - type: modality
            name: BOTH
      modelRefs:
        - model: "Qwen/Qwen2.5-14B-Instruct"
          use_reasoning: false
        - model: "Qwen/Qwen-Image"
          use_reasoning: false
      plugins:
        - type: image_gen
          configuration:
            enabled: true
            backend: vllm_omni
            backend_config:
              base_url: "http://localhost:8001"
              model: "Qwen/Qwen-Image"
              num_inference_steps: 4
              cfg_scale: 0.0
            default_width: 1024
            default_height: 1024
            timeout_seconds: 120

    - name: text_generation
      description: Default text routing for AR requests.
      priority: 1
      rules:
        operator: OR
        conditions:
          - type: modality
            name: AR
          - type: domain
            name: text_generation
      modelRefs:
        - model: "Qwen/Qwen2.5-14B-Instruct"
          use_reasoning: false

global:
  stores:
    semantic_cache:
      enabled: false
  services:
    response_api:
      enabled: true
      store_backend: memory
      ttl_seconds: 3600
      max_responses: 100
    api:
      batch_classification:
        max_batch_size: 10
        concurrency_threshold: 2
        max_concurrency: 4
    observability:
      metrics:
        enabled: true
      tracing:
        enabled: false
  integrations:
    tools:
      enabled: false
  model_catalog:
    modules:
      prompt_guard:
        enabled: false
      modality_detector:
        enabled: true
        method: hybrid
        classifier:
          model_path: "./models/mmbert32k-modality-router-merged"
          use_cpu: false
        confidence_threshold: 0.6
        lower_threshold_ratio: 0.7
        prompt_prefixes:
          - "generate an image of "
          - "create an image of "
          - "draw an image of "
          - "make an image of "
          - "generate a picture of "
          - "create a picture of "
          - "draw a picture of "
          - "generate "
          - "create "
          - "draw "
        keywords:
          - "generate an image"
          - "generate image"
          - "create an image"
          - "create image"
          - "draw"
          - "make a picture"
          - "generate a picture"
          - "create a picture"
          - "make an image"
          - "paint"
          - "sketch"
          - "render an image"
          - "produce an image"
        both_keywords:
          - "and illustrate"
          - "with a picture"
          - "with an image"
          - "with an illustration"
          - "with a diagram"
          - "include a picture"
          - "include an image"
          - "and generate an image"
          - "and draw"
          - "also generate"
          - "with a photo"
