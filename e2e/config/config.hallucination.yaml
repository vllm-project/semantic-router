version: v0.3
listeners: []
providers:
  defaults:
    default_model: qwen3
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
  - name: qwen3
    backend_refs:
    - name: mock-vllm
      endpoint: 127.0.0.1:8002
      weight: 1
routing:
  decisions:
  - name: general_decision
    description: General questions
    priority: 100
    rules:
      operator: OR
      conditions:
      - type: domain
        name: general
      - type: fact_check
        name: needs_fact_check
    modelRefs:
    - model: qwen3
      use_reasoning: false
    plugins:
    - type: hallucination
      configuration:
        enabled: true
        use_nli: true
        hallucination_action: header
        unverified_factual_action: header
        include_hallucination_details: true
  signals:
    domains:
    - name: general
      description: General questions
      mmlu_categories:
      - other
    fact_check:
    - name: needs_fact_check
      description: Query contains factual claims that should be verified against context
    - name: no_fact_check_needed
      description: Query is creative, code-related, or opinion-based - no fact verification
        needed
  modelCards:
  - name: qwen3
    reasoning_family_ref: qwen3
global:
  model_catalog:
    embeddings:
      bert:
        model_id: models/mom-embedding-light
        threshold: 0.6
        use_cpu: true
    modules:
      classifier:
        domain:
          model_id: models/mom-domain-classifier
          use_modernbert: true
          threshold: 0.6
          use_cpu: true
          category_mapping_path: models/mom-domain-classifier/category_mapping.json
          model_ref: domain_classifier
        pii:
          model_id: models/pii_classifier_modernbert-base_presidio_token_model
          use_modernbert: true
          threshold: 0.7
          use_cpu: true
          pii_mapping_path: models/mom-pii-classifier/pii_type_mapping.json
          model_ref: pii_classifier
      hallucination_mitigation:
        fact_check:
          model_id: models/mom-halugate-sentinel
          threshold: 0.6
          use_cpu: true
          model_ref: fact_check_classifier
        detector:
          model_id: models/mom-halugate-detector
          threshold: 0.8
          use_cpu: true
          model_ref: hallucination_detector
        explainer:
          model_id: models/mom-halugate-explainer
          threshold: 0.9
          use_cpu: true
          model_ref: hallucination_explainer
      prompt_guard:
        enabled: true
        use_modernbert: true
        model_id: models/mom-jailbreak-classifier
        threshold: 0.7
        use_cpu: true
        jailbreak_mapping_path: models/mom-jailbreak-classifier/jailbreak_type_mapping.json
        model_ref: prompt_guard
  router:
    strategy: priority
  services:
    api:
      batch_classification:
        metrics:
          enabled: true
          detailed_goroutine_tracking: true
          high_resolution_timing: false
          sample_rate: 1.0
  stores:
    semantic_cache:
      enabled: false
  integrations: {}
