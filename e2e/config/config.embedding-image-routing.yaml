version: v0.3
listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 300s

providers:
  defaults:
    default_model: in-cluster-vlm
  models:
    - name: in-cluster-vlm
      backend_refs:
        - name: in-cluster
          endpoint: 127.0.0.1:8000
          weight: 1
    - name: external-cloud
      backend_refs:
        - name: external
          endpoint: 127.0.0.1:8001
          weight: 1

routing:
  modelCards:
    - name: in-cluster-vlm
      modality: ar
    - name: external-cloud
      modality: ar

  signals:
    embeddings:
      # Image-modality embedding rule. Fires when the request carries an
      # image attachment whose visual signature matches one of the medical-
      # imagery anchors. Requires embedding_models.embedding_config.
      # model_type=multimodal (set below).
      - name: medical_imagery_phi
        query_modality: image
        threshold: 0.55
        aggregation_method: max
        candidates:
          - chest X-ray with patient identifier strip
          - dermatology lesion close-up photograph
          - electronic health record screenshot showing patient demographics
          - ultrasound scan with patient name overlay

  decisions:
    # Sensitive medical imagery routes to the in-cluster model.
    - name: route_medical_imagery_on_prem
      description: Route image-bearing requests with medical-imagery signature to the in-cluster model.
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: embedding
            name: medical_imagery_phi
      modelRefs:
        - model: in-cluster-vlm

    # Default fallback for text-only requests with no triggering signal.
    - name: default_text_route
      description: Default route for text-only requests where no privacy signal fires.
      priority: 1
      rules:
        operator: AND
        conditions: []
      modelRefs:
        - model: external-cloud

global:
  router:
    config_source: file
  model_catalog:
    embeddings:
      semantic:
        # The multi-modal embed model is loaded by candle-binding from
        # /app/models/mom-embedding-multimodal (auto-downloaded by the
        # router's modeldownload package on first start; backed by the
        # PVC). Set query_modality=image on a rule above to route image
        # attachments through the same shared 384-dim space.
        multimodal_model_path: models/mom-embedding-multimodal
        use_cpu: true
        embedding_config:
          model_type: multimodal
          target_dimension: 384
          preload_embeddings: true
          enable_soft_matching: false
          top_k: 1
