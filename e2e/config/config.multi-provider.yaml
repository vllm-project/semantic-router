version: v0.3
listeners: []
providers:
  defaults:
    default_model: gpt-4o
  models:
    - name: gpt-4o
      backend_refs:
        - name: openai
          base_url: https://api.openai.com/v1
          provider: openai
          type: openai
        - name: azure-east
          base_url: https://my-resource.openai.azure.com/openai/deployments/gpt-4o
          provider: azure-openai
          api_version: '2024-10-21'
          type: azure-openai
    - name: gpt-4o-mini
      backend_refs:
        - name: openai
          base_url: https://api.openai.com/v1
          provider: openai
          type: openai
    - name: claude-sonnet-4-20250514
      backend_refs:
        - name: anthropic
          base_url: https://api.anthropic.com
          provider: anthropic
          extra_headers:
            anthropic-version: '2023-06-01'
          type: anthropic
    - name: Qwen/Qwen2.5-14B-Instruct
      external_model_ids:
        vllm: Qwen/Qwen2.5-14B-Instruct
      backend_refs:
        - name: local-vllm
          endpoint: 127.0.0.1:8000
          type: vllm
routing:
  decisions:
    - name: code_to_local
      description: Code queries → local vLLM (fast, free)
      priority: 200
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: code_keywords
      modelRefs:
        - model: Qwen/Qwen2.5-14B-Instruct
          use_reasoning: false
    - name: general_to_cloud
      description: General queries → GPT-4o (cloud, with failover)
      priority: 100
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: general_keywords
      modelRefs:
        - model: gpt-4o
          use_reasoning: false
  signals:
    keywords:
      - name: code_keywords
        operator: OR
        keywords:
          - code
          - function
          - implement
          - debug
          - algorithm
          - python
          - golang
      - name: general_keywords
        operator: OR
        keywords:
          - hello
          - explain
          - what is
          - tell me
          - how does
    domains:
      - name: code
        description: Programming and software engineering
      - name: general
        description: General knowledge and conversation
  modelCards:
    - name: gpt-4o
      description: GPT-4o — prefers OpenAI, fails over to Azure
    - name: gpt-4o-mini
      description: GPT-4o Mini — OpenAI only
    - name: claude-sonnet-4-20250514
      description: Claude Sonnet 4 — Anthropic
    - name: Qwen/Qwen2.5-14B-Instruct
      description: Qwen2.5 14B — local vLLM (no auth needed)
global:
  router:
    strategy: priority
    clear_route_cache: true
  services:
    authz:
      fail_open: false
      providers:
        - type: header-injection
          headers:
            openai: x-user-openai-key
            anthropic: x-user-anthropic-key
            azure-openai: x-user-azure-openai-key
        - type: static-config
  stores:
    semantic_cache:
      enabled: false
      embedding_model: mmbert
    memory:
      embedding_model: mmbert
    vector_store:
      embedding_model: mmbert
  integrations: {}
