# ONNX classifier profile: per-family mmBERT classifiers are supported.
# Unified classifier and LoRA batch inference remain unsupported on this backend.
version: v0.3
listeners: []
providers:
  defaults:
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
  - name: qwen2.5:3b
    reasoning_family: qwen3
    backend_refs:
    - name: ollama
      endpoint: 127.0.0.1:11434
      weight: 1
routing:
  decisions:
  - name: needs_fact_check
    priority: 90
    rules:
      operator: AND
      conditions:
      - type: fact_check
        name: needs_fact_check
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: no_fact_check_needed
    priority: 89
    rules:
      operator: AND
      conditions:
      - type: fact_check
        name: no_fact_check_needed
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: satisfied
    priority: 88
    rules:
      operator: AND
      conditions:
      - type: user_feedback
        name: satisfied
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: need_clarification
    priority: 87
    rules:
      operator: AND
      conditions:
      - type: user_feedback
        name: need_clarification
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: wrong_answer
    priority: 86
    rules:
      operator: AND
      conditions:
      - type: user_feedback
        name: wrong_answer
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: want_different
    priority: 85
    rules:
      operator: AND
      conditions:
      - type: user_feedback
        name: want_different
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  - name: default
    priority: 100
    rules:
      operator: OR
      conditions:
      - type: domain
        name: general
    modelRefs:
    - model: qwen2.5:3b
      use_reasoning: false
      weight: 100
  signals:
    domains:
    - name: general
      description: General queries
    - name: engineering
      description: Technical questions
    - name: biology
      description: Biology questions
    - name: math
      description: Math questions
    - name: physics
      description: Physics questions
    - name: "computer science"
      description: Computer science questions
    fact_check:
    - name: needs_fact_check
      description: Query requires factual verification
    - name: no_fact_check_needed
      description: Query does not require factual verification
    user_feedbacks:
    - name: satisfied
      description: User is satisfied with the response
    - name: need_clarification
      description: User needs clarification
    - name: wrong_answer
      description: User indicates the answer is wrong
    - name: want_different
      description: User wants a different answer
  modelCards:
  - name: qwen2.5:3b
global:
  model_catalog:
    embeddings:
      semantic:
        use_cpu: true
        mmbert_model_path: onnx-binding/mmbert-32k-yarn-onnx
    modules:
      classifier:
        domain:
          enabled: true
          use_mmbert_32k: true
          model_id: models/mmbert32k-intent-classifier-merged-onnx
          category_mapping_path: models/mmbert32k-intent-classifier-merged-onnx/category_mapping.json
          use_cpu: true
          threshold: 0.5
          model_ref: domain_classifier
        pii:
          enabled: true
          use_mmbert_32k: true
          model_id: models/mmbert32k-pii-detector-merged-onnx
          pii_mapping_path: models/mmbert32k-pii-detector-merged-onnx/pii_mapping.json
          use_cpu: true
          threshold: 0.5
          model_ref: pii_classifier
      hallucination_mitigation:
        fact_check:
          model_id: models/mmbert32k-factcheck-classifier-merged-onnx
          use_cpu: true
          use_mmbert_32k: true
          threshold: 0.5
          model_ref: fact_check_classifier
        detector:
          model_id: models/mom-halugate-detector
          use_cpu: true
          model_ref: hallucination_detector
        explainer:
          model_id: models/mom-halugate-explainer
          use_cpu: true
          model_ref: hallucination_explainer
        enabled: true
      prompt_guard:
        enabled: true
        use_mmbert_32k: true
        model_id: models/mmbert32k-jailbreak-detector-merged-onnx
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged-onnx/jailbreak_mapping.json
        use_cpu: true
        threshold: 0.5
        model_ref: prompt_guard
      feedback_detector:
        enabled: true
        use_mmbert_32k: true
        model_id: models/mmbert32k-feedback-detector-merged-onnx
        feedback_mapping_path: models/mmbert32k-feedback-detector-merged-onnx/label_mapping.json
        use_cpu: true
        threshold: 0.5
        model_ref: feedback_detector
  router: {}
  services:
    response_api:
      enabled: true
      store_backend: memory
      ttl_seconds: 86400
      max_responses: 1000
    router_replay:
      store_backend: memory
      ttl_seconds: 2592000
      async_writes: true
  stores:
    semantic_cache:
      enabled: true
      backend_type: memory
      similarity_threshold: 0.85
      max_entries: 1000
      ttl_seconds: 3600
      eviction_policy: fifo
      embedding_model: mmbert
  integrations:
    tools:
      enabled: true
      tools_db_path: deploy/examples/runtime/tools/tools_db.json
      model_type: mmbert
      target_dim: 0
      similarity_threshold: 0.7
