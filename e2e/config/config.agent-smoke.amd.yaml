version: v0.3

listeners:
  - name: "agent-smoke-http-amd"
    address: "0.0.0.0"
    port: 8888
    timeout: "60s"

providers:
  defaults:
    default_model: "smoke-model"
  models:
    - name: "smoke-model"
      provider_model_id: "smoke-model"
      backend_refs:
        - name: "primary"
          weight: 100
          endpoint: "host.docker.internal:8000/v1"
          protocol: "http"

routing:
  modelCards:
    - name: "smoke-model"
      modality: "text"
  decisions:
    - name: "default-route"
      description: "Minimal AMD default route for agent smoke validation"
      priority: 100
      rules:
        operator: "AND"
        conditions: []
      modelRefs:
        - model: "smoke-model"
          use_reasoning: false
