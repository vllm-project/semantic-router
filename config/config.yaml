version: v0.3

listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 300s

providers:
  defaults:
    default_model: qwen2.5:3b
    default_reasoning_effort: low
    reasoning_families:
      deepseek:
        type: chat_template_kwargs
        parameter: thinking
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
      gpt-oss:
        type: reasoning_effort
        parameter: reasoning_effort
      gpt:
        type: reasoning_effort
        parameter: reasoning_effort
  models:
    - name: qwen2.5:3b
      provider_model_id: qwen2.5:3b
      backend_refs:
        - name: ollama
          endpoint: 127.0.0.1:11434
          protocol: http
          weight: 1

routing:
  modelCards:
    - name: qwen2.5:3b
      reasoning_family_ref: qwen3
      param_size: 3b
      context_window_size: 32768
      modality: text
      capabilities: [chat, analysis]
      description: Starter local model used by the repository default config.

  signals:
    keywords:
      - name: urgent_keywords
        operator: OR
        keywords: ["urgent", "immediate", "asap", "emergency"]
        case_sensitive: false
    domains:
      - name: business
        description: Business and management related queries.
        mmlu_categories: [business]
      - name: law
        description: Legal questions and law-related topics.
        mmlu_categories: [law]
      - name: health
        description: Health and medical information queries.
        mmlu_categories: [health]
      - name: other
        description: General fallback traffic.
        mmlu_categories: [other]

  decisions:
    - name: urgent_route
      description: Prioritize urgent requests before normal domain routing.
      priority: 150
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: urgent_keywords
      modelRefs:
        - model: qwen2.5:3b
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a highly responsive assistant. Focus on immediate, concise, actionable next steps.
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []

    - name: business_route
      description: Route business and management questions.
      priority: 110
      rules:
        operator: AND
        conditions:
          - type: domain
            name: business
      modelRefs:
        - model: qwen2.5:3b
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a senior business consultant. Give practical recommendations with clear tradeoffs and execution guidance.
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []

    - name: law_route
      description: Route legal and policy questions.
      priority: 110
      rules:
        operator: AND
        conditions:
          - type: domain
            name: law
      modelRefs:
        - model: qwen2.5:3b
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a legal information assistant. Provide accurate context while making it clear that the response is not legal advice.
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []

    - name: health_route
      description: Route health and medical information requests.
      priority: 110
      rules:
        operator: AND
        conditions:
          - type: domain
            name: health
      modelRefs:
        - model: qwen2.5:3b
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a health information assistant. Share evidence-based information and clearly remind users to consult professionals for diagnosis or treatment.
        - type: semantic-cache
          configuration:
            enabled: true
            similarity_threshold: 0.92
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []

    - name: default_route
      description: Catch-all route for general requests.
      priority: 50
      rules:
        operator: AND
        conditions:
          - type: domain
            name: other
      modelRefs:
        - model: qwen2.5:3b
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            system_prompt: You are a helpful general assistant. Answer clearly and directly.
        - type: semantic-cache
          configuration:
            enabled: true
            similarity_threshold: 0.75
        - type: memory
          configuration:
            enabled: true
            retrieval_limit: 5
            similarity_threshold: 0.7
            auto_store: false
        - type: pii
          configuration:
            enabled: true
            pii_types_allowed: []

global:
  services:
    router_replay:
      async_writes: true
  stores:
    semantic_cache:
      similarity_threshold: 0.8
      use_hnsw: true
      hnsw_m: 16
      hnsw_ef_construction: 200
  integrations:
    tools:
      enabled: true
      top_k: 3
      similarity_threshold: 0.2
      tools_db_path: examples/runtime/tools/tools_db.json
      fallback_to_empty: true
  model_catalog:
    embeddings:
      semantic:
        qwen3_model_path: models/mom-embedding-pro
        use_cpu: true
        hnsw_config:
          model_type: qwen3
          preload_embeddings: true
          target_dimension: 1024
          enable_soft_matching: true
          min_score_threshold: 0.5
    system:
      prompt_guard: models/mom-jailbreak-classifier
      domain_classifier: models/mom-domain-classifier
      pii_classifier: models/mom-pii-classifier
      fact_check_classifier: models/mom-halugate-sentinel
      hallucination_detector: models/mom-halugate-detector
      hallucination_explainer: models/mom-halugate-explainer
    modules:
      prompt_guard:
        model_ref: prompt_guard
        use_modernbert: false
        use_mmbert_32k: false
        jailbreak_mapping_path: models/mom-jailbreak-classifier/label_mapping.json
      classifier:
        domain:
          model_ref: domain_classifier
          threshold: 0.6
          use_modernbert: false
          use_mmbert_32k: false
          category_mapping_path: models/mom-domain-classifier/category_mapping.json
        pii:
          model_ref: pii_classifier
          threshold: 0.9
          use_mmbert_32k: false
          pii_mapping_path: models/mom-pii-classifier/label_mapping.json
      hallucination_mitigation:
        fact_check:
          model_ref: fact_check_classifier
        detector:
          model_ref: hallucination_detector
        explainer:
          model_ref: hallucination_explainer
