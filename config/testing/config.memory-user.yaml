# vllm-sr CLI config for Memory Integration Test
# This is the user-facing vllm-sr format

version: v0.1

# Listeners - Network configuration (required)
listeners:
  - name: "http-8888"
    address: "0.0.0.0"
    port: 8888
    timeout: "300s"

# Signals - Domain-based for category auto-generation
signals:
  domains:
    - name: "general"
      description: "General queries for memory testing"
      mmlu_categories: ["other"]
  keywords: []

# Decisions - Simple routing for test (using domain for category auto-gen)
decisions:
  - name: "default_route"
    description: "Default route for memory testing"
    priority: 1
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "general"
    modelRefs:
      - model: "qwen3"
        use_reasoning: false
    plugins:
      # System prompt plugin (Bug #808: must work together with memory)
      - type: "system_prompt"
        configuration:
          system_prompt: "You are a helpful AI assistant with access to user memories. Use the provided context to personalize your responses."
      # PII plugin (blocks before memory if PII detected)
      - type: "pii"
        configuration:
          enabled: true
          pii_types_allowed: []  # Block all PII types
      # Memory plugin config (per-decision override example)
      - type: "memory"
        configuration:
          enabled: true
          retrieval_limit: 5
          similarity_threshold: 0.70

# Providers - LLM backend
providers:
  models:
    - name: "qwen3"
      endpoints:
        - name: "llm_katan"
          weight: 1
          endpoint: "host.docker.internal:8000"
          protocol: "http"
  default_model: "qwen3"

# External models for memory operations
external_models:
  - llm_provider: "vllm"
    model_role: "memory_extraction"
    llm_endpoint:
      address: "host.docker.internal"
      port: 8000
      name: "llm_katan"
    llm_model_name: "qwen3"
    llm_timeout_seconds: 30
  - llm_provider: "vllm"
    model_role: "memory_rewrite"
    llm_endpoint:
      address: "host.docker.internal"
      port: 8000
      name: "llm_katan"
    llm_model_name: "qwen3"
    llm_timeout_seconds: 30

# Memory configuration - the key feature being tested
memory:
  enabled: true
  milvus:
    address: "host.docker.internal:19530"
    collection: "memory_test_ci"
    dimension: 384
  embedding:
    model: "all-MiniLM-L6-v2"
    dimension: 384
  default_retrieval_limit: 5
  default_similarity_threshold: 0.70
  query_rewrite:
    enabled: true
    model_role: "memory_rewrite"
    max_tokens: 100
  extraction:
    enabled: true
    model_role: "memory_extraction"
    batch_size: 10
