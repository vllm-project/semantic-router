version: v0.1
listeners:
  - name: http
    address: 0.0.0.0
    port: 8899
    timeout: 300s
signals:
  keywords:
    - name: billing_keywords
      operator: contains
      keywords:
        - invoice
        - refund
      case_sensitive: false
providers:
  models:
    - name: qwen3-4b
      reasoning_family: qwen3
      access_key: secret-a
      param_size: 4b
      api_format: openai
      description: Small reasoning model
      capabilities:
        - reasoning
        - support
      quality_score: 0.62
      pricing:
        currency: USD
        prompt_per_1m: 0.15
        completion_per_1m: 0.60
      endpoints:
        - name: primary
          weight: 100
          endpoint: router.internal:8000
    - name: qwen3-32b
      reasoning_family: qwen3
      endpoints:
        - name: secure
          weight: 50
          endpoint: api.example.com:443
          protocol: https
  default_model: qwen3-4b
  reasoning_families:
    qwen3:
      type: effort
      parameter: reasoning_effort
  default_reasoning_effort: medium
decisions:
  - name: billing-route
    description: Route billing questions
    priority: 90
    rules:
      operator: AND
      conditions:
        - type: keyword
          name: billing_keywords
    modelRefs:
      - model: qwen3-4b
        use_reasoning: false
      - model: qwen3-32b
        use_reasoning: true
        reasoning_effort: high
