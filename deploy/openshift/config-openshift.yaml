        conditions:
          - type: domain
            name: math
      modelRefs:
        - model: Model-A
          use_reasoning: true
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a mathematics expert. Provide step-by-step solutions and explain mathematical concepts clearly.
            mode: replace
    - name: physics
      description: Route physics queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: physics
      modelRefs:
        - model: Model-A
          use_reasoning: true
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a physics expert with deep understanding of physical laws and phenomena.
            mode: replace
    - name: "computer science"
      description: Route computer science queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: computer science
      modelRefs:
        - model: Model-A
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a computer science expert with knowledge of algorithms, data structures, and software engineering.
            mode: replace
    - name: philosophy
      description: Route philosophy queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: philosophy
      modelRefs:
        - model: Model-B
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a philosophy expert with comprehensive knowledge of philosophical traditions and ethical theories.
            mode: replace
    - name: engineering
      description: Route engineering queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: engineering
      modelRefs:
        - model: Model-A
          use_reasoning: true
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are an engineering expert across multiple disciplines.
            mode: replace
    - name: general
      description: Route general queries
      priority: 5
      rules:
        operator: OR
        conditions:
          - type: domain
            name: general
      modelRefs:
        - model: Model-A
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a knowledgeable assistant for general questions.
            mode: replace
  signals:
    domains:
      - name: business
      - name: law
      - name: psychology
      - name: biology
      - name: chemistry
      - name: history
      - name: other
      - name: health
      - name: economics
      - name: math
      - name: physics
      - name: computer science
      - name: philosophy
      - name: engineering
      - name: general
  modelCards:
    - name: Model-A
    - name: Model-B
global:
  router:
    auto_model_name: auto
  services:
    observability:
      tracing:
        enabled: true
        sampling_ratio: 0.1
        otlp_endpoint: ''
      metrics:
        enabled: true
        port: 9190
    api:
      batch_classification:
        enabled: true
        max_batch_size: 32
        max_concurrency: 4
  stores:
    semantic_cache:
      enabled: true
      backend_type: memory
      similarity_threshold: 0.8
      max_entries: 1000
      ttl_seconds: 3600
      eviction_policy: fifo
      embedding_model: mmbert
    memory:
      embedding_model: mmbert
    vector_store:
      embedding_model: mmbert
  integrations:
    tools:
      enabled: true
      top_k: 3
      similarity_threshold: 0.2
      tools_db_path: config/tools_db.json
      fallback_to_empty: true
