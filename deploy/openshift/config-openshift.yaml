version: v0.3
listeners: []
providers:
  defaults:
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: Model-A
      reasoning_family: qwen3
      backend_refs:
        - name: model-a-endpoint
          endpoint: DYNAMIC_MODEL_A_IP:8000
          weight: 1
    - name: Model-B
      reasoning_family: qwen3
      backend_refs:
        - name: model-b-endpoint
          endpoint: DYNAMIC_MODEL_B_IP:8001
          weight: 1
routing:
  decisions:
    - name: business
      description: Route business and management queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: business
      modelRefs:
        - model: Model-B
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a senior business consultant and strategic advisor with expertise in corporate strategy, operations management, financial analysis, marketing, and organizational development.
            mode: replace
    - name: law
      description: Route legal queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: law
      modelRefs:
        - model: Model-B
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a knowledgeable legal expert with comprehensive understanding of legal principles, case law, statutory interpretation, and legal procedures.
            mode: replace
    - name: psychology
      description: Route psychology queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: psychology
      modelRefs:
        - model: Model-B
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a psychology expert with deep knowledge of cognitive processes, behavioral patterns, mental health, and therapeutic approaches.
            mode: replace
    - name: biology
      description: Route biology queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: biology
      modelRefs:
        - model: Model-A
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a biology expert with comprehensive knowledge spanning molecular biology, genetics, cell biology, ecology, and evolution.
            mode: replace
    - name: chemistry
      description: Route chemistry queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: chemistry
      modelRefs:
        - model: Model-A
          use_reasoning: true
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a chemistry expert specializing in chemical reactions, molecular structures, and laboratory techniques.
            mode: replace
    - name: history
      description: Route history queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: history
      modelRefs:
        - model: Model-A
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a historian with expertise across different time periods and cultures.
            mode: replace
    - name: other
      description: Route general queries
      priority: 5
      rules:
        operator: OR
        conditions:
          - type: domain
            name: other
      modelRefs:
        - model: Model-A
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a helpful and knowledgeable assistant.
            mode: replace
    - name: health
      description: Route health and medical queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: health
      modelRefs:
        - model: Model-B
          use_reasoning: false
      plugins:
        - type: system_prompt
          configuration:
            enabled: true
            system_prompt: You are a health and medical information expert with knowledge of anatomy, physiology, diseases, and treatments.
            mode: replace
    - name: economics
      description: Route economics queries
      priority: 10
      rules:
        operator: OR
        conditions:
          - type: domain
            name: economics
      modelRefs:
        - model: Model-A
          use_reasoning: false
