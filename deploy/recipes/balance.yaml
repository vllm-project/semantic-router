version: v0.3
listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 1200s

providers:
  defaults:
    default_model: qwen/qwen3.5-rocm
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
    default_reasoning_effort: high
  # Example pricing intentionally exaggerates tier spread so Insights makes
  # SIMPLE vs PREMIUM savings obvious. These are not vendor billing quotes.
  models:
    - name: qwen/qwen3.5-rocm
      provider_model_id: qwen/qwen3.5-rocm
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.00
        completion_per_1m: 0.00
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: google/gemini-2.5-flash-lite
      provider_model_id: google/gemini-2.5-flash-lite
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.01
        completion_per_1m: 0.04
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: google/gemini-3.1-pro
      provider_model_id: google/gemini-3.1-pro
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.48
        completion_per_1m: 1.92
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: openai/gpt5.4
      provider_model_id: openai/gpt5.4
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 1.20
        completion_per_1m: 4.80
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: anthropic/claude-opus-4.6
      provider_model_id: anthropic/claude-opus-4.6
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 1.80
        completion_per_1m: 7.20
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1

routing:
  signals:
    keywords:
      - name: jailbreak_attempt
        operator: OR
        keywords:
          - ignore previous instructions
          - disregard all rules
          - bypass safety
          - jailbreak
          - pretend you are
          - act as if
          - forget your guidelines
        case_sensitive: false
      - name: simple_request_markers
        operator: OR
        keywords:
          - quick answer
          - answer briefly
          - keep it short
          - one sentence
          - simple explanation
          - tl;dr
          - briefly explain
          - concise answer
          - 简短回答
          - 简单解释
          - 用一句话
          - 直接回答
        case_sensitive: false
      - name: creative_request_markers
        operator: OR
        keywords:
          - brainstorm
          - creative writing
          - write a story
          - write a poem
          - imagine
          - slogan
          - tagline
          - campaign idea
          - make it more vivid
          - rewrite creatively
          - 想点子
          - 头脑风暴
          - 写一个故事
          - 写一首诗
        case_sensitive: false
      - name: reasoning_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - think step by step
          - reason carefully
          - prove rigorously
          - derive the formula
          - compare trade-offs
          - analyze the root cause
          - evaluate multiple approaches
          - formal proof
          - 逐步推理
          - 严格证明
          - 推导公式
          - 权衡利弊
          - 深入分析
        case_sensitive: false
      - name: multi_step_markers
        operator: OR
        method: ngram
        ngram_threshold: 0.35
        ngram_arity: 3
        keywords:
          - step by step
          - first second third
          - phased plan
          - implementation plan
          - migration plan
          - checklist
          - roadmap
          - 分步骤
          - 实施计划
          - 路线图
          - 检查清单
        case_sensitive: false
      - name: agentic_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - create a migration plan
          - propose an execution plan
          - refactor this system
          - troubleshoot the issue
          - implement the workflow
          - automate the process
          - break this into tasks
          - 制定迁移计划
          - 排查这个问题
          - 实施这个方案
          - 自动化这个流程
        case_sensitive: false
      - name: code_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - code
          - function
          - class
          - stack trace
          - api
          - sql
          - python
          - typescript
          - debug
          - refactor
          - bug
          - endpoint
          - algorithm
          - recursion
        case_sensitive: false
      - name: architecture_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - distributed system
          - microservices
          - rate limiter
          - high availability
          - consistency model
          - sharding strategy
          - event driven architecture
          - reliability architecture
          - system design
          - fault tolerance
          - observability architecture
        case_sensitive: false
      - name: output_format_markers
        operator: OR
        keywords:
          - json
          - yaml
          - csv
          - markdown table
          - bullet points
          - format as
          - return a schema
          - 用表格
          - 用 json
          - 按列表输出
        case_sensitive: false
      - name: reference_heavy_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - cite sources
          - according to
          - reference the paper
          - compare the literature
          - use case law
          - relevant regulation
          - cite the rfc
          - 引用资料
          - 根据文献
          - 参考法规
        case_sensitive: false
      - name: verification_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.18
        keywords:
          - verify this
          - verify the claim
          - cite the source
          - cite sources
          - is this true
          - fact check this
          - verify with evidence
          - 核实一下
          - 给出处
          - 这是真的吗
          - 请核验
          - 请给来源
        case_sensitive: false
      - name: constraint_markers
        operator: OR
        keywords:
          - must
          - only
          - exactly
          - at least
          - no more than
          - cannot
          - avoid
          - do not
          - 必须
          - 只能
          - 不超过
          - 不要
        case_sensitive: false
      - name: negation_markers
        operator: OR
        keywords:
          - except
          - unless
          - without
          - instead of
          - do not include
          - not this but that
          - 除非
          - 不包含
          - 不要用
          - 而不是
        case_sensitive: false
      - name: legal_risk_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        keywords:
          - contract clause
          - liability analysis
          - compliance memo
          - regulatory risk
          - legal exposure
          - indemnity
          - jurisdiction
          - lawsuit
          - 合同条款
          - 合规分析
          - 法律风险
          - 责任认定
        case_sensitive: false
      - name: correction_feedback_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.20
        keywords:
          - that's wrong
          - this is wrong
          - incorrect
          - wrong answer
          - try again
          - answer again
          - fix your answer
          - 错了
          - 不对
          - 回答错了
          - 重新回答
          - 再答一次
        case_sensitive: false
      - name: clarification_feedback_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.20
        keywords:
          - explain more clearly
          - be more clear
          - simplify this
          - clarify that
          - give an example
          - explain in simpler terms
          - 讲清楚一点
          - 说得更清楚
          - 简单一点
          - 举个例子
          - 解释得更明白
        case_sensitive: false

    preferences:
      - name: concise_answers
        description: Users who prefer short and direct replies.
        threshold: 0.70
        examples:
          - keep it concise
          - answer briefly
          - one paragraph only
          - bullet points only
          - 简洁一点
          - 简短回答
      - name: creative_collaboration
        description: Users who want exploratory or imaginative help.
        threshold: 0.70
        examples:
          - brainstorm with me
          - make it more imaginative
          - give me multiple creative options
          - make the writing more vivid
          - 帮我头脑风暴
          - 多给几个创意方向
      - name: coding_partner
        description: Users who want implementation, debugging, or refactoring help.
        threshold: 0.70
        examples:
          - write the code
          - debug this issue
          - refactor this module
          - explain the stack trace
          - 帮我写代码
          - 帮我排查 bug
      - name: structured_delivery
        description: Users who want output in a constrained structure.
        threshold: 0.70
        examples:
          - return json
          - use a markdown table
          - list the steps clearly
          - format the answer as yaml
          - 用表格输出
          - 按步骤列出
      - name: agentic_execution
        description: Users who want a plan, workflow, or execution-oriented answer.
        threshold: 0.70
        examples:
          - propose an execution plan
          - create a migration checklist
          - give me a troubleshooting workflow
          - break this into tasks
          - 给我实施计划
          - 给我排查流程

    embeddings:
      - name: fast_qa_en
        threshold: 0.72
        aggregation_method: max
        candidates:
          - Who are you?
          - What does CPU stand for?
          - What is the capital of France?
          - Briefly explain what an API is.
          - What is the boiling point of water?
      - name: fast_qa_zh
        threshold: 0.72
        aggregation_method: max
        candidates:
          - 你是谁？
          - CPU 是什么意思？
          - 法国的首都是哪里？
          - 什么是 API？请简单解释。
          - 水的沸点是多少？
      - name: creative_tasks
        threshold: 0.74
        aggregation_method: max
        candidates:
          - Brainstorm a launch campaign for a new tea brand.
          - Write a short poem about late-night coding.
          - Rewrite this paragraph to sound more cinematic.
          - Create three slogan options for a climate startup.
          - 帮我想一个更有画面感的品牌故事。
      - name: business_analysis
        threshold: 0.75
        aggregation_method: max
        candidates:
          - Compare two pricing strategies for a B2B SaaS product.
          - Analyze CAC, LTV, and retention trade-offs for a subscription business.
          - Draft a market-entry strategy for a new AI tooling startup.
          - Evaluate org design options for a fast-growing product team.
      - name: history_explainer
        threshold: 0.75
        aggregation_method: max
        candidates:
          - Compare the causes of the Roman Empire's decline with later empires.
          - Explain how industrialization changed political power in Europe.
          - Analyze the historical consequences of the Treaty of Versailles.
          - 总结明治维新对日本国家能力的长期影响。
      - name: psychology_support
        threshold: 0.75
        aggregation_method: max
        candidates:
          - Explain cognitive biases that affect negotiation outcomes.
          - Compare attachment styles and how they affect adult relationships.
          - Analyze burnout patterns in high-pressure knowledge work.
          - 帮我解释拖延背后的常见心理机制。
      - name: code_general
        threshold: 0.75
        aggregation_method: max
        candidates:
          - Debug this Python stack trace and explain the likely bug.
          - Refactor this TypeScript function to reduce duplication.
          - Write a SQL query to aggregate weekly active users.
          - Explain the difference between sync and async execution.
      - name: complex_stem
        threshold: 0.77
        aggregation_method: max
        candidates:
          - Compare modeling approaches for turbulent fluid simulation.
          - Explain the trade-offs between battery chemistries for grid storage.
          - Analyze a protein-folding pipeline and its computational bottlenecks.
          - Design an anomaly-detection method for sensor networks.
      - name: architecture_design
        threshold: 0.78
        aggregation_method: max
        candidates:
          - Design a distributed rate limiter and explain failure modes.
          - Plan a migration from a monolith to event-driven microservices.
          - Propose a consistency strategy for a global payments platform.
          - Design a multi-tenant observability architecture with low latency.
      - name: reasoning_general_en
        threshold: 0.78
        aggregation_method: max
        candidates:
          - Compare multiple approaches and recommend the best one with trade-offs.
          - Analyze the root cause step by step and justify the conclusion.
          - Build a rigorous argument from first principles.
          - Synthesize several constraints into a single recommendation.
      - name: reasoning_general_zh
        threshold: 0.78
        aggregation_method: max
        candidates:
          - 请从多个角度严格分析并给出结论。
          - 请逐步推理，比较几种方案的取舍。
          - 请从第一性原理出发建立完整论证。
          - 请综合多个约束给出系统性建议。
      - name: premium_legal_analysis
        threshold: 0.80
        aggregation_method: max
        candidates:
          - Analyze indemnity, limitation of liability, and governing-law risks in this contract.
          - Draft a legal-risk memo for a cross-border data transfer policy.
          - Compare regulatory exposure under two compliance strategies.
          - 评估该合同条款中的责任分配、赔偿和合规风险。

    fact_check:
      - name: needs_fact_check
        description: Narrow factual-verification route for requests that explicitly ask for evidence or source checking.

    user_feedbacks:
      - name: wrong_answer
        description: Conservative follow-up signal for explicit correction or dissatisfaction.
      - name: need_clarification
        description: Conservative follow-up signal for explicit requests to restate more clearly.

    language:
      - name: en
        description: English language queries
      - name: zh
        description: Chinese language queries

    domains:
      - name: computer science
        description: Programming, software systems, debugging, APIs, and infrastructure.
      - name: math
        description: Mathematics, statistics, and quantitative reasoning.
      - name: physics
        description: Physics and physical sciences.
      - name: chemistry
        description: Chemistry and chemical sciences.
      - name: biology
        description: Biology and life sciences.
      - name: engineering
        description: Engineering and technical problem solving.
      - name: business
        description: Business, product, operations, and management topics.
      - name: economics
        description: Economics, pricing, incentives, and market dynamics.
      - name: law
        description: Legal, compliance, policy, and regulatory topics.
      - name: psychology
        description: Psychology, behavior, and mental models.
      - name: philosophy
        description: Philosophy, ethics, and abstract argumentation.
      - name: history
        description: Historical explanation, comparison, and context.
      - name: other
        description: General knowledge and miscellaneous topics.

    context:
      - name: short_context
        min_tokens: "0"
        max_tokens: 1K
      - name: medium_context
        min_tokens: 1K
        max_tokens: 8K
      - name: long_context
        min_tokens: 8K
        max_tokens: 256K

    complexity:
      - name: general_reasoning
        threshold: 0.14
        hard:
          candidates:
            - compare several approaches and justify the trade-offs
            - build a rigorous step-by-step argument
            - synthesize constraints into a plan
            - root-cause analysis for a complex failure
            - derive the answer from first principles
            - 严格论证并比较取舍
          image_candidates: []
        easy:
          candidates:
            - brief definition
            - quick summary
            - simple explanation
            - short direct answer
            - rewrite this sentence
            - 简单解释一下
          image_candidates: []
        description: General difficulty boundary for simple answers versus synthesis-heavy reasoning.
      - name: code_task
        threshold: 0.12
        composer:
          operator: AND
          conditions:
            - type: domain
              name: computer science
        hard:
          candidates:
            - design a distributed system with failure handling
            - debug a race condition in production
            - optimize a database query plan at scale
            - refactor a large service boundary safely
            - migrate a monolith to microservices
          image_candidates: []
        easy:
          candidates:
            - explain what this function does
            - fix a small bug in this code snippet
            - write a helper function
            - convert this loop to a list comprehension
            - explain the stack trace briefly
          image_candidates: []
        description: Coding and software-engineering difficulty for cheap code help versus hard systems work.
      - name: math_task
        threshold: 0.12
        composer:
          operator: AND
          conditions:
            - type: domain
              name: math
        hard:
          candidates:
            - prove the theorem rigorously
            - derive the equation step by step
            - analyze asymptotic behavior formally
            - solve a differential equation with proof
            - prove this by contradiction
          image_candidates: []
        easy:
          candidates:
            - what is 2 plus 2
            - solve this simple linear equation
            - calculate a percentage
            - basic geometry area question
            - simple arithmetic word problem
          image_candidates: []
        description: Math difficulty for simple calculations versus formal proofs and derivations.
      - name: legal_risk
        threshold: 0.12
        composer:
          operator: AND
          conditions:
            - type: domain
              name: law
        hard:
          candidates:
            - analyze indemnity, liability, and jurisdiction risk
            - compare two compliance strategies and regulatory exposure
            - draft a legal-risk memo for cross-border operations
            - interpret contract clauses with risk trade-offs
          image_candidates: []
        easy:
          candidates:
            - what does NDA mean
            - define arbitration clause
            - explain what compliance means
            - brief overview of a privacy policy
          image_candidates: []
        description: Legal risk boundary for informational law questions versus premium-risk analysis.

    jailbreak:
      - name: jailbreak_standard
        method: classifier
        threshold: 0.65
        include_history: false
        description: BERT classifier - standard sensitivity, single-turn
      - name: jailbreak_strict
        method: classifier
        threshold: 0.40
        include_history: false
        description: BERT classifier - strict sensitivity, full history

    pii:
      - name: pii_deny_all
        threshold: 0.90
        include_history: false
        description: Block all detected PII types.
      - name: pii_relaxed
        threshold: 0.75
        pii_types_allowed:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - PERSON
          - LOCATION
          - DATE_TIME
          - URL
          - ORG
        include_history: false
        description: Block high-sensitivity PII while allowing common contact entities.

  decisions:
    - name: premium_legal
      description: Premium-only route for high-value legal and compliance analysis.
      priority: 260
      rules:
        operator: AND
        conditions:
          - type: domain
            name: law
          - operator: OR
            conditions:
              - type: embedding
                name: premium_legal_analysis
              - type: complexity
                name: legal_risk:medium
              - type: complexity
                name: legal_risk:hard
              - operator: AND
                conditions:
                  - type: keyword
                    name: legal_risk_markers
                  - operator: OR
                    conditions:
                      - type: keyword
                        name: reference_heavy_markers
                      - type: keyword
                        name: constraint_markers
      modelRefs:
        - model: anthropic/claude-opus-4.6
          use_reasoning: true
          reasoning_effort: high
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: reasoning_math
      description: Dedicated reasoning tier for proofs, derivations, and hard math.
      priority: 250
      rules:
        operator: AND
        conditions:
          - type: domain
            name: math
          - operator: OR
            conditions:
              - type: complexity
                name: math_task:hard
              - type: keyword
                name: reasoning_request_markers
              - type: embedding
                name: reasoning_general_en
              - type: embedding
                name: reasoning_general_zh
      modelRefs:
        - model: openai/gpt5.4
          use_reasoning: true
          reasoning_effort: high
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: reasoning_philosophy
      description: Dedicated reasoning tier for philosophy, ethics, and abstract argumentation.
      priority: 245
      rules:
        operator: AND
        conditions:
          - type: domain
            name: philosophy
          - operator: OR
            conditions:
              - type: keyword
                name: reasoning_request_markers
              - type: embedding
                name: reasoning_general_en
              - type: embedding
                name: reasoning_general_zh
              - type: complexity
                name: general_reasoning:hard
      modelRefs:
        - model: openai/gpt5.4
          use_reasoning: true
          reasoning_effort: high
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: complex_architecture
      description: Complex systems, architecture, and large-scope technical design.
      priority: 240
      rules:
        operator: AND
        conditions:
          - operator: OR
            conditions:
              - type: domain
                name: computer science
              - type: domain
                name: engineering
          - operator: OR
            conditions:
              - type: embedding
                name: architecture_design
              - type: complexity
                name: code_task:hard
              - type: keyword
                name: architecture_markers
          - operator: OR
            conditions:
              - type: keyword
                name: multi_step_markers
              - type: keyword
                name: agentic_request_markers
              - type: complexity
                name: general_reasoning:hard
              - type: context
                name: long_context
      modelRefs:
        - model: google/gemini-3.1-pro
          use_reasoning: true
          reasoning_effort: high
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: complex_stem
      description: Complex STEM analysis outside the dedicated math reasoning route.
      priority: 235
      rules:
        operator: AND
        conditions:
          - operator: OR
            conditions:
              - type: domain
                name: physics
              - type: domain
                name: chemistry
              - type: domain
                name: biology
              - type: domain
                name: engineering
          - operator: OR
            conditions:
              - type: embedding
                name: complex_stem
              - type: complexity
                name: general_reasoning:hard
              - type: keyword
                name: reasoning_request_markers
              - type: context
                name: long_context
      modelRefs:
        - model: google/gemini-3.1-pro
          use_reasoning: true
          reasoning_effort: high
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: feedback_wrong_answer_verified
      description: Narrow recovery path for explicit corrections on evidence-sensitive or high-stakes follow-ups.
      priority: 232
      rules:
        operator: AND
        conditions:
          - type: user_feedback
            name: wrong_answer
          - type: keyword
            name: correction_feedback_markers
          - operator: OR
            conditions:
              - type: fact_check
                name: needs_fact_check
              - type: keyword
                name: reference_heavy_markers
              - type: domain
                name: law
              - type: domain
                name: business
              - type: domain
                name: history
          - operator: OR
            conditions:
              - type: context
                name: short_context
              - type: context
                name: medium_context
      modelRefs:
        - model: google/gemini-3.1-pro
          use_reasoning: true
          reasoning_effort: medium
      plugins:
        - type: router_replay
          configuration:
            enabled: true
            max_records: 100000
            capture_request_body: true
            capture_response_body: true
            max_body_bytes: 4096

    - name: medium_code_general
      description: Low-medium cost coding, debugging, refactoring, and technical Q&A.
      priority: 220
      rules:
        operator: AND
        conditions:
          - operator: OR
            conditions:
              - type: domain
                name: computer science
              - type: keyword
                name: code_request_markers
              - type: embedding
                name: code_general
              - type: preference
                name: coding_partner
          - operator: OR
            conditions:
              - type: complexity
                name: code_task:easy
              - type: complexity
                name: code_task:medium
              - type: complexity
                name: general_reasoning:easy
              - type: complexity
                name: general_reasoning:medium
      modelRefs:
