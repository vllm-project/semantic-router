# Paired-source contract: this file is the canonical runtime artifact for the balance profile.
# DECISION_TREE / IF ELSE authoring lowers into flat routing.decisions, so /config/router and routing decompile expose flat ROUTE blocks instead of tree syntax.
# Keep deploy/recipes/balance.dsl beside this YAML when the original authoring form matters.
version: v0.3
listeners:
  - address: 0.0.0.0
    name: http-8899
    port: 8899
    timeout: 1200s
providers:
  defaults:
    default_model: qwen/qwen3.5-rocm
    default_reasoning_effort: low
    reasoning_families:
      qwen3:
        parameter: enable_thinking
        type: chat_template_kwargs
  models:
    - backend_refs:
        - endpoint: vllm:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: qwen/qwen3.5-rocm
      pricing:
        completion_per_1m: 0
        currency: USD
        prompt_per_1m: 0
      provider_model_id: qwen/qwen3.5-rocm
      reasoning_family: qwen3
    - backend_refs:
        - endpoint: vllm:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: google/gemini-2.5-flash-lite
      pricing:
        completion_per_1m: 0.04
        currency: USD
        prompt_per_1m: 0.01
      provider_model_id: google/gemini-2.5-flash-lite
      reasoning_family: qwen3
    - backend_refs:
        - endpoint: vllm:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: google/gemini-3.1-pro
      pricing:
        completion_per_1m: 1.92
        currency: USD
        prompt_per_1m: 0.48
      provider_model_id: google/gemini-3.1-pro
      reasoning_family: qwen3
    - backend_refs:
        - endpoint: vllm:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: openai/gpt5.4
      pricing:
        completion_per_1m: 4.8
        currency: USD
        prompt_per_1m: 1.2
      provider_model_id: openai/gpt5.4
      reasoning_family: qwen3
    - backend_refs:
        - endpoint: vllm:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: anthropic/claude-opus-4.6
      pricing:
        completion_per_1m: 7.2
        currency: USD
        prompt_per_1m: 1.8
      provider_model_id: anthropic/claude-opus-4.6
      reasoning_family: qwen3
routing:
  decisions:
    - description: Premium-only route for high-value legal and compliance analysis.
      modelRefs:
        - model: anthropic/claude-opus-4.6
          reasoning_effort: high
          use_reasoning: true
      name: premium_legal
      plugins:
        - configuration:
            capture_request_body: true
            capture_response_body: true
            enabled: true
            max_body_bytes: 4096
            max_records: 100000
          type: router_replay
      priority: 260
      rules:
        conditions:
          - conditions:
              - name: law
                type: domain
              - name: legal_risk_markers
                type: keyword
              - name: premium_legal_analysis
                type: embedding
            operator: OR
          - conditions:
              - name: premium_legal_analysis
                type: embedding
              - name: verification_required
                type: projection
              - name: legal_risk:medium
                type: complexity
              - name: legal_risk:hard
                type: complexity
            operator: OR
        operator: AND
      tier: 1
    - description: Narrow premium reasoning lane for formal math proofs and derivations.
