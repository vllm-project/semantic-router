version: v0.3
listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 1200s

providers:
  defaults:
    default_model: qwen/qwen3.5-rocm
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
    default_reasoning_effort: high
  # Example pricing intentionally exaggerates tier spread so Insights makes
  # SIMPLE vs PREMIUM savings obvious. These are not vendor billing quotes.
  models:
    - name: qwen/qwen3.5-rocm
      provider_model_id: qwen/qwen3.5-rocm
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.00
        completion_per_1m: 0.00
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: google/gemini-2.5-flash-lite
      provider_model_id: google/gemini-2.5-flash-lite
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.01
        completion_per_1m: 0.04
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: google/gemini-3.1-pro
      provider_model_id: google/gemini-3.1-pro
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 0.48
        completion_per_1m: 1.92
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: openai/gpt5.4
      provider_model_id: openai/gpt5.4
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 1.20
        completion_per_1m: 4.80
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1
    - name: anthropic/claude-opus-4.6
      provider_model_id: anthropic/claude-opus-4.6
      reasoning_family: qwen3
      pricing:
        currency: USD
        prompt_per_1m: 1.80
        completion_per_1m: 7.20
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          weight: 1

