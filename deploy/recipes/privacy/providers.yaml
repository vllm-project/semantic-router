version: v0.3

listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 1200s

providers:
  defaults:
    default_model: local/private-qwen
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
    default_reasoning_effort: medium
  models:
    - name: local/private-qwen
      reasoning_family: qwen3
      provider_model_id: qwen/qwen3.5-rocm
      api_format: openai
      pricing:
        currency: USD
        prompt_per_1m: 0.00
        completion_per_1m: 0.00
      backend_refs:
        - name: local-vllm
          endpoint: localhost:8000
          protocol: http
          type: vllm
          weight: 1
    - name: cloud/frontier-reasoning
      reasoning_family: qwen3
      provider_model_id: anthropic/claude-opus-4.6
      api_format: openai
      pricing:
        currency: USD
        prompt_per_1m: 1.80
        completion_per_1m: 7.20
      backend_refs:
        - name: vllm_primary
          endpoint: localhost:8000
          protocol: http
          weight: 1
