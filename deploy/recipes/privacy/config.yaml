version: v0.3
listeners:
  - address: 0.0.0.0
    name: http-8899
    port: 8899
    timeout: 1200s
providers:
  defaults:
    default_model: local/private-qwen
    default_reasoning_effort: medium
    reasoning_families:
      qwen3:
        parameter: enable_thinking
        type: chat_template_kwargs
  models:
    - api_format: openai
      backend_refs:
        - endpoint: localhost:8000
          name: local-vllm
          protocol: http
          type: vllm
          weight: 1
      name: local/private-qwen
      pricing:
        completion_per_1m: 0
        currency: USD
        prompt_per_1m: 0
      provider_model_id: qwen/qwen3.5-rocm
      reasoning_family: qwen3
    - api_format: openai
      backend_refs:
        - endpoint: localhost:8000
          name: vllm_primary
          protocol: http
          weight: 1
      name: cloud/frontier-reasoning
      pricing:
        completion_per_1m: 7.2
        currency: USD
        prompt_per_1m: 1.8
      provider_model_id: anthropic/claude-opus-4.6
      reasoning_family: qwen3
routing:
  decisions:
    - description: Keep suspicious or jailbreak-like prompts on the local safety lane with restricted capabilities.
      modelRefs:
        - model: local/private-qwen
          use_reasoning: false
      name: local_security_containment
      plugins:
        - configuration:
            enabled: true
            max_body_bytes: 2048
            max_records: 50000
          type: router_replay
      priority: 300
      rules:
        conditions:
          - name: security_containment
            type: kb
          - name: policy_security_local_only
            type: projection
        operator: OR
      tier: 1
      tool_scope: none
    - description: Route PII, private code, and internal documents to the local model with local-only tool access.
      modelRefs:
        - model: local/private-qwen
          reasoning_effort: medium
          use_reasoning: true
      name: local_privacy_policy
      plugins:
        - configuration:
            enabled: true
            max_body_bytes: 2048
            max_records: 50000
          type: router_replay
      priority: 250
      rules:
        conditions:
          - name: privacy_policy
            type: kb
        operator: AND
      tier: 2
      tool_scope: local_only
    - description: Send only non-sensitive, non-suspicious high-reasoning traffic to the cloud frontier model with full tool access.
      modelRefs:
        - model: cloud/frontier-reasoning
          reasoning_effort: high
          use_reasoning: true
      name: cloud_frontier_reasoning
      plugins:
        - configuration:
            enabled: true
            max_body_bytes: 2048
            max_records: 50000
          type: router_replay
      priority: 200
      rules:
        conditions:
          - name: frontier_reasoning
            type: kb
        operator: AND
      tier: 3
      tool_scope: full
    - description: Default local route for non-sensitive tasks that do not justify cloud escalation.
      modelRefs:
        - model: local/private-qwen
          reasoning_effort: medium
          use_reasoning: true
      name: local_standard
      plugins:
        - configuration:
            enabled: true
            max_body_bytes: 2048
            max_records: 50000
          type: router_replay
      priority: 100
      rules:
        conditions:
          - name: local_standard
            type: kb
          - conditions:
              - name: policy_local_reasoning
                type: projection
              - name: policy_privacy_cloud_allowed
                type: projection
              - name: policy_security_standard
                type: projection
            operator: AND
        operator: OR
      tier: 4
      tool_scope: standard
  modelCards:
    - capabilities:
        - frontier_reasoning
        - deep_synthesis
        - architecture_review
        - long_context
      context_window_size: 262144
      description: High-cost cloud frontier lane reserved for non-sensitive deep reasoning and synthesis.
      modality: text
      name: cloud/frontier-reasoning
      quality_score: 0.92
      tags:
        - deployment:cloud
        - policy:non_sensitive_only
        - tier:frontier
        - cost:high
    - capabilities:
        - self_hosted
        - privacy_locality
        - security_containment
        - code
        - internal_docs
      context_window_size: 131072
      description: Low-cost self-hosted lane for privacy-sensitive, suspicious, and standard local traffic.
      modality: text
      name: local/private-qwen
      quality_score: 0.74
      tags:
        - deployment:self_hosted
        - policy:local_first
        - policy:privacy_first
        - cost:free
  projections:
    mappings:
      - calibration:
          method: sigmoid_distance
          slope: 10
        method: threshold_bands
        name: security_policy_band
        outputs:
          - lt: 0.35
            name: policy_security_standard
          - gte: 0.35
            name: policy_security_local_only
        source: security_risk_score
      - calibration:
          method: sigmoid_distance
          slope: 10
        method: threshold_bands
        name: privacy_policy_band
        outputs:
          - lt: 0.35
            name: policy_privacy_cloud_allowed
          - gte: 0.35
            name: policy_privacy_local_only
        source: privacy_risk_score
      - calibration:
          method: sigmoid_distance
          slope: 10
        method: threshold_bands
        name: reasoning_policy_band
        outputs:
          - lt: 0.5
            name: policy_local_reasoning
          - gte: 0.5
            name: policy_frontier_reasoning
        source: reasoning_pressure
      - calibration:
          method: sigmoid_distance
          slope: 10
        method: threshold_bands
        name: privacy_override_band
        outputs:
          - lt: 0.55
            name: privacy_override_inactive
          - gte: 0.55
            name: privacy_override_active
        source: privacy_contrastive_score
    scores:
      - inputs:
          - name: jailbreak_strict
            type: jailbreak
            weight: 0.82
          - name: prompt_injection_markers
            type: keyword
            value_source: confidence
            weight: 0.48
          - name: exfiltration_markers
            type: keyword
            value_source: confidence
            weight: 0.5
          - name: override_directive_dense
            type: structure
            weight: 0.6
          - name: fenced_instruction_blob
            type: structure
            weight: 0.35
        method: weighted_sum
        name: security_risk_score
      - inputs:
          - name: pii_strict
            type: pii
            weight: 0.92
          - name: local_only_markers
            type: keyword
            value_source: confidence
            weight: 0.15
          - name: private_code_markers
            type: keyword
            value_source: confidence
            weight: 0.5
          - name: internal_doc_markers
            type: keyword
            value_source: confidence
            weight: 0.2
          - name: private_code_request
            type: embedding
            value_source: confidence
            weight: 0.32
          - name: pii_request
            type: embedding
            value_source: confidence
            weight: 0.4
          - name: internal_document_request
            type: embedding
            value_source: confidence
            weight: 0.4
          - name: long_context
            type: context
            weight: 0.06
        method: weighted_sum
        name: privacy_risk_score
      - inputs:
          - name: reasoning_request_markers
            type: keyword
            value_source: confidence
            weight: 0.28
          - name: research_request_markers
            type: keyword
            value_source: confidence
            weight: 0.12
          - name: architecture_markers
            type: keyword
            value_source: confidence
            weight: 0.28
          - name: multi_step_markers
            type: keyword
            value_source: confidence
            weight: 0.1
          - name: frontier_reasoning_request
            type: embedding
            value_source: confidence
            weight: 0.48
          - name: medium_context
            type: context
            weight: 0.04
          - name: long_context
            type: context
            weight: 0.16
          - name: many_questions
            type: structure
            weight: 0.08
          - name: ordered_workflow
            type: structure
            weight: 0.1
          - name: frontier_reasoning:medium
            type: complexity
            weight: 0.08
          - name: frontier_reasoning:hard
            type: complexity
            weight: 0.3
          - name: code_reasoning:medium
            type: complexity
            weight: 0.02
          - name: code_reasoning:hard
            type: complexity
            weight: 0.18
        method: weighted_sum
        name: reasoning_pressure
      - inputs:
          - kb: privacy_kb
            metric: private_vs_public
            type: kb_metric
            value_source: score
            weight: 1
        method: weighted_sum
        name: privacy_contrastive_score
  signals:
    kb:
      - target:
          kind: group
          value: security_containment
        kb: privacy_kb
        match: best
        name: security_containment
      - target:
          kind: group
          value: privacy_policy
        kb: privacy_kb
        match: best
        name: privacy_policy
      - target:
          kind: group
          value: frontier_reasoning
        kb: privacy_kb
        match: best
        name: frontier_reasoning
      - target:
          kind: group
          value: local_standard
        kb: privacy_kb
        match: best
        name: local_standard
    complexity:
      - description: General reasoning boundary between local handling and frontier-cloud escalation.
        easy:
          candidates:
            - give a short definition
            - answer briefly
            - rewrite this paragraph
            - explain the error in one paragraph
            - summarize this simply
        hard:
          candidates:
            - compare several approaches and justify the trade-offs
            - build a rigorous argument from first principles
            - perform a deep root-cause analysis across multiple systems
            - synthesize many constraints into one recommendation
            - write a detailed strategy memo with alternatives
        name: frontier_reasoning
        threshold: 0.12
      - description: Coding difficulty boundary for simple local help versus frontier-scale engineering analysis.
        easy:
          candidates:
            - explain what this function does
            - fix a small bug
            - rename variables for clarity
            - write a helper function
            - summarize the stack trace
        hard:
          candidates:
            - design a distributed service with rollback and failure handling
            - debug a production race condition across multiple services
            - plan a large-scale refactor with compatibility constraints
            - analyze deep performance trade-offs across a codebase
        name: code_reasoning
        threshold: 0.12
    context:
      - max_tokens: "999"
        min_tokens: "0"
        name: short_context
      - max_tokens: "7999"
        min_tokens: 1K
        name: medium_context
      - max_tokens: 256K
        min_tokens: 8K
        name: long_context
    embeddings:
      - aggregation_method: max
        candidates:
          - Review source code from a private repository and keep all processing on-prem.
          - Debug proprietary backend code from our internal monorepo without sending it to a cloud model.
          - Refactor a confidential microservice implementation from our company codebase.
          - Analyze an internal SDK source file and suggest code changes locally.
          - 帮我分析公司私有仓库里的源代码，不要发到云端。
        name: private_code_request
        threshold: 0.79
      - aggregation_method: max
        candidates:
          - Review an HR spreadsheet containing employee phone numbers, home addresses, and government identifiers.
          - Analyze a CRM export with names, phone numbers, street addresses, and account numbers.
          - Process payroll records that include passport numbers, bank accounts, and home addresses.
          - Summarize a file that contains employee personal identifiers and contact details locally.
          - 帮我处理包含手机号、家庭住址和身份证号的员工信息，并且只在本地分析。
        name: pii_request
        threshold: 0.82
      - aggregation_method: max
        candidates:
          - Summarize this internal design document and highlight the risks.
          - Extract action items from a confidential board memo.
          - Summarize this internal runbook, extract the action items, and keep it on the local model.
          - Analyze a private incident postmortem for follow-up actions.
          - 帮我总结这份内部设计文档，只能在本地模型处理，不要发到云端。
        name: internal_document_request
        threshold: 0.9
      - aggregation_method: max
        candidates:
          - Compare several distributed system architectures and recommend the best one with explicit trade-offs and failure modes.
          - Produce a rigorous root-cause analysis for a multi-service production outage.
          - Evaluate multi-region failover strategies and justify the recovery guarantees.
          - Synthesize multiple technical constraints into an architecture recommendation with explicit alternatives.
          - 从第一性原理比较多种系统方案，并给出带取舍的架构建议。
        name: frontier_reasoning_request
        threshold: 0.88
    jailbreak:
      - description: Strict jailbreak classifier for routing suspicious prompts into local containment.
        method: classifier
        name: jailbreak_strict
        threshold: 0.45
    keywords:
      - bm25_threshold: 0.18
        case_sensitive: false
        keywords:
          - local processing only
          - local model only
          - on-prem only
          - all processing on-prem
          - process this on-prem
          - do not send to the cloud
          - do not upload this
          - confidential handling
          - internal use only
          - handle this locally
          - stay on the local model
          - stay on local infrastructure
          - 本地处理
          - 仅限本地模型
          - 不要发到云端
          - 不要上传
          - 机密处理
          - 仅供内部使用
        method: bm25
        name: local_only_markers
        operator: OR
      - bm25_threshold: 0.08
        case_sensitive: false
        keywords:
          - private repo
          - private repository
          - internal repo
          - proprietary code
          - company codebase
          - our source tree
          - internal SDK
          - monorepo
          - private package
          - confidential code
          - 私有仓库
          - 内部仓库
          - 公司代码
          - 内部 SDK
          - 私有代码
          - 保密代码
        method: bm25
        name: private_code_markers
        operator: OR
      - bm25_threshold: 0.18
        case_sensitive: false
        keywords:
          - internal document
          - internal doc
          - internal design doc
          - internal design document
          - internal architecture decision record
          - internal ADR
          - confidential memo
          - confidential board memo
          - internal runbook
          - internal incident review
          - internal postmortem
          - internal SOP
          - internal RFC
          - employee handbook
          - confidential board deck
          - internal board deck
          - internal-only document
          - 内部文档
          - 内部设计文档
          - 内部架构决策记录
          - 内部备忘录
          - 保密备忘录
          - 内部运行手册
          - 内部事故复盘
          - 内部 SOP
          - 内部 RFC
          - 员工手册
          - 董事会材料
          - 仅内部流转
        method: bm25
        name: internal_doc_markers
        operator: OR
      - bm25_threshold: 0.08
        case_sensitive: false
        keywords:
          - ignore previous instructions
          - ignore all previous instructions
          - ignore the instructions
          - ignore the system instructions
          - disregard the system prompt
          - bypass safety
          - override policy
          - reveal hidden instructions
          - reveal the system prompt
          - hidden system prompt
          - forget your rules
          - you are now unrestricted
          - ignore the developer message
          - 忽略之前的指令
          - 忽略系统提示词
          - 绕过安全
          - 覆盖策略
          - 泄露隐藏指令
          - 忘掉你的规则
        method: bm25
        name: prompt_injection_markers
        operator: OR
      - bm25_threshold: 0.08
        case_sensitive: false
        keywords:
          - show the system prompt
          - show the hidden system prompt
          - reveal the system prompt
          - reveal the hidden prompt
          - reveal the hidden system prompt
          - print the secret
          - print the api key
          - dump credentials
          - expose the api key
          - leak the policy
          - show internal instructions
          - 输出系统提示词
          - 泄露提示词
          - 打印密钥
          - 暴露凭据
          - 泄露内部规则
        method: bm25
        name: exfiltration_markers
        operator: OR
      - bm25_threshold: 0.18
        case_sensitive: false
        keywords:
          - reason carefully
          - step by step
          - compare the trade-offs
          - compare the tradeoffs
          - justify the trade-offs
          - trade-offs between
          - analyze deeply
          - first principles
          - root cause analysis
          - root-cause analysis
          - failure modes
          - 逐步推理
          - 仔细分析
          - 比较取舍
          - 从第一性原理出发
          - 根因分析
        method: bm25
        name: reasoning_request_markers
        operator: OR
      - bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - research memo
          - synthesize the sources
          - compare the evidence
          - survey the literature
          - write an analysis memo
          - 研究备忘录
          - 综合资料
          - 对比证据
          - 文献综述
          - 分析备忘录
        method: bm25
        name: research_request_markers
        operator: OR
      - bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - distributed system
          - system design
          - migration strategy
          - failover strategy
          - event-driven architecture
          - event-driven architectures
          - multi-region
          - multi-region architecture
          - control plane
          - data plane
          - consistency trade-offs
          - failure modes
          - fault tolerance
          - recovery guarantees
          - system architecture
          - 分布式系统
          - 系统设计
          - 迁移策略
          - 故障切换方案
          - 控制面
          - 数据面
          - 一致性取舍
          - 容错设计
        method: bm25
        name: architecture_markers
        operator: OR
      - bm25_threshold: 0.1
        case_sensitive: false
        keywords:
          - phased plan
          - execution plan
          - checklist
          - runbook
          - rollback plan
          - implementation steps
          - 分阶段方案
          - 实施计划
          - 检查清单
          - 运行手册
          - 回滚方案
          - 实施步骤
        method: bm25
        name: multi_step_markers
        operator: OR
    pii:
      - description: Detect personally identifiable information that should remain on local infrastructure.
        name: pii_strict
        threshold: 0.85
    structure:
      - description: Prompts with several explicit questions, usually indicating multi-part reasoning.
        feature:
          source:
            pattern: '[?？]'
            type: regex
          type: count
        name: many_questions
        predicate:
          gte: 4
      - description: Prompts with ordered workflow markers.
        feature:
          source:
            sequences:
              - - first
                - then
              - - first
                - next
                - finally
              - - 先
                - 再
              - - 首先
                - 然后
            type: sequence
          type: sequence
        name: ordered_workflow
      - description: Override-oriented instruction language is dense relative to prompt length.
        feature:
          source:
            keywords:
              - ignore
              - override
              - bypass
              - reveal
              - forget
              - system prompt
              - developer message
              - 忽略
              - 覆盖
              - 绕过
              - 泄露
              - 提示词
            type: keyword_set
          type: density
        name: override_directive_dense
        predicate:
          gt: 0.06
      - description: Prompt contains fenced or tagged instruction wrappers often used in injection attempts.
        feature:
          source:
            pattern: (?i)(<system>|<assistant>|begin system prompt|```system|###\s*system)
            type: regex
          type: exists
        name: fenced_instruction_blob
