version: v0.3

listeners:
  - name: http-8899
    address: 0.0.0.0
    port: 8899
    timeout: 1200s

global:
  services:
    response_api:
      enabled: true
      store_backend: memory
      ttl_seconds: 86400
      max_responses: 1000
    router_replay:
      enabled: true
      store_backend: postgres
      ttl_seconds: 2592000
      async_writes: false
      postgres:
        host: postgres
        port: 5432
        database: vsr
        user: router
        password: router-secret
        ssl_mode: disable
        table_name: router_replay_records
  router:
    learning:
      enabled: true
      adaptations:
        session_aware:
          enabled: true
          scope: conversation
          identity:
            headers:
              session: x-session-id
              conversation: x-conversation-id
          tuning:
            idle_timeout_seconds: 300
            min_turns_before_switch: 1
            switch_margin: 0.05
            cache_weight: 0.20
            handoff_penalty: 0.05
            handoff_penalty_weight: 1.0
            switch_history_weight: 0.04
            max_cache_cost_multiplier: 2.5

providers:
  defaults:
    default_model: qwen/qwen3.6-rocm
    default_reasoning_effort: medium
    reasoning_families:
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
  models:
    - name: qwen/qwen3.6-rocm
      api_format: openai
      reasoning_family: qwen3
      provider_model_id: qwen/qwen3.6-rocm
      pricing:
        currency: USD
        prompt_per_1m: 0.00
        cached_input_per_1m: 0.00
        completion_per_1m: 0.00
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          type: vllm
          weight: 1
    - name: google/gemini-2.5-flash-lite
      api_format: openai
      reasoning_family: qwen3
      provider_model_id: google/gemini-2.5-flash-lite
      pricing:
        currency: USD
        prompt_per_1m: 0.01
        cached_input_per_1m: 0.002
        completion_per_1m: 0.04
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          type: vllm
          weight: 1
    - name: google/gemini-3.1-pro
      api_format: openai
      reasoning_family: qwen3
      provider_model_id: google/gemini-3.1-pro
      pricing:
        currency: USD
        prompt_per_1m: 0.48
        cached_input_per_1m: 0.12
        completion_per_1m: 1.92
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          type: vllm
          weight: 1
    - name: openai/gpt5.4
      api_format: openai
      reasoning_family: qwen3
      provider_model_id: openai/gpt5.4
      pricing:
        currency: USD
        prompt_per_1m: 1.20
        cached_input_per_1m: 0.30
        completion_per_1m: 4.80
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          type: vllm
          weight: 1
    - name: anthropic/claude-opus-4.6
      api_format: openai
      reasoning_family: qwen3
      provider_model_id: anthropic/claude-opus-4.6
      pricing:
        currency: USD
        prompt_per_1m: 1.80
        cached_input_per_1m: 0.45
        completion_per_1m: 7.20
      backend_refs:
        - name: vllm_primary
          endpoint: vllm:8000
          protocol: http
          type: vllm
          weight: 1

routing:
  modelCards:
    - name: qwen/qwen3.6-rocm
      context_window_size: 262144
      description: Local AMD vLLM alias backed by Qwen3.6 for privacy-sensitive work, safety containment, simple traffic, and low-cost fallbacks.
      capabilities:
        - chat
        - privacy_locality
        - private_code
        - simple_qa
        - tool_use
      quality_score: 0.78
      modality: text
      tags:
        - deployment:self_hosted
        - tier:simple
        - policy:privacy_first
    - name: google/gemini-2.5-flash-lite
      context_window_size: 262144
      description: Simulated low-cost domain lane for medium difficulty explanations, follow-ups, and lightweight coding.
      capabilities:
        - chat
        - low_cost
        - explanation
        - coding
      quality_score: 0.84
      modality: text
      tags:
        - deployment:vllm_alias
        - tier:medium
    - name: google/gemini-3.1-pro
      context_window_size: 262144
      description: Simulated complex-domain lane for architecture, STEM, research synthesis, and difficult coding.
      capabilities:
        - chat
        - reasoning
        - architecture
        - research
        - code
      quality_score: 0.90
      modality: text
      tags:
        - deployment:vllm_alias
        - tier:complex
        - domain:technical
    - name: openai/gpt5.4
      context_window_size: 262144
      description: Simulated frontier reasoning lane for hard non-private planning and long-horizon agent sessions.
      capabilities:
        - chat
        - frontier_reasoning
        - planning
        - synthesis
      quality_score: 0.95
      modality: text
      tags:
        - deployment:vllm_alias
        - tier:frontier
    - name: anthropic/claude-opus-4.6
      context_window_size: 262144
      description: Simulated high-care domain lane for non-private legal, compliance, and health analysis.
      capabilities:
        - chat
        - legal_analysis
        - health_guidance
        - high_stakes
      quality_score: 0.96
      modality: text
      tags:
        - deployment:vllm_alias
        - tier:premium
        - domain:high_care

  signals:
    conversation:
      - name: multi_turn_user
        feature:
          type: count
          source:
            type: message
            role: user
        predicate:
          gte: 2
      - name: has_tools
        feature:
          type: count
          source:
            type: tool_definition
        predicate:
          gte: 1
      - name: active_tool_use
        feature:
          type: count
          source:
            type: assistant_tool_call
        predicate:
          gte: 1
      - name: completed_tool_cycle
        feature:
          type: count
          source:
            type: assistant_tool_cycle
        predicate:
          gte: 1
      - name: current_tool_loop
        feature:
          type: exists
          source:
            type: active_tool_loop
      - name: heavy_non_user
        feature:
          type: count
          source:
            type: message
            role: non_user
        predicate:
          gt: 4

    keywords:
      - name: prompt_injection_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.08
        case_sensitive: false
        keywords:
          - ignore previous instructions
          - ignore the system instructions
          - disregard the system prompt
          - bypass safety
          - override policy
          - reveal hidden instructions
          - reveal the system prompt
          - forget your rules
      - name: secret_markers
        operator: OR
        method: regex
        case_sensitive: false
        keywords:
          - \bapi[_ -]?key\b
          - \bsecret[_ -]?key\b
          - \baccess[_ -]?token\b
          - \boauth[_ -]?token\b
          - \bid[_ -]?token\b
          - \bprivate[_ -]?key\b
          - \bssh[_ -]?key\b
          - \bcredential(s)?\b
          - \bpassword\b
          - \bconnection[_ -]?string\b
          - \bwebhook[_ -]?secret\b
          - \bsigning[_ -]?secret\b
          - \bbearer\s+[A-Za-z0-9._~+/-]+=*\b
          - \bsk-[A-Za-z0-9_-]{8,}\b
          - 密钥
          - 凭据
          - 访问令牌
          - 私钥
          - 密码
      - name: personal_data_markers
        operator: OR
        method: regex
        case_sensitive: false
        keywords:
          - \b\d{3}-\d{2}-\d{4}\b
          - \bssn\b
          - \bsocial security( number)?\b
          - \bcredit card\b
          - \bcard number\b
          - \bbank account\b
          - \biban\b
          - \bpassport number\b
          - \bdriver'?s? license\b
          - \bnational id\b
          - \bgovernment id\b
          - \bmedical record\b
          - \bpatient record\b
          - \bdate of birth\b
          - \bdob\b
          - \bhome address\b
          - \bphone number\b
          - \bemail address\b
          - \b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b
          - customer data
          - employee data
          - payroll record
          - hr spreadsheet
          - crm export
          - 客户数据
          - 员工数据
          - 身份证号
          - 手机号
          - 护照号
          - 银行卡号
          - 家庭住址
      - name: private_code_markers
        operator: OR
        method: regex
        case_sensitive: false
        keywords:
          - \bprivate repo(sitory)?\b
          - \binternal repo(sitory)?\b
          - \bproprietary code\b
          - \bcompany codebase\b
          - \bour codebase\b
          - \binternal sdk\b
          - \bprivate package\b
          - \bconfidential code\b
          - \binternal monorepo\b
          - \bproprietary source\b
          - 私有仓库
          - 内部仓库
          - 公司代码
          - 私有代码
          - 保密代码
      - name: internal_doc_markers
        operator: OR
        method: regex
        case_sensitive: false
        keywords:
          - \binternal document\b
          - \binternal doc\b
          - \binternal design doc(ument)?\b
          - \binternal ADR\b
          - \binternal RFC\b
          - \binternal runbook\b
          - \binternal incident review\b
          - \binternal postmortem\b
          - \bconfidential memo\b
          - \bconfidential board memo\b
          - \bconfidential board deck\b
          - \binternal board deck\b
          - \binternal-only document\b
          - \bemployee handbook\b
          - 内部文档
          - 内部设计文档
          - 内部备忘录
          - 保密备忘录
          - 内部运行手册
          - 内部事故复盘
          - 仅内部流转
      - name: local_only_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.18
        case_sensitive: false
        keywords:
          - local processing only
          - local model only
          - local only
          - locally only
          - on-prem only
          - keep this local
          - keep processing local
          - do not send to the cloud
          - do not upload this
          - confidential handling
          - internal use only
          - handle this locally
          - use local model
          - run locally
          - stay on the local model
      - name: simple_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - briefly
          - quick answer
          - one sentence
          - simple explanation
          - summarize briefly
          - what is
          - who is
          - define
          - 简单解释
          - 简短回答
      - name: agentic_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - agent
          - agentic
          - tool loop
          - tool call
          - use a tool
          - run a command
          - shell command
          - read-only shell command
          - plan and execute
          - run until fixed
          - iterate until it passes
          - checkpoints
          - rollback plan
          - validation loop
          - multi-step workflow
          - 分阶段实施
          - 回滚步骤
      - name: code_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.10
        case_sensitive: false
        keywords:
          - implement
          - refactor
          - debug
          - stack trace
          - failing test
          - pull request
          - repository
          - codebase
          - lint
          - kubernetes controller
      - name: legal_risk_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - contract risk
          - compliance
          - indemnity
          - limitation of liability
          - privacy policy
          - regulatory
          - legal memo
          - data transfer agreement
      - name: health_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - symptoms
          - diagnosis
          - medical
          - medication
          - treatment
          - clinical
          - doctor
          - blood pressure
      - name: research_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - cite sources
          - with evidence
          - literature review
          - compare studies
          - source-backed
          - references
          - survey the literature
      - name: reasoning_request_markers
        operator: OR
        method: bm25
        bm25_threshold: 0.12
        case_sensitive: false
        keywords:
          - compare tradeoffs
          - root cause
          - architecture
          - design review
          - reason step by step
          - evaluate options
          - synthesize
          - first principles

    embeddings:
      - name: fast_qa
        aggregation_method: max
        threshold: 0.72
        candidates:
          - What is the capital of France?
          - Briefly explain what an API is.
          - What does CPU stand for?
          - Give me a quick summary of this paragraph.
          - 用一句话解释这个概念。
      - name: coding_workflows
        aggregation_method: max
        threshold: 0.75
        candidates:
          - Debug this Python stack trace and explain the likely bug.
          - Refactor this TypeScript module while preserving behavior.
          - Implement the feature and update the tests.
          - Fix the CI failure and rerun the relevant gate.
      - name: architecture_design
        aggregation_method: max
        threshold: 0.78
        candidates:
          - Design a distributed rate limiter and explain failure modes.
          - Plan a migration from a monolith to event-driven microservices.
          - Propose a consistency strategy for a global payments platform.
      - name: agentic_workflows
        aggregation_method: max
        threshold: 0.76
        candidates:
          - Create a migration plan with checkpoints, rollback, and validation.
          - Troubleshoot the production issue and iterate until it is fixed.
          - Break this project into tasks, dependencies, and acceptance checks.
          - Design an execution workflow with milestones, owners, and guardrails.
          - 给我一个分阶段实施方案，并包含校验与回滚步骤。
      - name: legal_analysis
        aggregation_method: max
        threshold: 0.78
        candidates:
          - Analyze indemnity, limitation of liability, and governing-law risks in this contract.
          - Draft a legal-risk memo for a cross-border data transfer policy.
          - Compare regulatory exposure under two compliance strategies.
      - name: health_guidance
        aggregation_method: max
        threshold: 0.77
        candidates:
          - Explain common causes of chest pain and when someone should seek urgent care.
          - Compare evidence-backed treatment options for type 2 diabetes management.
          - Summarize safe, clinically grounded steps for lowering high blood pressure.
      - name: research_synthesis
        aggregation_method: max
        threshold: 0.77
        candidates:
          - Compare several studies, cite the evidence, and explain the trade-offs.
          - Write a source-backed memo that synthesizes multiple references.
          - Survey the literature and recommend a position with supporting evidence.
      - name: business_analysis
        aggregation_method: max
        threshold: 0.75
        candidates:
          - Compare two pricing strategies for a B2B SaaS product.
          - Analyze CAC, LTV, and retention trade-offs for a subscription business.
          - Draft a market-entry strategy for a new AI tooling startup.
      - name: private_code_request
        aggregation_method: max
        threshold: 0.79
        candidates:
          - Review source code from a private repository and suggest a fix.
          - Debug proprietary backend code from our internal monorepo.
          - Refactor a confidential microservice from our company codebase.
          - Analyze an internal SDK source file and explain the risks.
          - 帮我分析公司私有仓库里的源代码。
      - name: pii_request
        aggregation_method: max
        threshold: 0.82
        candidates:
          - Review an HR spreadsheet containing employee phone numbers, home addresses, and government identifiers.
          - Analyze a CRM export with names, phone numbers, street addresses, and account numbers.
          - Process payroll records that include passport numbers, bank accounts, and home addresses.
          - Summarize a file containing employee personal identifiers and contact details.
          - 帮我处理包含手机号、家庭住址和身份证号的员工信息。
      - name: internal_document_request
        aggregation_method: max
        threshold: 0.86
        candidates:
          - Summarize this internal design document and highlight the risks.
          - Extract action items from a confidential board memo.
          - Analyze a private incident postmortem for follow-up actions.
          - Summarize this internal runbook and identify owners.
          - 帮我总结这份内部设计文档并提炼风险。

    context:
      - name: short_context
        min_tokens: "0"
        max_tokens: "999"
      - name: medium_context
        min_tokens: 1K
        max_tokens: "7999"
      - name: long_context
        min_tokens: 8K
        max_tokens: 256K

    structure:
      - name: ordered_workflow
        feature:
          type: sequence
          source:
            type: sequence
            sequences:
              - [first, then]
              - [first, next, finally]
              - [plan, execute, verify]
              - [先, 再]
      - name: numbered_steps
        feature:
          type: exists
          source:
            type: regex
            pattern: (?m)^\s*\d+\.\s+
      - name: constraint_dense
        feature:
          type: density
          source:
            type: keyword_set
            keywords:
              - under
              - at most
              - at least
              - within
              - no more than
              - must
              - should
              - 不超过
              - 至少
        predicate:
          gt: 0.08

    complexity:
      - name: general_reasoning
        threshold: 0.14
        easy:
          candidates:
            - brief definition
            - quick summary
            - simple explanation
            - short direct answer
        hard:
          candidates:
            - compare several approaches and justify the trade-offs
            - synthesize constraints into a plan
            - root-cause analysis for a complex failure
            - derive the answer from first principles
      - name: code_task
        threshold: 0.12
        easy:
          candidates:
            - explain what this function does
            - fix a small bug in this code snippet
            - write a helper function
        hard:
          candidates:
            - design a distributed system with failure handling
            - debug a race condition in production
            - refactor a large service boundary safely
      - name: agentic_delivery
        threshold: 0.12
        easy:
          candidates:
            - give me a short checklist
            - suggest the next step only
            - write a small implementation plan
        hard:
          candidates:
            - create a migration plan with checkpoints, rollback, and validation
            - troubleshoot this production issue until the root cause is fixed
            - design an execution workflow with milestones, owners, and guardrails
            - automate the process and include verification after each phase
      - name: evidence_synthesis
        threshold: 0.12
        easy:
          candidates:
            - give a quick overview of the topic
            - summarize one article briefly
            - explain the term in simple language
        hard:
          candidates:
            - compare several sources and recommend the strongest evidence-backed position
            - write a source-backed memo that synthesizes multiple references
            - survey the literature and explain conflicting evidence with citations

    pii:
      - name: pii_strict
        threshold: 0.85

    domains:
      - name: computer science
        description: Programming, software systems, debugging, APIs, and infrastructure.
      - name: law
        description: Legal, compliance, policy, and regulatory topics.
      - name: health
        description: Health, medicine, clinical guidance, and patient-facing information.
      - name: math
        description: Mathematics, statistics, and quantitative reasoning.
      - name: physics
        description: Physics, chemistry, biology, engineering, and technical research.
      - name: business
        description: Business, product, operations, and management topics.
      - name: other
        description: General knowledge and miscellaneous topics.

  projections:
    scores:
      - name: security_risk_score
        method: weighted_sum
        inputs:
          - type: keyword
            name: prompt_injection_markers
            value_source: confidence
            weight: 0.60
          - type: keyword
            name: local_only_markers
            value_source: confidence
            weight: 0.20
      - name: privacy_risk_score
        method: weighted_sum
        inputs:
          - type: pii
            name: pii_strict
            weight: 0.92
          - type: keyword
            name: local_only_markers
            value_source: confidence
            weight: 0.12
          - type: keyword
            name: private_code_markers
            value_source: confidence
            weight: 0.50
          - type: keyword
            name: internal_doc_markers
            value_source: confidence
            weight: 0.46
          - type: keyword
            name: secret_markers
            value_source: confidence
            weight: 0.72
          - type: keyword
            name: personal_data_markers
            value_source: confidence
            weight: 0.72
          - type: embedding
            name: private_code_request
            value_source: confidence
            weight: 0.22
          - type: embedding
            name: pii_request
            value_source: confidence
            weight: 0.24
          - type: embedding
            name: internal_document_request
            value_source: confidence
            weight: 0.22
          - type: context
            name: long_context
            weight: 0.04
      - name: difficulty_score
        method: weighted_sum
        inputs:
          - type: keyword
            name: simple_request_markers
            value_source: confidence
            weight: -0.24
          - type: embedding
            name: fast_qa
            value_source: confidence
            weight: -0.22
          - type: context
            name: short_context
            weight: -0.10
          - type: context
            name: medium_context
            weight: 0.06
          - type: context
            name: long_context
            weight: 0.18
          - type: keyword
            name: reasoning_request_markers
            value_source: confidence
            weight: 0.18
          - type: keyword
            name: code_request_markers
            value_source: confidence
            weight: 0.10
          - type: keyword
            name: research_request_markers
            value_source: confidence
            weight: 0.14
          - type: keyword
            name: agentic_request_markers
            value_source: confidence
            weight: 0.16
          - type: embedding
            name: coding_workflows
            value_source: confidence
            weight: 0.12
          - type: embedding
            name: architecture_design
            value_source: confidence
            weight: 0.18
          - type: embedding
            name: agentic_workflows
            value_source: confidence
            weight: 0.20
          - type: embedding
            name: research_synthesis
            value_source: confidence
            weight: 0.16
          - type: structure
            name: ordered_workflow
            weight: 0.10
          - type: structure
            name: numbered_steps
            weight: 0.06
          - type: structure
            name: constraint_dense
            weight: 0.05
          - type: complexity
            name: general_reasoning:medium
            weight: 0.08
          - type: complexity
            name: general_reasoning:hard
            weight: 0.20
          - type: complexity
            name: code_task:hard
            weight: 0.16
          - type: complexity
            name: agentic_delivery:hard
            weight: 0.22
          - type: complexity
            name: evidence_synthesis:hard
            weight: 0.18
      - name: agentic_pressure
        method: weighted_sum
        inputs:
          - type: conversation
            name: current_tool_loop
            weight: 0.34
          - type: conversation
            name: active_tool_use
            weight: 0.04
          - type: conversation
            name: completed_tool_cycle
            weight: 0.04
          - type: conversation
            name: has_tools
            weight: 0.06
          - type: conversation
            name: multi_turn_user
            weight: 0.04
          - type: conversation
            name: heavy_non_user
            weight: 0.04
          - type: keyword
            name: agentic_request_markers
            value_source: confidence
            weight: 0.18
          - type: embedding
            name: agentic_workflows
            value_source: confidence
            weight: 0.06
          - type: structure
            name: ordered_workflow
            weight: 0.10
          - type: complexity
            name: agentic_delivery:hard
            weight: 0.18
    mappings:
      - name: security_policy_band
        source: security_risk_score
        method: threshold_bands
        outputs:
          - name: policy_security_standard
            lt: 0.30
          - name: policy_security_local_only
            gte: 0.30
      - name: privacy_policy_band
        source: privacy_risk_score
        method: threshold_bands
        outputs:
          - name: policy_privacy_cloud_allowed
            lt: 0.35
          - name: policy_privacy_local_only
            gte: 0.35
      - name: difficulty_band
        source: difficulty_score
        method: threshold_bands
        outputs:
          - name: balance_simple
            lt: 0.20
          - name: balance_medium
            gte: 0.20
            lt: 0.45
          - name: balance_complex
            gte: 0.45
            lt: 0.70
