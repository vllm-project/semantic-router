name: balance
description: >
  Executable eval probes for the maintained balance routing profile. Probes are
  grouped by decision so the calibration loop can measure decision-level
  robustness across multiple prompt variants instead of one crafted sample.
routing_assets:
  yaml: deploy/recipes/balance.yaml
  dsl: deploy/recipes/balance.dsl
router_eval_endpoint: /api/v1/eval
acceptance:
  min_probe_pass_rate: 100.0
  min_decision_pass_rate: 100.0
decisions:
  - id: premium_legal
    expected_decision: premium_legal
    expected_alias: anthropic/claude-opus-4.6
    objective: High-stakes legal analysis that should avoid generic business routing.
    variants:
      - id: contract_clause_analysis
        query: Provide a legal analysis of the indemnity clause, liability cap, and compliance obligations in this contract.
        tags: [baseline, contract]
      - id: regulatory_risk_review
        query: Assess the legal risk in this agreement by analyzing indemnification, limitation of liability, and the compliance duties each party assumes.
        tags: [paraphrase, contract]
  - id: reasoning_math
    expected_decision: reasoning_math
    expected_alias: openai/gpt5.4
    objective: Pure mathematical reasoning that should not collapse into a generic reasoning lane.
    variants:
      - id: irrationality_proof
        query: Prove rigorously that the square root of 2 is irrational.
        tags: [baseline, proof]
      - id: integer_ratio_proof
        query: Give a formal proof that sqrt(2) cannot be expressed as a ratio of integers.
        tags: [paraphrase, proof]
  - id: reasoning_philosophy
    expected_decision: reasoning_philosophy
    expected_alias: openai/gpt5.4
    objective: Philosophy-domain reasoning with explicit argumentative depth.
    variants:
      - id: av_ethics
        query: Compare utilitarianism and deontology, then argue which framework better handles autonomous-vehicle dilemmas.
        tags: [baseline, ethics]
      - id: compatibilism_argument
        query: Compare compatibilism and libertarian free will, then argue which view better explains moral responsibility.
        tags: [paraphrase, ethics]
  - id: complex_agentic
    expected_decision: complex_agentic
    expected_alias: google/gemini-3.1-pro
    objective: Multi-step agentic planning with execution phases, checkpoints, and rollback structure.
    variants:
      - id: migration_runbook
        query: Plan a zero-downtime monolith-to-microservices migration with checkpoints, rollback steps, owners, and validation after each phase.
        tags: [baseline, orchestration]
      - id: platform_cutover_plan
        query: Create a phased runbook for consolidating two internal platforms, with owners, dependencies, rollback criteria, and verification gates for every phase.
        tags: [paraphrase, orchestration]
      - id: incident_recovery_runbook
        query: Create a phased incident-recovery runbook with owners, checkpoints, rollback criteria, and verification gates for each stage.
        tags: [robustness, orchestration]
  - id: complex_architecture
    expected_decision: complex_architecture
    expected_alias: google/gemini-3.1-pro
    objective: System-design and architecture requests without strong workflow-orchestration cues.
    variants:
      - id: distributed_rate_limiter
        query: Design the software architecture for a distributed rate limiter in a microservices platform, including service boundaries and consistency tradeoffs.
        tags: [baseline, architecture]
      - id: multi_region_feature_flags
        query: Design the architecture for a multi-region feature-flag service, including storage boundaries, cache strategy, and consistency tradeoffs.
        tags: [paraphrase, architecture]
  - id: complex_stem
    expected_decision: complex_stem
    expected_alias: google/gemini-3.1-pro
    objective: Specialist STEM reasoning with technical explanation plus experiment design.
    variants:
      - id: battery_degradation
        query: In electrochemistry terms, compare SEI growth, lithium plating, and cathode cracking as causes of lithium-ion battery degradation, then propose experiments to isolate the dominant mechanism.
        tags: [baseline, stem]
      - id: qubit_decoherence
        query: Compare dielectric loss, flux noise, and quasiparticle poisoning as causes of superconducting-qubit decoherence, then propose experiments to isolate the dominant source.
        tags: [paraphrase, stem]
  - id: feedback_wrong_answer_verified
    expected_decision: feedback_wrong_answer_verified
    expected_alias: google/gemini-3.1-pro
    objective: Wrong-answer correction requests that also require verified, sourced answers.
    variants:
      - id: roman_republic_correction
        query: This is wrong. Please correct the explanation of why the Roman Republic collapsed and cite reliable historical sources.
        tags: [baseline, feedback]
      - id: earlier_answer_wrong
        query: You got this wrong earlier; re-answer why the Roman Republic collapsed and support the correction with sources.
        tags: [paraphrase, feedback]
      - id: meiji_correction
        query: That is incorrect. Please correct the explanation of what caused the Meiji Restoration and support the correction with sources.
        tags: [robustness, feedback]
  - id: medium_code_general
    expected_decision: medium_code_general
    expected_alias: qwen/qwen3.5-rocm
    objective: Mid-tier coding help without architecture-heavy or agentic workflow cues.
    variants:
      - id: python_stack_trace
        query: Debug this Python stack trace and suggest the most likely fix.
        tags: [baseline, coding]
      - id: failing_unit_test
        query: A Java unit test is failing after a refactor; explain the most likely cause and suggest the first fix to try.
        tags: [paraphrase, coding]
      - id: integration_test_refactor
        query: After a refactor, an integration test started failing in a Java codebase. Explain the most likely cause and the first code change to inspect.
        tags: [robustness, coding]
  - id: verified_business
    expected_decision: verified_business
    expected_alias: google/gemini-2.5-flash-lite
    objective: Business analysis with explicit evidence or source requirements.
    variants:
      - id: pricing_strategy_evidence
        query: "Verify this claim with evidence: compare two B2B SaaS pricing strategies and cite sources for the market-share claim."
        tags: [baseline, business]
      - id: churn_benchmark_sources
        query: Compare enterprise SaaS churn benchmarks and verify the claim with sources before drawing a conclusion.
        tags: [paraphrase, business]
      - id: retention_sources
        query: Compare B2B SaaS retention benchmarks and support the answer with sources before recommending a pricing model.
        tags: [robustness, business]
  - id: medium_business
    expected_decision: medium_business
    expected_alias: qwen/qwen3.5-rocm
    objective: Business reasoning without explicit verification requirements.
    variants:
      - id: plg_vs_slg
        query: Explain when a mid-market SaaS company should prefer product-led growth over sales-led growth, and outline the trade-offs.
        tags: [baseline, business]
      - id: pricing_model_tradeoffs
        query: Explain when a B2B software company should prefer usage-based pricing over seat-based pricing, and outline the trade-offs.
        tags: [paraphrase, business]
      - id: annual_vs_monthly
        query: Explain the trade-offs between annual and monthly pricing for a B2B SaaS product.
        tags: [robustness, business]
  - id: verified_health
    expected_decision: verified_health
    expected_alias: google/gemini-3.1-pro
    objective: Health-domain answers with explicit reliable-source requirements.
    variants:
      - id: iron_deficiency
        query: What are the early symptoms of iron deficiency? Please cite reliable medical sources.
        tags: [baseline, health]
      - id: sleep_apnea_sources
        query: What are common early signs of sleep apnea? Answer with citations to reliable medical sources.
        tags: [paraphrase, health]
  - id: verified_history
    expected_decision: verified_history
    expected_alias: google/gemini-2.5-flash-lite
    objective: History explanations that explicitly demand citations or verification.
    variants:
      - id: roman_republic_with_citations
        query: "Verify the claim and answer with citations: why did the Roman Republic collapse?"
        tags: [baseline, history]
      - id: meiji_restoration_sources
        query: Explain what caused the Meiji Restoration and support the answer with reputable historical sources.
        tags: [paraphrase, history]
  - id: medium_history
    expected_decision: medium_history
    expected_alias: qwen/qwen3.5-rocm
    objective: History explanations without explicit evidence or verification overlays.
    variants:
      - id: roman_republic_plain
        query: In plain language, explain why the Roman Republic collapsed.
        tags: [baseline, history]
      - id: ming_dynasty_plain
        query: In plain language, explain why the Ming dynasty fell.
        tags: [paraphrase, history]
      - id: meiji_plain
        query: In plain language, explain what caused the Meiji Restoration.
        tags: [robustness, history]
  - id: medium_psychology
    expected_decision: medium_psychology
    expected_alias: qwen/qwen3.5-rocm
    objective: Psychology explanation and practical intervention lane.
    variants:
      - id: procrastination
        query: Why do people procrastinate even when the task matters, and what interventions tend to help?
        tags: [baseline, psychology]
      - id: confirmation_bias
        query: Why do people fall into confirmation bias, and what strategies usually help reduce it?
        tags: [paraphrase, psychology]
      - id: procrastination_important_work
        query: Why do people procrastinate on important work, and what interventions usually help?
        tags: [robustness, psychology]
  - id: medium_creative
    expected_decision: medium_creative
    expected_alias: google/gemini-2.5-flash-lite
    objective: Creative ideation without specialist routing or verification cues.
    variants:
      - id: tea_house_taglines
        query: Invent three evocative taglines for a fictional tea house called Moonleaf.
        tags: [baseline, creative]
      - id: pottery_branding
        query: Invent three concise names and taglines for a boutique pottery studio with a calm, modern feel.
        tags: [paraphrase, creative]
  - id: reasoning_general
    expected_decision: reasoning_general
    expected_alias: openai/gpt5.4
    objective: Deep reasoning requests with explicit non-specialist framing.
    variants:
      - id: uncertainty_frameworks
        query: Compare three general approaches to reasoning under uncertainty, without focusing on any specific domain.
        tags: [baseline, reasoning]
      - id: inference_modes
        query: Compare deductive, inductive, and abductive reasoning in general terms, without anchoring the discussion to any one domain.
        tags: [paraphrase, reasoning]
  - id: feedback_need_clarification
    expected_decision: feedback_need_clarification
    expected_alias: qwen/qwen3.5-rocm
    objective: Clarification feedback overlays that ask for a simpler restatement.
    variants:
      - id: explain_more_clearly
        query: Explain that more clearly and give one simple example.
        tags: [baseline, feedback]
      - id: restate_simply
        query: That was confusing. Restate it more simply and walk me through one concrete example.
        tags: [paraphrase, feedback]
      - id: concrete_example
        query: Please explain that more clearly and give one concrete example.
        tags: [robustness, feedback]
  - id: verified_fast_qa_zh
    expected_decision: verified_fast_qa_zh
    expected_alias: qwen/qwen3.5-rocm
    objective: Short Chinese factual questions with explicit verification or source cues.
    variants:
      - id: paris_source
        query: 法国的首都是巴黎吗？给出处。
        tags: [baseline, zh]
      - id: jupiter_verify
        query: 太阳系最大的行星是木星吗？请核实并给来源。
        tags: [paraphrase, zh]
      - id: australia_capital_verify
        query: 澳大利亚的首都是悉尼还是堪培拉？请核实并给出处。
        tags: [robustness, zh]
  - id: simple_fast_qa_zh
    expected_decision: simple_fast_qa_zh
    expected_alias: qwen/qwen3.5-rocm
    objective: Short Chinese factual questions without verification overlays.
    variants:
      - id: water_formula
        query: 水的化学式是什么？请简短回答。
        tags: [baseline, zh]
      - id: months_in_year
        query: 一年有几个月？请简短回答。
        tags: [paraphrase, zh]
  - id: verified_fast_qa_en
    expected_decision: verified_fast_qa_en
    expected_alias: qwen/qwen3.5-rocm
    objective: Short English factual questions with explicit verification or source requirements.
    variants:
      - id: australia_capital
        query: "Verify this with a source: Is the capital of Australia Sydney or Canberra?"
        tags: [baseline, en]
      - id: light_vs_sound
        query: Verify with a source whether light travels faster than sound.
        tags: [paraphrase, en]
  - id: simple_fast_qa_en
    expected_decision: simple_fast_qa_en
    expected_alias: qwen/qwen3.5-rocm
    objective: Very short English factual or identity-style Q and A without verification cues.
    variants:
      - id: who_are_you
        query: Who are you? Answer briefly.
        tags: [baseline, en]
      - id: arithmetic
        query: What is 2 + 2? Answer briefly.
        tags: [paraphrase, en]
  - id: simple_general
    expected_decision: simple_general
    expected_alias: qwen/qwen3.5-rocm
    objective: Short general explanations that should avoid fast-QA and specialist routes.
    variants:
      - id: induction_cooktops
        query: In one short paragraph, explain how induction cooktops work for a home kitchen user.
        tags: [baseline, general]
      - id: refrigerator_cooling
        query: In one short paragraph, explain how a refrigerator keeps food cold.
        tags: [paraphrase, general]
      - id: heat_pump_plain
        query: In one short paragraph, explain how composting works for a first-time apartment resident.
        tags: [robustness, general]
