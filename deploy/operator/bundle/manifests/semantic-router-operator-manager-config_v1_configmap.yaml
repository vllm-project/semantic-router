apiVersion: v1
data:
  controller_manager_config.yaml: |
    apiVersion: controller-runtime.sigs.k8s.io/v1alpha1
    kind: ControllerManagerConfig
    health:
      healthProbeBindAddress: :8081
    metrics:
      bindAddress: 127.0.0.1:8080
    webhook:
      port: 9443
    leaderElection:
      leaderElect: true
      resourceName: semantic-router-operator.vllm.ai
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/name: semantic-router-operator
    app.kubernetes.io/part-of: semantic-router
  name: semantic-router-operator-manager-config
