# Production profile — hardened defaults for multi-replica, production clusters.

replicaCount: 2

image:
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: "8Gi"
    cpu: "4"
  requests:
    memory: "4Gi"
    cpu: "2"

persistence:
  enabled: true
  size: 20Gi

dashboard:
  enabled: true
  # Deliberately unusable placeholders: production must pin a real release tag
  # and provision a >=10,000-entry external corpus with its exact digest.
  securityProfile: production
  replicaCount: 1
  image:
    tag: replace-with-pinned-release
    pullPolicy: Always
  passwordBlocklist:
    existingConfigMap: semantic-router-dashboard-password-blocklist
    key: passwords.txt
    # SHA-256 of an empty file. The backend rejects it for having too few
    # entries, so this profile cannot start until an operator replaces it.
    sha256: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
  persistence:
    enabled: true
    size: 5Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

startupProbe:
  failureThreshold: 360  # 60 minutes

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false

dependencies:
  observability:
    jaeger:
      enabled: false
    prometheus:
      enabled: true
    grafana:
      enabled: true
