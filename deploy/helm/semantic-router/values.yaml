config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: base-model
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
  routing:
    decisions:
      - name: code_keywords_decision
        description: Code and programming queries (BM25 classified)
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: keyword
              name: code_keywords
        modelRefs:
          - model: base-model
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are an expert software engineer. Provide clear, well-structured code examples with explanations. Follow best practices and consider edge cases.
      - name: urgent_request_decision
        description: Urgent and time-sensitive requests (N-gram classified with typo tolerance)
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: keyword
              name: urgent_request
        modelRefs:
          - model: base-model
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a highly responsive assistant specialized in handling urgent requests. Prioritize speed and efficiency while maintaining accuracy. Provide concise, actionable responses and focus on immediate solutions.
      - name: sensitive_data_decision
        description: Requests involving sensitive personal data
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: keyword
              name: sensitive_data
        modelRefs:
          - model: base-model
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a security-conscious assistant specialized in handling sensitive data. Exercise extreme caution with personal information, follow data protection best practices, and remind users about privacy considerations.
      - name: regex_pattern_match_decision
        description: Structured data and pattern-based requests
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: keyword
              name: regex_pattern_match
        modelRefs:
          - model: base-model
            use_reasoning: false
      - name: business_decision
        description: Business and management related queries
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: domain
              name: business
        modelRefs:
          - model: base-model
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
