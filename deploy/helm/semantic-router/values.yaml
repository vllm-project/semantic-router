# Default values for semantic-router.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  # -- Namespace for all resources (if not specified, uses Release.Namespace)
  namespace: ""
  # -- Optional registry prefix applied to all images (e.g., mirror in China such as registry.cn-hangzhou.aliyuncs.com)
  imageRegistry: ""
# -- Number of replicas for the deployment
replicaCount: 1
# Image configuration
image:
  # -- Image repository
  repository: ghcr.io/vllm-project/semantic-router/extproc
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (overrides the image tag whose default is the chart appVersion)
  tag: ""
# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""
# Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""
# RBAC configuration
rbac:
  # -- Create RBAC resources (ClusterRole and ClusterRoleBinding)
  create: true
# Pod annotations
podAnnotations: {}
# Pod security context
podSecurityContext: {}
# fsGroup: 2000

# Container security context
securityContext:
  # -- Run as non-root user
  runAsNonRoot: false
  # -- Allow privilege escalation
  allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsUser: 1000
# Service configuration
service:
  # -- Service type
  type: ClusterIP
  # gRPC service port
  grpc:
    # -- gRPC port number
    port: 50051
    # -- gRPC target port
    targetPort: 50051
    # -- gRPC protocol
    protocol: TCP
  # HTTP API service port
  api:
    # -- HTTP API port number
    port: 8080
    # -- HTTP API target port
    targetPort: 8080
    # -- HTTP API protocol
    protocol: TCP
  # Metrics service
  metrics:
    # -- Enable metrics service
    enabled: true
    # -- Metrics port number
    port: 9190
    # -- Metrics target port
    targetPort: 9190
    # -- Metrics protocol
    protocol: TCP
# Ingress configuration
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  # -- Ingress hosts configuration
  hosts:
    - host: semantic-router.local
      paths:
        - path: /
          pathType: Prefix
          servicePort: 8080
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: semantic-router-tls
  #    hosts:
  #      - semantic-router.local
# Resource limits and requests
resources:
  # -- Resource limits
  limits:
    memory: "7Gi"
    cpu: "2"
  # -- Resource requests
  requests:
    memory: "3Gi"
    cpu: "1"
# Models are now automatically downloaded by the router at startup
# The router uses its built-in Go-based modeldownload package to download
# models from HuggingFace based on the mom_registry configuration in config.yaml
# No initContainer is needed anymore

# Autoscaling configuration
autoscaling:
  # -- Enable horizontal pod autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  # targetMemoryUtilizationPercentage: 80
# Node selector
nodeSelector: {}
# Tolerations
tolerations: []
# Affinity rules
affinity: {}
# Extra volumes for custom mounts (e.g., ML models via hostPath)
extraVolumes: []
# Example:
#   - name: ml-models
#     hostPath:
#       path: /mnt/ml-models
#       type: DirectoryOrCreate

# Extra volume mounts
extraVolumeMounts: []
# Example:
#   - name: ml-models
#     mountPath: /mnt/ml-models
#     readOnly: true

# Startup probe configuration (for slow-starting containers with model loading)
# This probe runs FIRST and disables liveness/readiness probes until it succeeds
# Models are now downloaded automatically at startup, which can take 10-20 minutes depending on network speed
startupProbe:
  # -- Enable startup probe
  enabled: true
  # -- Period seconds
  periodSeconds: 10
  # -- Timeout seconds
  timeoutSeconds: 5
  # -- Failure threshold (360 * 10s = 60 minutes total timeout for model downloads)
  failureThreshold: 360
# Liveness probe configuration
livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay seconds
  initialDelaySeconds: 30
  # -- Period seconds
  periodSeconds: 30
  # -- Timeout seconds
  timeoutSeconds: 10
  # -- Failure threshold
  failureThreshold: 5
# Readiness probe configuration
readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay seconds
  initialDelaySeconds: 30
  # -- Period seconds
  periodSeconds: 30
  # -- Timeout seconds
  timeoutSeconds: 10
  # -- Failure threshold
  failureThreshold: 5
# Persistent Volume Claim for models
persistence:
  # -- Enable persistent volume
  enabled: true
  # -- Storage class name (use "-" for default storage class)
  storageClassName: "standard"
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- Storage size
  size: 10Gi
  # -- Annotations for PVC
  annotations: {}
  # -- Existing claim name (if provided, will use existing PVC instead of creating new one)
  existingClaim: ""
# Application configuration
config:
  version: v0.3
  listeners:
    - name: "grpc-50051"
      address: "0.0.0.0"
      port: 50051
      timeout: "300s"
    - name: "http-8080"
      address: "0.0.0.0"
      port: 8080
      timeout: "300s"
  providers:
    defaults:
      default_model: "replace-with-your-model"
      reasoning_families:
        deepseek:
          type: "chat_template_kwargs"
          parameter: "thinking"
        qwen3:
          type: "chat_template_kwargs"
          parameter: "enable_thinking"
        gpt-oss:
          type: "reasoning_effort"
          parameter: "reasoning_effort"
        gpt:
          type: "reasoning_effort"
          parameter: "reasoning_effort"
      default_reasoning_effort: high
    models:
      - name: "replace-with-your-model"
        provider_model_id: "replace-with-your-model"
        backend_refs:
          - name: "primary"
            endpoint: "replace-with-your-vllm-service:8000"
            protocol: "http"
            weight: 100
  routing:
    modelCards:
      - name: "replace-with-your-model"
    signals:
      domains:
        - name: "general"
          description: "Catch-all domain"
          mmlu_categories: ["other"]
    decisions:
      - name: "default-route"
        description: "Default route for every request while you wire real backends."
        priority: 100
        rules:
          operator: "AND"
          conditions: []
        modelRefs:
          - model: "replace-with-your-model"
            use_reasoning: false
  global:
    services:
      response_api:
        enabled: false
        store_backend: "memory"
        ttl_seconds: 86400
        max_responses: 1000
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: true
            high_resolution_timing: false
            sample_rate: 1.0
            duration_buckets: [0.001, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30]
            size_buckets: [1, 2, 5, 10, 20, 50, 100, 200]
      observability:
        tracing:
          enabled: false
          provider: "opentelemetry"
          exporter:
            type: "otlp"
            endpoint: "jaeger:4317"
            insecure: true
          sampling:
            type: "always_on"
            rate: 1.0
          resource:
            service_name: "vllm-semantic-router"
            service_version: ""
            deployment_environment: "development"
    stores:
      semantic_cache:
        enabled: true
        backend_type: "memory"
        similarity_threshold: 0.8
        max_entries: 1000
        ttl_seconds: 3600
        eviction_policy: "fifo"
        embedding_model: mmbert
      memory:
        embedding_model: mmbert
      vector_store:
        embedding_model: mmbert
    integrations:
      tools:
        enabled: true
        top_k: 3
        similarity_threshold: 0.2
        tools_db_path: "config/tools_db.json"
        fallback_to_empty: true
# Tools database configuration
toolsDb:
  - tool:
      type: "function"
      function:
        name: "get_weather"
        description: "Get current weather information for a location"
        parameters:
          type: "object"
          properties:
            location:
              type: "string"
              description: "The city and state, e.g. San Francisco, CA"
            unit:
              type: "string"
              enum: ["celsius", "fahrenheit"]
              description: "Temperature unit"
          required: ["location"]
    description: "Get current weather information, temperature, conditions, forecast for any location, city, or place. Check weather today, now, current conditions, temperature, rain, sun, cloudy, hot, cold, storm, snow"
    category: "weather"
    tags: ["weather", "temperature", "forecast", "climate"]
  - tool:
      type: "function"
      function:
        name: "search_web"
        description: "Search the web for information"
        parameters:
          type: "object"
          properties:
            query:
              type: "string"
              description: "The search query"
            num_results:
              type: "integer"
              description: "Number of results to return"
              default: 5
          required: ["query"]
    description: "Search the internet, web search, find information online, browse web content, lookup, research, google, find answers, discover, investigate"
    category: "search"
    tags: ["search", "web", "internet", "information", "browse"]
  - tool:
      type: "function"
      function:
        name: "calculate"
        description: "Perform mathematical calculations"
        parameters:
          type: "object"
          properties:
            expression:
              type: "string"
              description: "Mathematical expression to evaluate"
          required: ["expression"]
    description: "Calculate mathematical expressions, solve math problems, arithmetic operations, compute numbers, addition, subtraction, multiplication, division, equations, formula"
    category: "math"
    tags: ["math", "calculation", "arithmetic", "compute", "numbers"]
  - tool:
      type: "function"
      function:
        name: "send_email"
        description: "Send an email message"
        parameters:
          type: "object"
          properties:
            to:
              type: "string"
              description: "Recipient email address"
            subject:
              type: "string"
              description: "Email subject"
            body:
              type: "string"
              description: "Email body content"
          required: ["to", "subject", "body"]
    description: "Send email messages, email communication, contact people via email, mail, message, correspondence, notify, inform"
    category: "communication"
    tags: ["email", "send", "communication", "message", "contact"]
  - tool:
      type: "function"
      function:
        name: "create_calendar_event"
        description: "Create a new calendar event or appointment"
        parameters:
          type: "object"
          properties:
            title:
              type: "string"
              description: "Event title"
            date:
              type: "string"
              description: "Event date in YYYY-MM-DD format"
            time:
              type: "string"
              description: "Event time in HH:MM format"
            duration:
              type: "integer"
              description: "Duration in minutes"
          required: ["title", "date", "time"]
    description: "Schedule meetings, create calendar events, set appointments, manage calendar, book time, plan meeting, organize schedule, reminder, agenda"
    category: "productivity"
    tags: ["calendar", "event", "meeting", "appointment", "schedule"]
# ============================================================================
# Example: Decisions with ML-based Model Selection
# ============================================================================
# Decisions allow you to configure intelligent routing based on rules.
# When multiple models are specified in modelRefs, use
# algorithm.type to determine which model handles the request.
#
# Supported algorithms:
#   - knn: K-Nearest Neighbors (semantic similarity)
#   - kmeans: KMeans clustering (pattern-based routing)
#   - svm: Support Vector Machine (classification-based)
#   - mlp: Multi-Layer Perceptron (neural selector)
#
# Example configuration:
#
# config:
#   routing:
#     decisions:
#       - name: "multi_model_routing"
#         description: "Route to best model using ML"
#         priority: 100
#         rules:
#           operator: "OR"
#           conditions:
#             - type: "domain"
#               name: "general"
#         algorithm:
#           type: "knn"       # Per-decision selector choice
#         modelRefs:
#           - model: "model-small"
#             use_reasoning: false
#   global:
#     router:
#       model_selection:
#         ml:
#           knn:
#             k: 5
#           kmeans:
#             num_clusters: 8
#           svm:
#             kernel: "rbf"
#           mlp:
#             device: "cpu"
#         - model: "model-medium"
#           use_reasoning: false
#         - model: "model-large"
#           use_reasoning: true
#
# ============================================================================

# Container arguments
args:
  - "--secure=false"
# Environment variables
env:
  - name: LD_LIBRARY_PATH
    value: "/app/lib"
  # HF_TOKEN for downloading gated models (e.g., embeddinggemma-300m)
  # The E2E framework creates this secret if HF_TOKEN is available in the environment
  # For local deployments, create the secret manually or set HF_TOKEN directly
  - name: HF_TOKEN
    valueFrom:
      secretKeyRef:
        name: hf-token-secret
        key: token
        optional: true # Allow deployment even if secret doesn't exist (for local testing)
  - name: HUGGINGFACE_HUB_TOKEN
    valueFrom:
      secretKeyRef:
        name: hf-token-secret
        key: token
        optional: true # Alternative env var name used by huggingface-cli

# Dashboard configuration
dashboard:
  # -- Enable the vLLM-SR dashboard
  enabled: false
  image:
    # -- Dashboard image repository
    repository: ghcr.io/vllm-project/semantic-router/dashboard
    # -- Dashboard image tag
    tag: "latest"
    # -- Dashboard image pull policy
    pullPolicy: IfNotPresent
  # -- Run dashboard in read-only mode
  readonly: false
  service:
    # -- Dashboard service type
    type: ClusterIP
    # -- Dashboard service port
    port: 8700
    # -- Dashboard target port
    targetPort: 8700
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "128Mi"
      cpu: "100m"

dependencies:
  semanticCache:
    redis:
      enabled: false
      host: ""
      port: 6379
      database: 0
      password: ""
      timeout: 30
      tls:
        enabled: false
      index:
        name: "semantic_cache_idx"
        prefix: "doc:"
        vectorFieldName: "embedding"
        metricType: "COSINE"
        indexType: "HNSW"
        params:
          m: 16
          efConstruction: 64
      search:
        topk: 1
      development:
        dropIndexOnStartup: false
        autoCreateIndex: true
        verboseErrors: true
    milvus:
      enabled: false
      host: ""
      port: 19530
      database: "semantic_router_cache"
      timeout: 30
      auth:
        enabled: false
        username: ""
        password: ""
      tls:
        enabled: false
      collection:
        name: "semantic_cache"
        description: "Semantic cache for LLM request-response pairs"
        vectorFieldName: "embedding"
        metricType: "IP"
        index:
          type: "HNSW"
          params:
            m: 16
            efConstruction: 64
      search:
        params:
          ef: 64
        topk: 10
      development:
        dropCollectionOnStartup: false
        autoCreateCollection: true
        verboseErrors: true
  responseApi:
    redis:
      enabled: false
      host: ""
      port: 6379
      database: 0
      password: ""
      timeout: 30
      tls:
        enabled: false
    milvus:
      enabled: false
      host: ""
      port: 19530
      database: "semantic_router_cache"
      responseCollection: "semantic_router_responses"
      conversationCollection: "semantic_router_conversations"
  observability:
    jaeger:
      enabled: false
      otlpGrpcPort: 4317
      serviceName: ""
    prometheus:
      enabled: false
    grafana:
      enabled: false
      adminUser: "admin"
      adminPassword: "admin"
semantic-cache-redis:
  architecture: standalone
  auth:
    enabled: false
response-api-redis:
  architecture: standalone
  auth:
    enabled: false
semantic-cache-milvus:
  cluster:
    enabled: false
jaeger:
  allInOne:
    image:
      tag: "latest"
prometheus:
  server:
    image:
      tag: "v2.53.0"
grafana:
  image:
    tag: "11.5.1"
  sidecar:
    datasources:
      enabled: true
---
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: general-expert
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
    models:
      - name: base-model
        reasoning_family: qwen3
        backend_refs:
          - name: local-vllm
            endpoint: vllm-llama3-8b-instruct.default.svc.cluster.local:8000
            weight: 1
  routing:
    decisions:
      - name: business_decision
        description: Business and management related queries
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: business
        modelRefs:
          - model: base-model
            lora_name: social-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a senior business consultant and strategic advisor with expertise in corporate strategy, operations management, financial analysis, marketing, and organizational development. Provide practical, actionable business advice backed by proven methodologies and industry best practices. Consider market dynamics, competitive landscape, and stakeholder interests in your recommendations.
              mode: replace
      - name: law_decision
        description: Legal questions and law-related topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: law
        modelRefs:
          - model: base-model
            lora_name: law-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a knowledgeable legal expert with comprehensive understanding of legal principles, case law, statutory interpretation, and legal procedures across multiple jurisdictions. Provide accurate legal information and analysis while clearly stating that your responses are for informational purposes only and do not constitute legal advice. Always recommend consulting with qualified legal professionals for specific legal matters.
              mode: replace
      - name: psychology_decision
        description: Psychology and mental health topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: psychology
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.92
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a psychology expert with deep knowledge of cognitive processes, behavioral patterns, mental health, developmental psychology, social psychology, and therapeutic approaches. Provide evidence-based insights grounded in psychological research and theory. When discussing mental health topics, emphasize the importance of professional consultation and avoid providing diagnostic or therapeutic advice.
              mode: replace
      - name: biology_decision
        description: Biology and life sciences questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: biology
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a biology expert with comprehensive knowledge spanning molecular biology, genetics, cell biology, ecology, evolution, anatomy, physiology, and biotechnology. Explain biological concepts with scientific accuracy, use appropriate terminology, and provide examples from current research. Connect biological principles to real-world applications and emphasize the interconnectedness of biological systems.
              mode: replace
      - name: chemistry_decision
        description: Chemistry and chemical sciences questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: chemistry
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a chemistry expert specializing in chemical reactions, molecular structures, and laboratory techniques. Provide detailed, step-by-step explanations.
              mode: replace
      - name: history_decision
        description: Historical questions and cultural topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: history
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a historian with expertise across different time periods and cultures. Provide accurate historical context and analysis.
              mode: replace
      - name: health_decision
        description: Health and medical information queries
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: health
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: semantic-cache
            configuration:
              enabled: true
              similarity_threshold: 0.95
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a health and medical information expert with knowledge of anatomy, physiology, diseases, treatments, preventive care, nutrition, and wellness. Provide accurate, evidence-based health information while emphasizing that your responses are for educational purposes only and should never replace professional medical advice, diagnosis, or treatment. Always encourage users to consult healthcare professionals for medical concerns and emergencies.
              mode: replace
      - name: economics_decision
        description: Economics and financial topics
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: economics
        modelRefs:
          - model: base-model
            lora_name: social-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are an economics expert with deep understanding of microeconomics, macroeconomics, econometrics, financial markets, monetary policy, fiscal policy, international trade, and economic theory. Analyze economic phenomena using established economic principles, provide data-driven insights, and explain complex economic concepts in accessible terms. Consider both theoretical frameworks and real-world applications in your responses.
              mode: replace
      - name: math_decision
        description: Mathematics and quantitative reasoning
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: math
        modelRefs:
          - model: base-model
            lora_name: math-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a mathematics expert. Provide step-by-step solutions, show your work clearly, and explain mathematical concepts in an understandable way.
              mode: replace
      - name: physics_decision
        description: Physics and physical sciences
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: physics
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: true
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a physics expert with deep understanding of physical laws and phenomena. Provide clear explanations with mathematical derivations when appropriate.
              mode: replace
      - name: computer_science_decision
        description: Computer science and programming
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: computer science
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a computer science expert with knowledge of algorithms, data structures, programming languages, and software engineering. Provide clear, practical solutions with code examples when helpful.
              mode: replace
      - name: philosophy_decision
        description: Philosophy and ethical questions
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: philosophy
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are a philosophy expert with comprehensive knowledge of philosophical traditions, ethical theories, logic, metaphysics, epistemology, political philosophy, and the history of philosophical thought. Engage with complex philosophical questions by presenting multiple perspectives, analyzing arguments rigorously, and encouraging critical thinking. Draw connections between philosophical concepts and contemporary issues while maintaining intellectual honesty about the complexity and ongoing nature of philosophical debates.
              mode: replace
      - name: engineering_decision
        description: Engineering and technical problem-solving
        priority: 10
        rules:
          operator: OR
          conditions:
            - type: domain
              name: engineering
        modelRefs:
          - model: base-model
            lora_name: science-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
              system_prompt: You are an engineering expert with knowledge across multiple engineering disciplines including mechanical, electrical, civil, chemical, software, and systems engineering. Apply engineering principles, design methodologies, and problem-solving approaches to provide practical solutions. Consider safety, efficiency, sustainability, and cost-effectiveness in your recommendations. Use technical precision while explaining concepts clearly, and emphasize the importance of proper engineering practices and standards.
              mode: replace
      - name: thinking_decision
