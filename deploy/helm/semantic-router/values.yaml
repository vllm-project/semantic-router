replicaCount: 1
image:
  repository: ghcr.io/vllm-project/semantic-router/extproc
  pullPolicy: Never
  tag: e2e-test
service:
  type: ClusterIP
  port: 8080
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: Qwen/Qwen2.5-7B-Instruct
    models:
      - name: Qwen/Qwen2.5-14B-Instruct
        external_model_ids:
          vllm: Qwen/Qwen2.5-14B-Instruct
        backend_refs:
          - name: vllm-14b
            endpoint: vllm-14b.default.svc.cluster.local:8000
            weight: 1
            type: vllm
      - name: Qwen/Qwen2.5-7B-Instruct
        external_model_ids:
          vllm: Qwen/Qwen2.5-7B-Instruct
        backend_refs:
          - name: vllm-7b
            endpoint: vllm-7b.default.svc.cluster.local:8000
            weight: 1
            type: vllm
  routing:
    decisions:
      - name: admin_unrestricted
        description: Admin users get 14B with reasoning
        priority: 300
        rules:
          operator: AND
          conditions:
            - type: authz
              name: admin
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: premium_complex
        description: Premium users + complex queries get 14B
        priority: 250
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: complex_analysis
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
      - name: premium_code
        description: Premium users + code requests get 14B
        priority: 240
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: code_request
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: false
      - name: premium_default
        description: Premium users simple queries get 7B
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: free_default
        description: Free users get 7B
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: authz
              name: free_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
