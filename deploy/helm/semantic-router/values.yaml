        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: premium_complex
        description: Premium users + complex queries get 14B
        priority: 250
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: complex_analysis
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: true
      - name: premium_code
        description: Premium users + code requests get 14B
        priority: 240
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
            - type: keyword
              name: code_request
        modelRefs:
          - model: Qwen/Qwen2.5-14B-Instruct
            use_reasoning: false
      - name: premium_default
        description: Premium users simple queries get 7B
        priority: 150
        rules:
          operator: AND
          conditions:
            - type: authz
              name: premium_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
            use_reasoning: false
      - name: free_default
        description: Free users get 7B
        priority: 100
        rules:
          operator: AND
          conditions:
            - type: authz
              name: free_user
        modelRefs:
          - model: Qwen/Qwen2.5-7B-Instruct
