        description: Block jailbreak attempts
        priority: 1000
        rules:
          operator: OR
          conditions:
            - type: jailbreak
              name: jailbreak_standard
        plugins:
          - type: fast_response
            configuration:
              message: I'm sorry, but I cannot process this request as it appears to violate our usage policies.
      - name: block_pii
        description: Block requests containing PII
        priority: 999
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_deny_all
        plugins:
          - type: fast_response
            configuration:
              message: Your request contains personal information. Please remove any sensitive data and try again.
