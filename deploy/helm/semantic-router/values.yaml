---
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: general-expert
      reasoning_families:
        deepseek:
          type: chat_template_kwargs
          parameter: thinking
        qwen3:
          type: chat_template_kwargs
          parameter: enable_thinking
        gpt-oss:
          type: reasoning_effort
          parameter: reasoning_effort
        gpt:
          type: reasoning_effort
          parameter: reasoning_effort
      default_reasoning_effort: high
    models:
      - name: base-model
        reasoning_family: qwen3
        backend_refs:
          - name: local-vllm
            endpoint: vllm-llama3-8b-instruct.default.svc.cluster.local:8000
            weight: 1
  routing:
    decisions:
      - name: block_jailbreak
        description: Block jailbreak attempts
        priority: 1000
        rules:
          operator: OR
          conditions:
            - type: jailbreak
              name: jailbreak_standard
        plugins:
          - type: fast_response
            configuration:
              message: I'm sorry, but I cannot process this request as it appears to violate our usage policies.
      - name: block_pii
        description: Block requests containing PII
        priority: 999
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_deny_all
        plugins:
          - type: fast_response
            configuration:
              message: Your request contains personal information. Please remove any sensitive data and try again.
      - name: business_decision
        description: Business and management related queries
        priority: 10
        rules:
          operator: OR
          conditions:
