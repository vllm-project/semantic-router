              name: jailbreak_dev
        plugins:
          - type: fast_response
            configuration:
              message: Your request has been declined due to a policy violation.
      - name: block_pii_prod
        description: Block PII on prod (strict, deny all)
        priority: 999
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_prod
        plugins:
          - type: fast_response
            configuration:
              message: For your security, please do not share personal information.
      - name: block_pii_dev
        description: Block PII on dev (relaxed, allow GPE/ORG/DATE)
        priority: 998
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_dev
        plugins:
          - type: fast_response
            configuration:
              message: For your security, please do not share personal information.
      - name: code_to_dev
        description: Route code/tech queries to Dev (internal developer env)
        priority: 100
        rules:
          operator: OR
          conditions:
            - type: keyword
              name: code_keywords
        modelRefs:
          - model: qwen14b-dev
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a senior software engineer. Provide clear, production-quality code with best practices.
      - name: general_to_prod
        description: Route general/user queries to Prod (strict safety)
        priority: 50
        rules:
          operator: OR
          conditions:
            - type: keyword
              name: general_keywords
        modelRefs:
          - model: qwen14b-prod
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a helpful assistant operating under strict data protection policies. Never store, log, or repeat any personal information shared by the user.
    signals:
      keywords:
        - name: code_keywords
          operator: OR
          keywords:
            - code
            - function
            - implement
            - debug
            - refactor
            - python
            - golang
            - javascript
            - algorithm
            - class
            - API
            - bug
            - compile
        - name: general_keywords
          operator: OR
          keywords:
            - hello
            - what is
            - explain
            - tell me
            - how does
            - history
            - science
            - who
            - where
            - when
      domains:
        - name: code
          description: Programming, debugging, and software engineering tasks
        - name: general
          description: General knowledge, conversation, and miscellaneous topics
        - name: other
          description: Catch-all for unclassified queries
      jailbreak:
        - name: jailbreak_dev
          threshold: 0.5
          include_history: false
          description: Relaxed jailbreak detection for dev environment
        - name: jailbreak_prod
          threshold: 0.9
          include_history: false
          description: Strict jailbreak detection for prod environment
      pii:
        - name: pii_dev
          threshold: 0.6
          pii_types_allowed:
            - GPE
            - ORGANIZATION
            - DATE_TIME
          include_history: false
          description: Relaxed PII policy for dev (allow GPE/ORG/DATE)
        - name: pii_prod
          threshold: 0.9
          pii_types_allowed: []
          include_history: false
          description: Strict PII policy for prod (block all)
    modelCards:
      - name: qwen14b-dev
        param_size: 14b
        description: Qwen2.5 14B — Dev environment (internal)
        capabilities:
          - chat
          - code
          - reasoning
          - math
        quality_score: 0.85
      - name: qwen14b-prod
        param_size: 14b
        description: Qwen2.5 14B — Prod environment (user-facing)
        capabilities:
          - chat
          - code
          - reasoning
          - math
        quality_score: 0.85
  global:
    router:
      clear_route_cache: true
      strategy: priority
    services:
      observability:
        metrics:
          enabled: true
        tracing:
          enabled: false
      api:
        batch_classification:
          max_batch_size: 100
          concurrency_threshold: 5
          max_concurrency: 8
          metrics:
            enabled: true
            detailed_goroutine_tracking: true
            high_resolution_timing: false
            sample_rate: 1.0
            duration_buckets:
              - 0.001
              - 0.005
              - 0.01
              - 0.025
              - 0.05
              - 0.1
              - 0.25
              - 0.5
              - 1
              - 2.5
              - 5
              - 10
              - 30
            size_buckets:
              - 1
              - 2
              - 5
              - 10
              - 20
              - 50
              - 100
              - 200
    stores:
      semantic_cache:
        enabled: false
        embedding_model: mmbert
      memory:
        embedding_model: mmbert
      vector_store:
        embedding_model: mmbert
    integrations: {}
resources:
  limits:
    cpu: 2000m
    memory: 8Gi
  requests:
    cpu: 500m
    memory: 2Gi
