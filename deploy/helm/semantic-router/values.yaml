replicaCount: 1
image:
  repository: ghcr.io/vllm-project/semantic-router/extproc
  pullPolicy: Never
  tag: e2e-test
service:
  type: ClusterIP
  port: 8080
config:
  version: v0.3
  listeners: []
  providers:
    defaults:
      default_model: qwen14b-dev
    models:
      - name: qwen14b-dev
        external_model_ids:
          vllm: Qwen/Qwen2.5-14B-Instruct
        backend_refs:
          - name: vllm-14b-dev
            endpoint: vllm-14b-dev.default.svc.cluster.local:8000
            weight: 1
            type: vllm
      - name: qwen14b-prod
        external_model_ids:
          vllm: Qwen/Qwen2.5-14B-Instruct
        backend_refs:
          - name: vllm-14b-prod
            endpoint: vllm-14b-prod.default.svc.cluster.local:8000
            weight: 1
            type: vllm
  routing:
    decisions:
      - name: block_jailbreak_prod
        description: Block jailbreak attempts on prod (strict)
        priority: 1001
        rules:
          operator: OR
          conditions:
            - type: jailbreak
              name: jailbreak_prod
        plugins:
          - type: fast_response
            configuration:
              message: Your request has been declined due to a policy violation.
      - name: block_jailbreak_dev
        description: Block jailbreak attempts on dev (relaxed)
        priority: 1000
        rules:
          operator: OR
          conditions:
            - type: jailbreak
              name: jailbreak_dev
        plugins:
          - type: fast_response
            configuration:
              message: Your request has been declined due to a policy violation.
      - name: block_pii_prod
        description: Block PII on prod (strict, deny all)
        priority: 999
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_prod
        plugins:
          - type: fast_response
            configuration:
              message: For your security, please do not share personal information.
      - name: block_pii_dev
        description: Block PII on dev (relaxed, allow GPE/ORG/DATE)
        priority: 998
        rules:
          operator: OR
          conditions:
            - type: pii
              name: pii_dev
        plugins:
          - type: fast_response
            configuration:
              message: For your security, please do not share personal information.
      - name: code_to_dev
        description: Route code/tech queries to Dev (internal developer env)
        priority: 100
        rules:
          operator: OR
          conditions:
            - type: keyword
              name: code_keywords
        modelRefs:
          - model: qwen14b-dev
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a senior software engineer. Provide clear, production-quality code with best practices.
      - name: general_to_prod
        description: Route general/user queries to Prod (strict safety)
        priority: 50
        rules:
          operator: OR
          conditions:
            - type: keyword
              name: general_keywords
        modelRefs:
          - model: qwen14b-prod
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              system_prompt: You are a helpful assistant operating under strict data protection policies. Never store, log, or repeat any personal information shared by the user.
    signals:
      keywords:
        - name: code_keywords
          operator: OR
          keywords:
            - code
            - function
            - implement
            - debug
            - refactor
            - python
            - golang
            - javascript
            - algorithm
            - class
            - API
            - bug
            - compile
        - name: general_keywords
          operator: OR
          keywords:
            - hello
            - what is
            - explain
            - tell me
            - how does
            - history
            - science
            - who
            - where
            - when
      domains:
        - name: code
          description: Programming, debugging, and software engineering tasks
        - name: general
          description: General knowledge, conversation, and miscellaneous topics
        - name: other
          description: Catch-all for unclassified queries
      jailbreak:
        - name: jailbreak_dev
          threshold: 0.5
          include_history: false
          description: Relaxed jailbreak detection for dev environment
        - name: jailbreak_prod
          threshold: 0.9
          include_history: false
          description: Strict jailbreak detection for prod environment
      pii:
        - name: pii_dev
          threshold: 0.6
          pii_types_allowed:
            - GPE
            - ORGANIZATION
            - DATE_TIME
          include_history: false
          description: Relaxed PII policy for dev (allow GPE/ORG/DATE)
        - name: pii_prod
          threshold: 0.9
          pii_types_allowed: []
          include_history: false
          description: Strict PII policy for prod (block all)
    modelCards:
      - name: qwen14b-dev
        param_size: 14b
        description: Qwen2.5 14B — Dev environment (internal)
        capabilities:
          - chat
          - code
          - reasoning
          - math
        quality_score: 0.85
      - name: qwen14b-prod
        param_size: 14b
        description: Qwen2.5 14B — Prod environment (user-facing)
        capabilities:
          - chat
          - code
          - reasoning
          - math
        quality_score: 0.85
  global:
    router:
      clear_route_cache: true
      strategy: priority
    services:
