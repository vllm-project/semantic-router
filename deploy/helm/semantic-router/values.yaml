        rules:
          operator: OR
          conditions:
            - type: domain
              name: philosophy
        modelRefs:
          - model: base-model
            lora_name: humanities-expert
            use_reasoning: false
        plugins:
          - type: system_prompt
            configuration:
              enabled: true
