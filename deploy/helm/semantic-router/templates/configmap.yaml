{{- $config := deepCopy .Values.config -}}
{{- $global := (get $config "global") | default (dict) -}}
{{- $stores := (get $global "stores") | default (dict) -}}
{{- $services := (get $global "services") | default (dict) -}}
{{- $semanticCache := (get $stores "semantic_cache") | default (dict) -}}
{{- $responseAPI := (get $services "response_api") | default (dict) -}}
{{- $observability := (get $services "observability") | default (dict) -}}
{{- $tracing := (get $observability "tracing") | default (dict) -}}
{{- $tracingExporter := (get $tracing "exporter") | default (dict) -}}
{{- $tracingResource := (get $tracing "resource") | default (dict) -}}
{{- $semanticBackend := (get $semanticCache "backend_type") | default "" -}}
{{- $responseBackend := (get $responseAPI "store_backend") | default "" -}}
{{- $responseEnabled := (get $responseAPI "enabled") | default false -}}
{{- $tracingEnabled := (get $tracing "enabled") | default false -}}

{{- if and .Values.dependencies.semanticCache.redis.enabled (eq $semanticBackend "redis") -}}
{{- $semanticRedis := dict -}}
{{- $_ := set $semanticRedis "connection" (dict "host" (include "semantic-router.semanticCache.redisHost" .) "port" .Values.dependencies.semanticCache.redis.port "database" .Values.dependencies.semanticCache.redis.database "password" .Values.dependencies.semanticCache.redis.password "timeout" .Values.dependencies.semanticCache.redis.timeout "tls" (dict "enabled" .Values.dependencies.semanticCache.redis.tls.enabled)) -}}
{{- $_ := set $semanticRedis "index" (dict "name" .Values.dependencies.semanticCache.redis.index.name "prefix" .Values.dependencies.semanticCache.redis.index.prefix "vector_field" (dict "name" .Values.dependencies.semanticCache.redis.index.vectorFieldName "dimension" 384 "metric_type" .Values.dependencies.semanticCache.redis.index.metricType) "index_type" .Values.dependencies.semanticCache.redis.index.indexType "params" (dict "M" .Values.dependencies.semanticCache.redis.index.params.m "efConstruction" .Values.dependencies.semanticCache.redis.index.params.efConstruction)) -}}
{{- $_ := set $semanticRedis "search" (dict "topk" .Values.dependencies.semanticCache.redis.search.topk) -}}
{{- $_ := set $semanticRedis "development" (dict "drop_index_on_startup" .Values.dependencies.semanticCache.redis.development.dropIndexOnStartup "auto_create_index" .Values.dependencies.semanticCache.redis.development.autoCreateIndex "verbose_errors" .Values.dependencies.semanticCache.redis.development.verboseErrors) -}}
{{- $_ := set $semanticCache "redis" $semanticRedis -}}
{{- end -}}
{{- if and .Values.dependencies.semanticCache.milvus.enabled (or (eq $semanticBackend "milvus") (eq $semanticBackend "hybrid")) -}}
{{- $semanticMilvus := dict -}}
{{- $_ := set $semanticMilvus "connection" (dict "host" (include "semantic-router.semanticCache.milvusHost" .) "port" .Values.dependencies.semanticCache.milvus.port "database" .Values.dependencies.semanticCache.milvus.database "timeout" .Values.dependencies.semanticCache.milvus.timeout "auth" (dict "enabled" .Values.dependencies.semanticCache.milvus.auth.enabled "username" .Values.dependencies.semanticCache.milvus.auth.username "password" .Values.dependencies.semanticCache.milvus.auth.password) "tls" (dict "enabled" .Values.dependencies.semanticCache.milvus.tls.enabled)) -}}
{{- $_ := set $semanticMilvus "collection" (dict "name" .Values.dependencies.semanticCache.milvus.collection.name "description" .Values.dependencies.semanticCache.milvus.collection.description "vector_field" (dict "name" .Values.dependencies.semanticCache.milvus.collection.vectorFieldName "dimension" 384 "metric_type" .Values.dependencies.semanticCache.milvus.collection.metricType) "index" (dict "type" .Values.dependencies.semanticCache.milvus.collection.index.type "params" (dict "M" .Values.dependencies.semanticCache.milvus.collection.index.params.m "efConstruction" .Values.dependencies.semanticCache.milvus.collection.index.params.efConstruction))) -}}
{{- $_ := set $semanticMilvus "search" (dict "params" (dict "ef" .Values.dependencies.semanticCache.milvus.search.params.ef) "topk" .Values.dependencies.semanticCache.milvus.search.topk) -}}
{{- $_ := set $semanticMilvus "development" (dict "drop_collection_on_startup" .Values.dependencies.semanticCache.milvus.development.dropCollectionOnStartup "auto_create_collection" .Values.dependencies.semanticCache.milvus.development.autoCreateCollection "verbose_errors" .Values.dependencies.semanticCache.milvus.development.verboseErrors) -}}
{{- $_ := set $semanticCache "milvus" $semanticMilvus -}}
{{- end -}}

{{- if and $responseEnabled .Values.dependencies.responseApi.milvus.enabled (eq $responseBackend "milvus") -}}
{{- $milvus := (get $responseAPI "milvus") | default (dict) -}}
{{- $_ := set $milvus "address" (include "semantic-router.responseApi.milvusAddress" .) -}}
{{- $_ := set $milvus "database" .Values.dependencies.responseApi.milvus.database -}}
{{- $_ := set $milvus "response_collection" .Values.dependencies.responseApi.milvus.responseCollection -}}
{{- $_ := set $milvus "conversation_collection" .Values.dependencies.responseApi.milvus.conversationCollection -}}
{{- $_ := set $responseAPI "milvus" $milvus -}}
{{- end -}}

{{- if and $tracingEnabled .Values.dependencies.observability.jaeger.enabled -}}
{{- $_ := set $tracingExporter "endpoint" (include "semantic-router.jaeger.otlpEndpoint" .) -}}
{{- $_ := set $tracing "exporter" $tracingExporter -}}
{{- end -}}

{{- if and (gt (len $tracingResource) 0) .Chart.AppVersion (eq ((get $tracingResource "service_version") | default "") "") -}}
{{- $_ := set $tracingResource "service_version" .Chart.AppVersion -}}
{{- end -}}
{{- if gt (len $tracingResource) 0 -}}
{{- $_ := set $tracing "resource" $tracingResource -}}
{{- end -}}
{{- $_ := set $observability "tracing" $tracing -}}

{{- $_ := set $stores "semantic_cache" $semanticCache -}}
{{- $_ := set $services "response_api" $responseAPI -}}
{{- $_ := set $services "observability" $observability -}}
{{- $_ := set $global "stores" $stores -}}
{{- $_ := set $global "services" $services -}}
{{- $_ := set $config "global" $global -}}
{{- if not (get $config "version") -}}
{{- $_ := set $config "version" "v0.3" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "semantic-router.fullname" . }}-config
  namespace: {{ include "semantic-router.namespace" . }}
  labels:
    {{- include "semantic-router.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- toYaml $config | nindent 4 }}
  tools_db.json: |
    {{- toJson .Values.toolsDb | nindent 4 }}
