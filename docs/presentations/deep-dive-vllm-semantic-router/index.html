<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Dive into vLLM Semantic Router</title>
    <style>
      :root {
        --bg: #f8f8f4;
        --bg-strong: #ffffff;
        --ink: #111111;
        --ink-soft: #414141;
        --ink-faint: #727272;
        --line: rgba(17, 17, 17, 0.12);
        --line-strong: rgba(17, 17, 17, 0.2);
        --panel: rgba(255, 255, 255, 0.84);
        --shadow: 0 24px 64px rgba(17, 17, 17, 0.08);
        --radius-xl: 32px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --gap: clamp(14px, 2vw, 24px);
        --font-sans: "Soehne", "Avenir Next", "Helvetica Neue", "Segoe UI",
          sans-serif;
        --font-mono: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono",
          "Menlo", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top right, rgba(17, 17, 17, 0.05), transparent 28%),
          linear-gradient(180deg, #fbfbf9 0%, #f4f4ef 100%);
        color: var(--ink);
        font-family: var(--font-sans);
      }

      body {
        overflow: hidden;
      }

      .app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px clamp(20px, 4vw, 48px);
        pointer-events: none;
      }

      .topbar > * {
        pointer-events: auto;
      }

      .deck-mark,
      .slide-counter {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 24px rgba(17, 17, 17, 0.04);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .deck-mark::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--ink);
        display: inline-block;
      }

      .slide-counter {
        font-family: var(--font-mono);
      }

      .slides {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: clamp(74px, 9vh, 120px) clamp(18px, 3vw, 42px)
          clamp(84px, 11vh, 120px);
        opacity: 0;
        transform: translateX(36px) scale(0.985);
        transition: opacity 0.34s ease, transform 0.34s ease;
        pointer-events: none;
      }

      .slide.active {
        opacity: 1;
        transform: translateX(0) scale(1);
        pointer-events: auto;
      }

      .slide-shell {
        position: relative;
        width: min(1280px, 100%);
        height: min(780px, 100%);
        padding: clamp(28px, 3vw, 40px);
        border-radius: var(--radius-xl);
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.82)),
          var(--bg-strong);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .slide-shell::before {
        content: "";
        position: absolute;
        top: -140px;
        right: -140px;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(17, 17, 17, 0.06), transparent 70%);
        pointer-events: none;
      }

      .slide-number {
        position: absolute;
        top: 28px;
        right: 30px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--ink-faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .slide-body {
        display: grid;
        gap: var(--gap);
        height: 100%;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--ink-faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 26px;
        height: 1px;
        background: var(--ink);
        display: inline-block;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero {
        display: grid;
        align-content: space-between;
        gap: 26px;
        height: 100%;
      }

      .hero h1 {
        max-width: 980px;
        font-size: clamp(48px, 7vw, 92px);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .subtitle {
        max-width: 820px;
        margin-top: 18px;
        font-size: clamp(18px, 2.4vw, 30px);
        line-height: 1.2;
        color: var(--ink-soft);
      }

      .statement {
        font-size: clamp(34px, 4vw, 60px);
        line-height: 1;
        letter-spacing: -0.045em;
        max-width: 960px;
      }

      .lede {
        max-width: 860px;
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.45;
        color: var(--ink-soft);
      }

      .layout {
        display: grid;
        gap: var(--gap);
        height: 100%;
      }

      .stack {
        display: grid;
        gap: var(--gap);
      }

      .grid-2,
      .grid-3,
      .grid-4,
      .grid-5 {
        display: grid;
        gap: var(--gap);
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .card {
        display: grid;
        gap: 12px;
        padding: 18px 20px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: var(--panel);
        min-height: 0;
      }

      .card h3,
      .card strong {
        font-size: clamp(18px, 2vw, 24px);
        line-height: 1.1;
      }

      .card p,
      .card li {
        color: var(--ink-soft);
        line-height: 1.42;
        font-size: clamp(15px, 1.45vw, 18px);
      }

      .card ul {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }

      .label {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        font-size: 14px;
      }

      .mono-list {
        display: grid;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: clamp(13px, 1.15vw, 15px);
        color: var(--ink-soft);
      }

      .flowline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        align-items: center;
      }

      .flowline.short {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .flow-box {
        display: grid;
        align-content: center;
        gap: 8px;
        min-height: 132px;
        padding: 18px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
      }

      .flow-box strong {
        font-size: clamp(18px, 2vw, 26px);
        line-height: 1.05;
      }

      .flow-box p {
        color: var(--ink-soft);
        line-height: 1.34;
        font-size: clamp(14px, 1.25vw, 16px);
      }

      .arrow {
        display: grid;
        place-items: center;
        font-size: clamp(22px, 3vw, 36px);
        color: var(--ink-faint);
      }

      pre {
        margin: 0;
        padding: 18px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--line);
        background: #101010;
        color: #f6f6f6;
        font-family: var(--font-mono);
        font-size: clamp(12px, 1.1vw, 15px);
        line-height: 1.5;
        overflow: auto;
      }

      code {
        font-family: var(--font-mono);
      }

      .source-line {
        display: none;
      }

      .controls {
        position: fixed;
        right: clamp(18px, 2vw, 32px);
        bottom: clamp(18px, 2vw, 32px);
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .controls button {
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: var(--ink);
        padding: 12px 16px;
        font-size: 14px;
        cursor: pointer;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 26px rgba(17, 17, 17, 0.06);
      }

      .controls button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .progress-wrap {
        position: fixed;
        left: clamp(18px, 2vw, 32px);
        right: clamp(18px, 2vw, 32px);
        bottom: 24px;
        z-index: 15;
        height: 4px;
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.08);
        overflow: hidden;
      }

      .progress {
        height: 100%;
        width: 0%;
        background: var(--ink);
        transition: width 0.28s ease;
      }

      @media (max-width: 1100px) {
        .grid-2,
        .grid-3,
        .grid-4,
        .grid-5,
        .flowline,
        .flowline.short {
          grid-template-columns: 1fr;
        }

        .slide-shell {
          height: 100%;
          max-height: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .slide,
        .progress {
          transition: none;
        }
      }
    </style>
  </head>

      function renderSlides() {
        const root = document.getElementById("slides");
        root.innerHTML = slides
          .map((slide, index) => {
            const number = String(index + 1).padStart(2, "0");
            const sources = slide.sources
              .map((source) => `<code>${source}</code>`)
              .join(" · ");
            return `
              <section class="slide${index === 0 ? " active" : ""}" data-title="${slide.title}" id="slide-${index + 1}">
                <div class="slide-shell">
                  <div class="slide-number">${number}</div>
                  <div class="slide-body">
                    ${slide.body}
                    <div class="source-line">Anchors · ${sources}</div>
                  </div>
                </div>
              </section>
            `;
          })
          .join("");
      }

      renderSlides();

      const slideNodes = Array.from(document.querySelectorAll(".slide"));
      const counter = document.getElementById("slideCounter");
      const progress = document.getElementById("progressBar");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      let index = 0;

      function formatIndex(value) {
        return String(value + 1).padStart(2, "0");
      }

      function readHashIndex() {
        const match = window.location.hash.match(/^#slide-(\d+)$/);
        if (!match) return null;
        const candidate = Number(match[1]) - 1;
        if (Number.isNaN(candidate) || candidate < 0 || candidate >= slideNodes.length) {
          return null;
        }
        return candidate;
      }

      function render() {
        slideNodes.forEach((slide, slideIndex) => {
          slide.classList.toggle("active", slideIndex === index);
        });

        counter.textContent = `${formatIndex(index)} / ${formatIndex(slideNodes.length - 1)}`;
        progress.style.width = `${((index + 1) / slideNodes.length) * 100}%`;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === slideNodes.length - 1;
        history.replaceState(null, "", `#slide-${index + 1}`);
      }

      function goTo(nextIndex) {
        index = Math.max(0, Math.min(nextIndex, slideNodes.length - 1));
        render();
      }

      function next() {
        goTo(index + 1);
      }

      function prev() {
        goTo(index - 1);
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
          event.preventDefault();
          next();
        } else if (event.key === "ArrowLeft" || event.key === "PageUp") {
          event.preventDefault();
          prev();
        } else if (event.key === "Home") {
          event.preventDefault();
          goTo(0);
        } else if (event.key === "End") {
          event.preventDefault();
          goTo(slideNodes.length - 1);
        }
      });

      window.addEventListener("hashchange", () => {
        const hashIndex = readHashIndex();
        if (hashIndex !== null) {
          goTo(hashIndex);
        }
      });

      prevBtn.addEventListener("click", prev);
      nextBtn.addEventListener("click", next);

      const initialIndex = readHashIndex();
      if (initialIndex !== null) {
        index = initialIndex;
      }
      render();
    </script>
