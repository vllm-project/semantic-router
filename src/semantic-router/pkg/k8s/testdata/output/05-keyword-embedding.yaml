version: v0.3
providers:
  defaults:
    default_model: qwen-2.5-14b
    reasoning_families:
      deepseek:
        type: reasoning_effort
        parameter: reasoning_effort
      gpt:
        type: reasoning_effort
        parameter: reasoning_effort
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
    default_reasoning_effort: high
  models:
    - name: qwen-2.5-14b
      reasoning_family: qwen3
      pricing:
        prompt_per_1m: 1
        completion_per_1m: 2
    - name: qwen-2.5-72b
      reasoning_family: qwen3
      pricing:
        prompt_per_1m: 3
        completion_per_1m: 6
routing:
  modelCards:
    - name: qwen-2.5-14b
      loras:
        - name: support-agent
          description: Customer support agent
    - name: qwen-2.5-72b
      loras:
        - name: emergency-specialist
          description: Emergency support specialist
  signals:
    keywords:
      - name: urgent
        operator: OR
        keywords:
          - urgent
          - emergency
          - critical
        case_sensitive: false
    embeddings:
      - name: support_request
        threshold: 0.7
        candidates:
          - I need immediate assistance
          - Please help me resolve this issue
          - Can someone help me urgently?
        aggregation_method: max
  decisions:
    - name: urgent_support
      description: Urgent support requests - use large model with reasoning
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: urgent
          - type: embedding
            name: support_request
      modelRefs:
        - model: qwen-2.5-72b
          lora_name: emergency-specialist
          use_reasoning: true
          reasoning_effort: high
    - name: general_support
      description: General support requests - use small model
      priority: 50
      rules:
        operator: OR
        conditions:
          - type: keyword
            name: urgent
          - type: embedding
            name: support_request
      modelRefs:
        - model: qwen-2.5-14b
          lora_name: support-agent
          use_reasoning: false
global:
  router:
    config_source: kubernetes
    include_config_models_in_list: false
    clear_route_cache: false
    streamed_body:
      enabled: false
    model_selection: {}
  services:
    api:
      batch_classification:
        max_batch_size: 100
        concurrency_threshold: 5
        max_concurrency: 8
        metrics:
          sample_rate: 1
          duration_buckets:
            - 0.001
            - 0.005
            - 0.01
            - 0.025
            - 0.05
            - 0.1
            - 0.25
            - 0.5
            - 1
            - 2.5
            - 5
            - 10
            - 30
          size_buckets:
            - 1
            - 2
            - 5
            - 10
            - 20
            - 50
            - 100
            - 200
          enabled: true
          detailed_goroutine_tracking: true
    response_api:
      enabled: false
    observability:
      tracing:
        enabled: false
        provider: opentelemetry
        exporter:
          type: otlp
          endpoint: jaeger:4317
          insecure: true
        sampling:
          type: always_on
          rate: 1
        resource:
          service_name: vllm-semantic-router
          service_version: v0.1.0
          deployment_environment: development
      metrics:
        windowed_metrics:
          enabled: false
          model_metrics: false
          queue_depth_estimation: false
    authz: {}
    ratelimit: {}
    router_replay: {}
    startup_status:
      store_backend: ""
  stores:
    semantic_cache:
      backend_type: memory
      enabled: true
      similarity_threshold: 0.8
      max_entries: 1000
      ttl_seconds: 3600
      eviction_policy: fifo
      embedding_model: mmbert
    memory: {}
  integrations:
    tools:
      enabled: true
      top_k: 3
      similarity_threshold: 0.2
      tools_db_path: config/tools_db.json
      fallback_to_empty: true
    looper:
      endpoint: ""
  model_catalog:
    embeddings:
      semantic:
        qwen3_model_path: ""
        gemma_model_path: ""
        mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
        bert_model_path: ""
        use_cpu: true
        embedding_config:
          model_type: mmbert
          preload_embeddings: true
          target_dimension: 768
          target_layer: 22
          enable_soft_matching: true
          top_k: 1
          min_score_threshold: 0.5
    system:
      prompt_guard: models/mmbert32k-jailbreak-detector-merged
      domain_classifier: models/mmbert32k-intent-classifier-merged
      pii_classifier: models/mmbert32k-pii-detector-merged
    modules:
      prompt_compression:
        enabled: false
        max_tokens: 0
      prompt_guard:
        enabled: true
        model_id: ""
        threshold: 0.7
        use_cpu: true
        use_modernbert: false
        use_mmbert_32k: true
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
        model_ref: prompt_guard
      classifier:
        domain:
          model_id: ""
          threshold: 0.5
          use_cpu: true
          use_modernbert: false
          use_mmbert_32k: true
          category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
          model_ref: domain_classifier
        mcp:
          enabled: false
          transport_type: ""
          threshold: 0
        pii:
          model_id: ""
          threshold: 0.9
          use_cpu: true
          use_mmbert_32k: true
          pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
          model_ref: pii_classifier
        preference: {}
      complexity: {}
      hallucination_mitigation:
        fact_check:
          model_id: ""
          threshold: 0
          use_cpu: false
          use_mmbert_32k: false
        detector:
          model_id: ""
          threshold: 0
          use_cpu: false
        explainer:
          model_id: ""
          threshold: 0
          use_cpu: false
      feedback_detector:
        enabled: false
        model_id: ""
        threshold: 0
        use_cpu: false
        use_modernbert: false
        use_mmbert_32k: false
        feedback_mapping_path: ""
      modality_detector:
        enabled: false
