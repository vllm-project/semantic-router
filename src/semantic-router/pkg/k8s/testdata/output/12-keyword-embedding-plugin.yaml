version: v0.3
providers:
  defaults:
    default_model: qwen-2.5-32b
    reasoning_families:
      deepseek:
        type: reasoning_effort
        parameter: reasoning_effort
      gpt:
        type: reasoning_effort
        parameter: reasoning_effort
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
    default_reasoning_effort: high
  models:
    - name: qwen-2.5-32b
      pricing:
        prompt_per_1m: 2
        completion_per_1m: 4
    - name: qwen-2.5-72b
      pricing:
        prompt_per_1m: 3
        completion_per_1m: 6
routing:
  modelCards:
    - name: qwen-2.5-32b
      reasoning_family_ref: qwen3
      loras:
        - name: api-router
          description: API routing specialist
    - name: qwen-2.5-72b
      reasoning_family_ref: qwen3
      loras:
        - name: advanced-router
          description: Advanced API routing expert
  signals:
    keywords:
      - name: security
        operator: OR
        keywords:
          - security
          - vulnerability
          - exploit
          - hack
        case_sensitive: false
    embeddings:
      - name: threat_detection
        threshold: 0.82
        candidates:
          - I found a security vulnerability in the system
          - There's a potential exploit that needs attention
          - We need to patch this security issue
        aggregation_method: max
  decisions:
    - name: security_alert
      description: Security-related queries with jailbreak protection
      priority: 100
      rules:
        operator: AND
        conditions:
          - type: keyword
            name: security
          - type: embedding
            name: threat_detection
      modelRefs:
        - model: qwen-2.5-72b
          use_reasoning: false
      plugins:
        - type: jailbreak
        - type: system_prompt
        - type: header_mutation
global:
  router:
    config_source: kubernetes
    include_config_models_in_list: false
    clear_route_cache: false
    streamed_body:
      enabled: false
    model_selection: {}
  services:
    api:
      batch_classification:
        metrics:
          sample_rate: 1
          duration_buckets:
            - 0.001
            - 0.005
            - 0.01
            - 0.025
            - 0.05
            - 0.1
            - 0.25
            - 0.5
            - 1
            - 2.5
            - 5
            - 10
            - 30
          size_buckets:
            - 1
            - 2
            - 5
            - 10
            - 20
            - 50
            - 100
            - 200
          enabled: true
          detailed_goroutine_tracking: true
    response_api:
      enabled: false
    observability:
      tracing:
        enabled: false
        provider: opentelemetry
        exporter:
          type: otlp
          endpoint: jaeger:4317
          insecure: true
        sampling:
          type: always_on
          rate: 1
        resource:
          service_name: vllm-semantic-router
          service_version: v0.1.0
          deployment_environment: development
      metrics:
        windowed_metrics:
          enabled: false
          model_metrics: false
          queue_depth_estimation: false
    authz: {}
    ratelimit: {}
    router_replay: {}
  stores:
    semantic_cache:
      backend_type: memory
      enabled: true
      similarity_threshold: 0.8
      max_entries: 1000
      ttl_seconds: 3600
      eviction_policy: fifo
      embedding_model: bert
    memory: {}
  integrations:
    tools:
      enabled: true
      top_k: 3
      similarity_threshold: 0.2
      tools_db_path: config/tools_db.json
      fallback_to_empty: true
    looper:
      endpoint: ""
  model_catalog:
    embeddings:
      semantic:
        qwen3_model_path: models/mom-embedding-pro
        gemma_model_path: models/mom-embedding-flash
        mmbert_model_path: ""
        bert_model_path: ""
        use_cpu: true
      bert:
        model_id: models/mom-embedding-light
        threshold: 0.6
        use_cpu: true
    system: {}
    modules:
      prompt_compression:
        enabled: false
        max_tokens: 0
      prompt_guard:
        enabled: true
        model_id: models/mom-jailbreak-classifier
        threshold: 0.7
        use_cpu: true
        use_modernbert: true
        use_mmbert_32k: false
        jailbreak_mapping_path: models/mom-jailbreak-classifier/jailbreak_type_mapping.json
      classifier:
        domain:
          model_id: models/mom-domain-classifier
          threshold: 0.6
          use_cpu: true
          use_modernbert: true
          use_mmbert_32k: false
          category_mapping_path: models/mom-domain-classifier/category_mapping.json
        mcp:
          enabled: false
          transport_type: ""
          threshold: 0
        pii:
          model_id: models/pii_classifier_modernbert-base_presidio_token_model
          threshold: 0.7
          use_cpu: true
          use_mmbert_32k: false
          pii_mapping_path: models/mom-pii-classifier/pii_type_mapping.json
        preference:
          use_contrastive: false
      hallucination_mitigation:
        fact_check:
          model_id: ""
          threshold: 0
          use_cpu: false
          use_mmbert_32k: false
        detector:
          model_id: ""
          threshold: 0
          use_cpu: false
        explainer:
          model_id: ""
          threshold: 0
          use_cpu: false
      feedback_detector:
        enabled: false
        model_id: ""
        threshold: 0
        use_cpu: false
        use_modernbert: false
        use_mmbert_32k: false
        feedback_mapping_path: ""
      modality_detector:
        enabled: false
