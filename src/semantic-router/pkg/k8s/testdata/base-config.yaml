version: v0.3

listeners: []

providers:
  defaults:
    default_reasoning_effort: high
    reasoning_families:
      deepseek:
        type: reasoning_effort
        parameter: reasoning_effort
      qwen3:
        type: chat_template_kwargs
        parameter: enable_thinking
      gpt:
        type: reasoning_effort
        parameter: reasoning_effort

routing:
  signals: {}

global:
  router:
    config_source: kubernetes
  services:
    api:
      batch_classification:
        max_batch_size: 100
        concurrency_threshold: 5
        max_concurrency: 8
        metrics:
          enabled: true
          detailed_goroutine_tracking: true
          high_resolution_timing: false
          sample_rate: 1.0
          duration_buckets: [0.001, 0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30]
          size_buckets: [1, 2, 5, 10, 20, 50, 100, 200]
    observability:
      tracing:
        enabled: false
        provider: opentelemetry
        exporter:
          type: otlp
          endpoint: jaeger:4317
          insecure: true
        sampling:
          type: always_on
          rate: 1.0
        resource:
          service_name: vllm-semantic-router
          service_version: v0.1.0
          deployment_environment: development
  stores:
    semantic_cache:
      enabled: true
      backend_type: memory
      similarity_threshold: 0.8
      max_entries: 1000
      ttl_seconds: 3600
      eviction_policy: fifo
      use_hnsw: true
      hnsw_m: 16
      hnsw_ef_construction: 200
      embedding_model: mmbert
  integrations:
    tools:
      enabled: true
      top_k: 3
      similarity_threshold: 0.2
      tools_db_path: config/tools_db.json
      fallback_to_empty: true
  model_catalog:
    embeddings:
      semantic:
        mmbert_model_path: models/mom-embedding-ultra
        use_cpu: true
        embedding_config:
          model_type: mmbert
          preload_embeddings: true
          target_dimension: 768
          target_layer: 22
          enable_soft_matching: true
          min_score_threshold: 0.5
    system:
      prompt_guard: models/mmbert32k-jailbreak-detector-merged
      domain_classifier: models/mmbert32k-intent-classifier-merged
      pii_classifier: models/mmbert32k-pii-detector-merged
    modules:
      prompt_guard:
        enabled: true
        model_ref: prompt_guard
        threshold: 0.7
        use_cpu: true
        use_mmbert_32k: true
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
      classifier:
        domain:
          model_ref: domain_classifier
          threshold: 0.5
          use_cpu: true
          use_mmbert_32k: true
          category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
        pii:
          model_ref: pii_classifier
          use_mmbert_32k: true
          threshold: 0.9
          use_cpu: true
          pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
