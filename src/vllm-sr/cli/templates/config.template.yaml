# Advanced YAML sample for vLLM Semantic Router.
# Most users should start with `vllm-sr serve` and finish setup in the dashboard.
# Use this template when you want to hand-author routing config directly.

version: v0.3

listeners:
  - name: "http-8899"
    address: "0.0.0.0"
    port: 8899
    timeout: "300s"

providers:
  defaults:
    default_model: "replace-with-your-model"
  models:
    - name: "replace-with-your-model"
      backend_refs:
        - name: "primary"
          endpoint: "host.docker.internal:8000"
          protocol: "http"
          weight: 100

routing:
  modelCards:
    - name: "replace-with-your-model"

  decisions:
    - name: "default-route"
      description: "Catch-all route for every request while you build out more specific signals and decisions."
      priority: 100
      rules:
        operator: "AND"
        conditions: []
      modelRefs:
        - model: "replace-with-your-model"
          use_reasoning: false
