apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: llm-katan-claude

# Base configuration
resources:
  - ../../base

components:
  - ../../components/common

# Namespace suffix for multi-instance deployment
nameSuffix: -claude

# Patches to customize for Claude-3-Haiku simulation
patches:
  # Set served model name for API
  - target:
      kind: Deployment
      name: llm-katan
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: YLLM_SERVED_MODEL_NAME
          value: "claude-3-haiku-20240307"
      - op: add
        path: /spec/template/metadata/labels/model-alias
        value: "claude-3-haiku"

  # Add model-alias label to service
  - target:
      kind: Service
      name: llm-katan
    patch: |-
      - op: add
        path: /metadata/labels/model-alias
        value: "claude-3-haiku"

  # Update PVC reference in deployment to match suffixed PVC name
  - target:
      kind: Deployment
      name: llm-katan
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/0/persistentVolumeClaim/claimName
        value: llm-katan-models-claude
