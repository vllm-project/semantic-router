name: Unassign Inactive Assignees

# Manages issue assignments based on activity:
# - At 15 days: posts a reminder comment (if no PR activity)
# - At 30 days: removes the assignment (if no PR activity, adds label)
# Measures staleness from actual assignment event (not updated_at).
# PR activity checks for any linked PR, not just recently-updated ones.

on:
  schedule:
    - cron: '0 2 * * *'  # daily at 02:00 UTC
  workflow_dispatch: {}

permissions: {}

jobs:
  unassign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Check and manage inactive assignees
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const daysWarning = 15;
            const daysUnassign = 30;
            const now = new Date();
            const millis = d => d * 24 * 60 * 60 * 1000;

            // Fetch all PRs once per run for reuse (performance optimization)
            let allPRs = [];
            try {
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const resp = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'all',
                  per_page: 100,
                  page
                });
                if (!resp.data || resp.data.length === 0) {
                  hasMore = false;
                  break;
                }
                allPRs = allPRs.concat(resp.data);
                page += 1;
                if (resp.data.length < 100) {
                  hasMore = false;
                }
              }
              console.log(`Fetched ${allPRs.length} PRs for reuse`);
            } catch (e) {
              console.log(`Warning: Could not fetch PRs: ${e.message}`);
            }

            // Helper: check if any PR mentions this issue (with word boundary)
            function hasPRMentioningIssue(issueNum) {
              const pattern = new RegExp(`#${issueNum}\\b`);
              return allPRs.some(pr => pr.body && pattern.test(pr.body));
            }

            // Get all open assigned issues, paginate
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const issues = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100,
                page
              });

              if (!issues.data || issues.data.length === 0) {
                hasMore = false;
                break;
              }

              for (const issue of issues.data) {
                // Skip PRs and issues with no assignees
                if (issue.pull_request || !issue.assignees || issue.assignees.length === 0) {
                  continue;
                }

                // Get the issue timeline to find actual assignment events per assignee
                let assignmentDates = {};
                try {
                  let timelinePage = 1;
                  let timelineHasMore = true;
                  while (timelineHasMore) {
                    const timeline = await github.rest.issues.listEventsForTimeline({
                      owner,
                      repo,
                      issue_number: issue.number,
                      per_page: 100,
                      page: timelinePage
                    });

                    if (!timeline.data || timeline.data.length === 0) {
                      timelineHasMore = false;
                      break;
                    }

                    for (const event of timeline.data) {
                      if (event.event === 'assigned' && event.assignee) {
                        // Store the most recent assignment date for each assignee
                        assignmentDates[event.assignee.login] = new Date(event.created_at);
                      }
                    }

                    timelinePage += 1;
                    if (timeline.data.length < 100) {
                      timelineHasMore = false;
                    }
                  }
                } catch (e) {
                  console.log(`Could not fetch timeline for #${issue.number}: ${e.message}`);
                }

                // Check if there's been any PR activity (ANY PR mentioning this issue)
                const hasPRActivity = hasPRMentioningIssue(issue.number);

                // Get existing comments to check for warning
                let comments = [];
                try {
                  const resp = await github.rest.issues.listComments({
                    owner,
                    repo,
                    issue_number: issue.number,
                    per_page: 100
                  });
                  comments = resp.data || [];
                } catch (e) {
                  console.log(`Could not fetch comments for #${issue.number}: ${e.message}`);
                }

                const hasWarningComment = comments.some(c =>
                  c.user.login === 'github-actions[bot]' &&
                  c.body && c.body.includes('Automated reminder: no activity for')
                );

                if (hasPRActivity) {
                  // Reset: remove warning label if present
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: issue.number,
                      name: 'assignment-inactive-warning'
                    });
                  } catch (e) {
                    // Label may not exist, ignore
                  }
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: issue.number,
                      name: 'assignment-inactive-unassigned'
                    });
                  } catch (e) {
                    // Label may not exist, ignore
                  }
                  continue;
                }

                // Check each assignee's individual age
                const assigneesToRemove = [];
                for (const assignee of issue.assignees) {
                  const assignmentDate = assignmentDates[assignee.login];
                  if (!assignmentDate) {
                    // No assignment event found (shouldn't happen, but be safe)
                    continue;
                  }

                  const age = now - assignmentDate;

                  if (age >= millis(daysUnassign)) {
                    assigneesToRemove.push(assignee.login);
                  }
                }

                if (assigneesToRemove.length > 0) {
                  // Unassign stale assignees
                  try {
                    await github.rest.issues.removeAssignees({
                      owner,
                      repo,
                      issue_number: issue.number,
                      assignees: assigneesToRemove
                    });
                    console.log(`Unassigned #${issue.number}: ${assigneesToRemove.join(', ')}`);

                    // Post unassignment notice
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number: issue.number,
                      body: `**Automated notice:** Assignment removed after ${daysUnassign} days of inactivity. ` +
                            `If you are still working on this, please re-assign yourself or ` +
                            `[open a draft PR](https://github.com/${owner}/${repo}/compare/main?expand=1) and mention this issue.`
                    });

                    // Add label for tracking
                    try {
                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: issue.number,
                        labels: ['assignment-inactive-unassigned']
                      });
                    } catch (e) {
                      // Ignore label add failures
                    }
                  } catch (e) {
                    console.log(`Failed to unassign #${issue.number}: ${e.message}`);
                  }
                } else {
                  // Check if any assignee is approaching warning threshold
                  let shouldWarn = false;
                  for (const assignee of issue.assignees) {
                    const assignmentDate = assignmentDates[assignee.login];
                    if (assignmentDate) {
                      const age = now - assignmentDate;
                      if (age >= millis(daysWarning) && age < millis(daysUnassign)) {
                        shouldWarn = true;
                        break;
                      }
                    }
                  }

                  if (shouldWarn && !hasWarningComment) {
                    // Post reminder comment
                    try {
                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issue.number,
                        body: `⏰ **Automated reminder:** no activity for ${daysWarning} days. ` +
                              `Please respond or [open a draft PR](https://github.com/${owner}/${repo}/compare/main?expand=1) ` +
                              `within ${daysUnassign - daysWarning} days or your assignment will be removed.`
                      });
                    console.log(`Reminded assignees for #${issue.number}`);

                      // Add warning label
                      try {
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: issue.number,
                          labels: ['assignment-inactive-warning']
                        });
                      } catch (e) {
                        // Ignore label add failures
                      }
                    } catch (e) {
                      console.log(`Failed to comment on #${issue.number}: ${e.message}`);
                    }
                  }
                }
              }

              page += 1;
              if (issues.data.length < 100) {
                hasMore = false;
              }
            }

            console.log('✅ Inactive assignee check completed');
