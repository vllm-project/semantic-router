name: Supply Chain Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # pull_request uses a unique refs/pull/<number>/merge ref.
  group: security-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    uses: ./.github/workflows/ci-changes.yml

  ast-security-scan:
    needs: changes
    if: >-
      github.repository == 'vllm-project/semantic-router'
      && needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    name: AST supply chain security scan
    permissions:
      contents: read

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tree-sitter dependencies
        run: |
          # Pin tree-sitter core + grammars to an ABI-compatible set. Unpinned
          # installs let pip drift core and grammars onto mismatched ABIs, which
          # crashes the scanner with a native segfault during parser.parse().
          pip install \
            tree-sitter==0.25.2 \
            tree-sitter-python==0.25.0 \
            tree-sitter-javascript==0.25.0 \
            tree-sitter-typescript==0.23.2 \
            tree-sitter-go==0.25.0 \
            tree-sitter-rust==0.24.0

      - name: Run AST codebase scan
        id: ast_scan
        continue-on-error: true
        run: |
          set +e
          python3 tools/security/ast_security_scanner.py \
            scan . --fail-on HIGH --json > /tmp/ast_scan.json
          EXIT_CODE=$?
          if [ ! -s /tmp/ast_scan.json ]; then
            echo '{"findings":[],"counts":{},"error":"scanner produced no output"}' > /tmp/ast_scan.json
          fi
          exit $EXIT_CODE

      - name: Run AST PR diff scan
        id: diff_scan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          python3 tools/security/ast_security_scanner.py \
            diff "$BASE_SHA" --fail-on HIGH --json > /tmp/diff_scan.json
          EXIT_CODE=$?
          if [ ! -s /tmp/diff_scan.json ]; then
            echo '{"findings":[],"counts":{},"error":"scanner produced no output"}' > /tmp/diff_scan.json
          fi
          exit $EXIT_CODE

      - name: Run regex fallback scan
        id: regex_scan
        continue-on-error: true
        run: |
          set -o pipefail
          python3 tools/security/scan_malicious_code.py \
            . --fail-on HIGH 2>&1 \
            | tee /tmp/regex_report.txt

      - name: Write security scan summary
        if: "!cancelled()"
        env:
          AST_OUTCOME: ${{ steps.ast_scan.outcome }}
          DIFF_OUTCOME: ${{ steps.diff_scan.outcome }}
          REGEX_OUTCOME: ${{ steps.regex_scan.outcome }}
        run: |
          DIFF_OUTCOME="${DIFF_OUTCOME:-skipped}"
          {
            echo '## Supply Chain Security Scan'
            echo
            echo '| Scanner | Outcome |'
            echo '| --- | --- |'
            echo "| AST codebase scan | ${AST_OUTCOME} |"
            echo "| AST PR diff scan | ${DIFF_OUTCOME} |"
            echo "| Regex fallback scan | ${REGEX_OUTCOME} |"
            echo
            echo 'See the step logs for complete scanner output.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if security issues found
        if: "!cancelled()"
        run: |
          if [ "${{ steps.ast_scan.outcome }}" = "failure" ] || \
             [ "${{ steps.diff_scan.outcome }}" = "failure" ] || \
             [ "${{ steps.regex_scan.outcome }}" = "failure" ]; then
            echo "::error::Supply chain security scan detected issues; see the job summary and step logs."
            exit 1
          fi

  docs-only-security-skip:
    needs: changes
    if: >-
      github.repository == 'vllm-project/semantic-router'
      && needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    name: AST supply chain security scan (docs-only skip)
    steps:
      - name: Skip full AST scan for docs-only changes
        run: echo "Docs/website-only PR - skipping full AST security scan."
