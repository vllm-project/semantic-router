name: Owner Notification

on:
  pull_request_target:
    types: [assigned, opened, reopened, synchronize, ready_for_review]

jobs:
  notify-owners:
    if: >-
      ${{
        github.repository == 'vllm-project/semantic-router' &&
        !github.event.pull_request.draft
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            // Retrieve changed files via GitHub API to avoid relying on fork
            // refs. Keep filenames as JSON so whitespace and metacharacters
            // never become JavaScript source in the privileged follow-up step.
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const filenames = files.map(file => file.filename);
            core.setOutput('filenames_json', JSON.stringify(filenames));

      - name: Find owners and notify
        uses: actions/github-script@v7
        env:
          CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.filenames_json }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let changedFilePayload;
            try {
              changedFilePayload = JSON.parse(
                process.env.CHANGED_FILES_JSON || '[]'
              );
            } catch {
              core.setFailed('Changed-file metadata was not valid JSON');
              return;
            }
            if (
              !Array.isArray(changedFilePayload) ||
              !changedFilePayload.every(file => typeof file === 'string')
            ) {
              core.setFailed('Changed-file metadata was not a string array');
              return;
            }

            const repoRoot = fs.realpathSync(process.env.GITHUB_WORKSPACE);

            function isInsideRepository(candidate) {
              const relative = path.relative(repoRoot, candidate);
              return relative === '' || (
                relative !== '..' &&
                !relative.startsWith(`..${path.sep}`) &&
                !path.isAbsolute(relative)
              );
            }

            function normalizeRepositoryPath(filePath) {
              if (
                !filePath ||
                path.posix.isAbsolute(filePath) ||
                /[\p{Cc}\p{Cf}]/u.test(filePath)
              ) {
                return null;
              }
              const parts = filePath.split('/');
              if (parts.some(part => !part || part === '.' || part === '..')) {
                return null;
              }
              const normalized = path.posix.normalize(filePath);
              const absolute = path.resolve(repoRoot, ...parts);
              if (normalized !== filePath || !isInsideRepository(absolute)) {
                return null;
              }
              return normalized;
            }

            function readOwners(relativeOwnerPath) {
              const ownerPath = path.resolve(
                repoRoot,
                ...relativeOwnerPath.split('/')
              );
              if (!isInsideRepository(ownerPath) || !fs.existsSync(ownerPath)) {
                return [];
              }
              const ownerStat = fs.lstatSync(ownerPath);
              if (ownerStat.isSymbolicLink() || !ownerStat.isFile()) {
                return [];
              }
              const realOwnerPath = fs.realpathSync(ownerPath);
              if (!isInsideRepository(realOwnerPath)) {
                return [];
              }

              return fs.readFileSync(realOwnerPath, 'utf8')
                .split('\n')
                .map(line => line.trim())
                .filter(line => (
                  /^@[A-Za-z0-9](?:[A-Za-z0-9-]{0,37}[A-Za-z0-9])?$/.test(line)
                ));
            }

            function findOwnerFile(filePath) {
              let currentDir = path.posix.dirname(filePath);

              while (true) {
                const ownerPath = currentDir === '.'
                  ? 'OWNER'
                  : `${currentDir}/OWNER`;
                const owners = readOwners(ownerPath);
                if (owners.length > 0) {
                  return { path: currentDir, owners };
                }
                if (currentDir === '.') {
                  return null;
                }
                const parentDir = path.posix.dirname(currentDir);
                if (parentDir === currentDir) {
                  return null;
                }
                currentDir = parentDir;
              }
            }

            function escapeHtml(value) {
              return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
            }

            function inlineCode(value) {
              const displayValue = String(value).replace(
                /[\p{Cc}\p{Cf}]/gu,
                '\uFFFD'
              );
              return `<code>${escapeHtml(displayValue)}</code>`;
            }

            const changedFiles = [];
            let rejectedFileCount = 0;
            for (const rawFile of changedFilePayload) {
              const normalized = normalizeRepositoryPath(rawFile);
              if (normalized === null) {
                rejectedFileCount += 1;
              } else {
                changedFiles.push(normalized);
              }
            }
            console.log(`Processing ${changedFiles.length} safe changed path(s)`);
            if (rejectedFileCount > 0) {
              core.warning(
                `${rejectedFileCount} unsafe changed path(s) were ignored`
              );
            }

            const ownerMap = new Map();
            for (const file of new Set(changedFiles)) {
              const ownerInfo = findOwnerFile(file);
              if (!ownerInfo) {
                continue;
              }
              if (!ownerMap.has(ownerInfo.path)) {
                ownerMap.set(ownerInfo.path, {
                  owners: ownerInfo.owners,
                  files: [],
                });
              }
              ownerMap.get(ownerInfo.path).files.push(file);
            }

            if (ownerMap.size === 0) {
              console.log('No owners found for changed files');
              return;
            }

            const allOwners = new Set();
            for (const [, info] of ownerMap) {
              for (const owner of info.owners) {
                allOwners.add(owner.slice(1));
              }
            }

            if (allOwners.size > 0) {
              const requestedOwners = Array.from(allOwners);
              const assigneeUsers = await github.paginate(
                github.rest.issues.listAssignees,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                }
              );
              const assignableLogins = new Set(
                assigneeUsers.map(user => user.login.toLowerCase())
              );
              const assignableOwners = requestedOwners.filter(owner =>
                assignableLogins.has(owner.toLowerCase())
              );
              const skippedOwners = requestedOwners.filter(owner =>
                !assignableLogins.has(owner.toLowerCase())
              );

              if (skippedOwners.length > 0) {
                console.log(
                  `Skipping ${skippedOwners.length} non-assignable owner(s)`
                );
              }

              try {
                if (assignableOwners.length > 0) {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    assignees: assignableOwners,
                  });
                  console.log(`Assigned ${assignableOwners.length} owner(s)`);
                } else {
                  console.log('No assignable owners found for changed files');
                }
              } catch {
                console.log('Failed to assign one or more owners');
              }
            }

            let commentBody = '## 👥 vLLM Semantic Team Notification\n\n';
            commentBody +=
              'The following members have been identified for the changed ' +
              'files in this PR and have been automatically assigned when ' +
              'their GitHub accounts are assignable in this repository:\n\n';

            const maxFilesPerSection = 100;
            const maxCommentBytes = 56000;
            let renderedSections = 0;
            for (const [dirPath, info] of ownerMap) {
              const displayPath = dirPath === '.' ? 'Root Directory' : dirPath;
              let section = `### 📁 ${inlineCode(displayPath)}\n`;
              section += `**Owners:** ${info.owners.join(', ')}\n`;
              section += '**Files changed:**\n';
              for (const file of info.files.slice(0, maxFilesPerSection)) {
                section += `- ${inlineCode(file)}\n`;
              }
              if (info.files.length > maxFilesPerSection) {
                section +=
                  `_...and ${info.files.length - maxFilesPerSection} more file(s)_\n`;
              }
              section += '\n';
              if (
                Buffer.byteLength(commentBody + section, 'utf8') >
                maxCommentBytes
              ) {
                break;
              }
              commentBody += section;
              renderedSections += 1;
            }
            if (renderedSections < ownerMap.size) {
              commentBody +=
                '_Additional owner sections were omitted; see the workflow logs._\n\n';
            }

            commentBody += '---\n';
            commentBody += '<div align="center">\n';
            commentBody +=
              '<img src="https://raw.githubusercontent.com/' +
              'vllm-project/semantic-router/main/website/static/' +
              'img/repo.png" alt="vLLM" width="80%"/>';
            commentBody += '</div>\n\n';
            commentBody += '## 🎉 Thanks for your contributions!\n\n';
            commentBody +=
              '*This comment was automatically generated based on the OWNER ' +
              'files in the repository.*';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('## 👥 vLLM Semantic Team Notification')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log('Updated existing owner notification comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new owner notification comment');
            }
