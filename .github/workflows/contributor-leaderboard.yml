name: Contributor Leaderboard

# Regenerates contributor commit/review leaderboard data for the docs site.
# Opens/updates a PR instead of pushing to main (branch protection).

on:
  schedule:
    - cron: "0 1 * * 1" # Weekly on Monday at 01:00 UTC
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Regenerate contributor leaderboard data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: website
        run: npm run contributors:rank

      - name: Commit and push branch
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add website/src/data/contributorRank.generated.ts
          if git diff --cached --quiet; then
            echo "No leaderboard changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH=chore/contributor-leaderboard
          git checkout -B "$BRANCH"
          git commit -s -m "chore(website): refresh contributor leaderboard data"
          git push -f origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.push.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[Docs] refresh contributor leaderboard data',
                head: 'chore/contributor-leaderboard',
                base: 'main',
                body: `## Summary

            Regenerates \`website/src/data/contributorRank.generated.ts\` for the community leaderboard.

            ---
            *Auto-generated by [contributor-leaderboard](.github/workflows/contributor-leaderboard.yml)*`
              });
              console.log('PR created successfully');
            } catch (e) {
              console.log('Failed to create PR:', e.message);
            }
