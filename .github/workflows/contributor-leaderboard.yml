name: Contributor Leaderboard

# Regenerates contributor commit/review leaderboard data for the docs site.

on:
  schedule:
    - cron: "0 1 * * *" # Daily at 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Regenerate contributor leaderboard data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: website
        run: npm run contributors:rank

      - name: Commit updated leaderboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/src/data/contributorRank.generated.ts
          if git diff --cached --quiet; then
            echo "No leaderboard changes detected"
            exit 0
          fi
          git commit -s -m "chore(website): refresh contributor leaderboard data" -m "Regenerate commit and PR review counts for the community leaderboard."
          git push
