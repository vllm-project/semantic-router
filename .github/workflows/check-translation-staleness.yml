name: Check Translation Staleness

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at UTC 00:00
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Close existing stale PRs
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:i18n/mark-outdated`
            });
            for (const pr of prs.data) {
              console.log(`Closing stale PR #${pr.number}`);
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed'
              });
            }

      - name: Check and update translation status
        id: check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Delete remote branch if exists
          git push origin --delete i18n/mark-outdated 2>/dev/null || true
          git checkout -b i18n/mark-outdated
          
          # Use the same timestamp-primary, metadata-secondary logic as local checks.
          # This updates only unambiguous outdated flags; translation and metadata
          # work remains visible in the report without failing this workflow step.
          make docs-fix-translation-status
          
          # Check for changes
          if git diff --quiet; then
            echo "No translation status changes"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "chore(i18n): update translation status"
            git push -f origin i18n/mark-outdated
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore(i18n): update translation status',
                head: 'i18n/mark-outdated',
                base: 'main',
                body: `## Summary
            
            This PR updates translation status based on source file changes.
            
            ### What this PR does
            - Runs \`make docs-fix-translation-status\`
            - Marks translations as \`outdated: true\` when the English file has a newer latest commit
            - Marks translations as \`outdated: false\` only when the translation is not older and \`source_commit\` is current
            - Leaves ambiguous metadata verification items unchanged
            - Does not translate content or advance \`source_commit\`
            
            ---
            *Auto-generated by [check-translation-staleness](.github/workflows/check-translation-staleness.yml)*`
              });
              console.log('PR created successfully');
            } catch (e) {
              console.log('Failed to create PR:', e.message);
            }
