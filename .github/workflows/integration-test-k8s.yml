name: Integration Test [K8s Shared Suites]

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - 'src/semantic-router/**'
      - 'src/vllm-sr/**'
      - 'dashboard/backend/**'
      - 'e2e/profiles/ai-gateway/**'
      - 'deploy/kubernetes/ai-gateway/**'
      - 'e2e/profiles/dashboard/**'
      - 'e2e/testcases/dashboard_*.go'
      - 'deploy/kubernetes/observability/dashboard/**'
      - 'e2e/testing/llm-katan/**'
      - 'deploy/helm/semantic-router/**'
      - 'tools/make/docker.mk'
      - 'tools/agent/e2e-profile-map.yaml'
      - 'tools/agent/repo-manifest.yaml'
      - 'tools/agent/scripts/**'
      - '.github/workflows/ci-changes.yml'
      - '.github/workflows/integration-test-vllm-sr-cli.yml'
      - 'e2e/testing/vllm-sr-cli/**'
      - '.github/workflows/integration-test-k8s.yml'
  push:
    branches:
      - main
    paths:
      - 'src/semantic-router/**'
      - 'src/vllm-sr/**'
      - 'dashboard/backend/**'
      - 'e2e/profiles/ai-gateway/**'
      - 'deploy/kubernetes/ai-gateway/**'
      - 'e2e/profiles/dashboard/**'
      - 'e2e/testcases/dashboard_*.go'
      - 'deploy/kubernetes/observability/dashboard/**'
      - 'e2e/testing/llm-katan/**'
      - 'deploy/helm/semantic-router/**'
      - 'tools/make/docker.mk'
      - 'tools/agent/e2e-profile-map.yaml'
      - 'tools/agent/repo-manifest.yaml'
      - 'tools/agent/scripts/**'
      - '.github/workflows/ci-changes.yml'
      - '.github/workflows/integration-test-vllm-sr-cli.yml'
      - 'e2e/testing/vllm-sr-cli/**'
      - '.github/workflows/integration-test-k8s.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    uses: ./.github/workflows/ci-changes.yml

  determine-suites:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.set-matrix.outputs.suites }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ github.event_name }}" == "push" ]] || \
             [[ "${{ needs.changes.outputs.e2e_common }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.core }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.dashboard }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.docker }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.make }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.ci }}" == "true" ]] || \
             [[ "${{ needs.changes.outputs.agent_exec }}" == "true" ]]; then
            echo 'suites=["kubernetes","dashboard"]' >> "$GITHUB_OUTPUT"
            echo 'should_run=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          suites=()
          [[ "${{ needs.changes.outputs.e2e_kubernetes }}" == "true" ]] && suites+=("kubernetes")
          [[ "${{ needs.changes.outputs.e2e_dashboard }}" == "true" ]] && suites+=("dashboard")

          if [ ${#suites[@]} -eq 0 ]; then
            echo 'suites=[]' >> "$GITHUB_OUTPUT"
            echo 'should_run=false' >> "$GITHUB_OUTPUT"
          else
            printf -v json '"%s",' "${suites[@]}"
            echo "suites=[${json%,}]" >> "$GITHUB_OUTPUT"
            echo 'should_run=true' >> "$GITHUB_OUTPUT"
          fi

  integration-test:
    needs: [changes, determine-suites]
    if: ${{ needs.determine-suites.outputs.should_run == 'true' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.determine-suites.outputs.suites) }}
    env:
      VLLM_SR_KIND_CLUSTER_NAME: vllm-sr
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Free disk space and relocate Docker to /mnt
        run: |
          echo "=== Before cleanup ==="
          df -h / /mnt

          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/.ghcup \
            /usr/share/swift /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true

          sudo systemctl stop docker
          sudo mv /var/lib/docker /mnt/docker
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker

          echo "=== After cleanup ==="
          df -h / /mnt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="$(curl -L -s https://dl.k8s.io/release/stable.txt)"
          curl -L -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Kind
        run: |
          curl --retry 5 --retry-delay 5 --retry-all-errors -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run K8s Shared Integration Suite (${{ matrix.suite }})
        run: |
          make vllm-sr-test-integration \
            VLLM_SR_TEST_TARGET=k8s \
            VLLM_SR_SHARED_SUITE=${{ matrix.suite }}

      - name: Collect kubernetes diagnostics
        if: always()
        run: |
          mkdir -p logs
          if kind get clusters | grep -q "^${VLLM_SR_KIND_CLUSTER_NAME}$"; then
            kubectl --context "kind-${VLLM_SR_KIND_CLUSTER_NAME}" get pods -A -o wide > logs/k8s-pods.txt || true
            kubectl --context "kind-${VLLM_SR_KIND_CLUSTER_NAME}" get svc -A -o wide > logs/k8s-services.txt || true
            kubectl --context "kind-${VLLM_SR_KIND_CLUSTER_NAME}" logs -n vllm-semantic-router-system -l app.kubernetes.io/instance=semantic-router --all-containers=true > logs/router.log 2>&1 || true
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-shared-suite-${{ matrix.suite }}
          path: logs/
          retention-days: 7
